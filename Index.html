etate", "Pyruvate"], "rationale": "Acetone is volatile and causes fruity breath.", "difficulty": "Core"}, {"id": "Q0197", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Ketogenesis / Urea / Amino Acids", "q": "DKA is caused by deficiency of which hormone?", "answer": "Insulin", "distractors": ["Glucagon", "Epinephrine", "Cortisol", "Thyroxine"], "rationale": "Insulin deficiency drives DKA.", "difficulty": "Core"}, {"id": "Q0198", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Ketogenesis / Urea / Amino Acids", "q": "Standard DKA treatment includes what?", "answer": "IV fluids and insulin", "distractors": ["L-carnitine only", "Thiamine only", "Avoid fructose only", "Low phenylalanine diet"], "rationale": "DKA is treated with fluids, insulin, and electrolyte correction.", "difficulty": "Core"}, {"id": "Q0199", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Ketogenesis / Urea / Amino Acids", "q": "Amino acids cannot be stored primarily because of what component?", "answer": "Nitrogen", "distractors": ["Carbon", "Hydrogen", "Oxygen", "Sulfur only"], "rationale": "Excess nitrogen must be removed and excreted as urea.", "difficulty": "Core"}, {"id": "Q0200", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Ketogenesis / Urea / Amino Acids", "q": "Removal of an amino group from an amino acid leaves what type of molecule?", "answer": "Alpha-keto acid", "distractors": ["Fatty acid", "Ketone body only", "Glycogen", "Chylomicron"], "rationale": "The carbon skeleton becomes an alpha-keto acid.", "difficulty": "Core"}, {"id": "Q0201", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Ketogenesis / Urea / Amino Acids", "q": "Transamination commonly transfers an amino group to what molecule?", "answer": "Alpha-ketoglutarate", "distractors": ["Glucose", "Citrate", "Lactate", "Urea"], "rationale": "Alpha-ketoglutarate accepts amino groups to become glutamate.", "difficulty": "Core"}, {"id" lecture": "Lipids & Amino Acids", "subtopic": "Ketogenesis / Urea / Amino Acids", "q": "PKU is caused by deficiency of which enzyme?", "answer": "Phenylalanine hydroxylase", "distractors": ["BCKDH", "OTC", "CPS-I", "Aldolase B"], "rationale": "PKU is usually due to phenylalanine hydroxylase deficiency.", "difficulty": "Core"}, {"id": "Q0208", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Ketogenesis / Urea / Amino Acids", "q": "Patients with PKU should avoid what sweetener?", "answer": "Aspartame", "distractors": ["Glucose", "Stevia only", "Sucralose only", "Fructose only"], "rationale": "Aspartame contains phenylalanine.", "difficulty": "Core"}, {"id": "Q0209", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Entry Points", "q": "Alanine enters metabolism through which intermediate/category?", "answer": "Pyruvate", "distractors": ["Oxaloacetate", "Fumarate", "Alpha-ketoglutarate", "Succinyl-CoA"], "rationale": "Alanine maps to Pyruvate.", "difficulty": "Challenge"}, {"id": "Q0210", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Entry Points", "q": "Cysteine enters metabolism through which intermediate/category?", "answer": "Pyruvate", "distractors": ["Oxaloacetate", "Fumarate", "Alpha-ketoglutarate", "Succinyl-CoA"], "rationale": "Cysteine maps to Pyruvate.", "difficulty": "Challenge"}, {"id": "Q0211", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Entry Points", "q": "Glycine enters metabolism through which intermediate/category?", "answer": "Pyruvate", "distractors": ["Oxaloacetate", "Fumarate", "Alpha-ketoglutarate", "Succinyl-CoA"], "rationale": "Glycine maps to Pyruvate.", "difficulty": "Challenge"}, {"id": "Q0212", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Entry Points", "q": "Serine enters metabolism through which intermediate/category?", "answer": "Pyruvate", "distractors": ["Oxaloacetate", "Fumarate", "Alpha-ketoglutarate", "Succinyl-CoA"], "rationale": "Serine maps to Pyruvate.", "difficulty": "Challenge"}, {"id": "Q0213", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Entry Points", "q": "Threonine enters metabolism through which intermediate/category?", "answer": "Pyruvate", "distractors": ["Oxaloacetate", "Fumarate", "Alpha-ketoglutarate", "Succinyl-CoA"], "rationale": "Threonine maps to Pyruvate.", "difficulty": "Challenge"}, {"id": "Q0214", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Entry Points", "q": "Asparagine enters metabolism through which intermediate/category?", "answer": "Oxaloacetate", "distractors": ["Pyruvate", "Fumarate", "Alpha-ketoglutarate", "Succinyl-CoA"], "rationale": "Asparagine maps to Oxaloacetate.", "difficulty": "Challenge"}, {"id": "Q0215", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Entry Points", "q": "Aspartate enters metabolism through which intermediate/category?", "answer": "Oxaloacetate", "distractors": ["Pyruvate", "Fumarate", "Alpha-ketoglutarate", "Succinyl-CoA"], "rationale": "Aspartate maps to Oxaloacetate.", "difficulty": "Challenge"}, {"id": "Q0216", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Entry Points", "q": "Phenylalanine enters metabolism through which intermediate/category?", "answer": "Fumarate", "distractors": ["Pyruvate", "Oxaloacetate", "Alpha-ketoglutarate", "Succinyl-CoA"], "rationale": "Phenylalanine maps to Fumarate.", "difficulty": "Challenge"}, {"id": "Q0217", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Entry Points", "q": "Tyrosine enters metabolism through which intermediate/category?", "answer": "Fumarate", "distractors": ["Pyruvate", "Oxaloacetate", "Alpha-ketoglutarate", "Succinyl-CoA"], "rationale": "Tyrosine maps to Fumarate.", "difficulty": "Challenge"}, {"id": "Q0218", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "A , "Oxaloacetate", "Fumarate", "Alpha-ketoglutarate"], "rationale": "Isoleucine maps to Succinyl-CoA.", "difficulty": "Challenge"}, {"id": "Q0224", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Entry Points", "q": "Methionine enters metabolism through which intermediate/category?", "answer": "Succinyl-CoA", "distractors": ["Pyruvate", "Oxaloacetate", "Fumarate", "Alpha-ketoglutarate"], "rationale": "Methionine maps to Succinyl-CoA.", "difficulty": "Challenge"}, {"id": "Q0225", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Entry Points", "q": "Valine enters metabolism through which intermediate/category?", "answer": "Succinyl-CoA", "distractors": ["Pyruvate", "Oxaloacetate", "Fumarate", "Alpha-ketoglutarate"], "rationale": "Valine maps to Succinyl-CoA.", "difficulty": "Challenge"}, {"id": "Q0226", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Entry Points", "q": "Leucine enters metabolism through which intermediate/category?", "answer": "Ketogenic products/acetoacetate", "distractors": ["Pyruvate", "Oxaloacetate", "Fumarate", "Alpha-ketoglutarate"], "rationale": "Leucine maps to Ketogenic products/acetoacetate.", "difficulty": "Challenge"}, {"id": "Q0227", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Entry Points", "q": "Lysine enters metabolism through which intermediate/category?", "answer": "Ketogenic products/acetoacetate", "distractors": ["Pyruvate", "Oxaloacetate", "Fumarate", "Alpha-ketoglutarate"], "rationale": "Lysine maps to Ketogenic products/acetoacetate.", "difficulty": "Challenge"}, {"id": "Q0228", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Entry Points", "q": "Tryptophan enters metabolism through which intermediate/category?", "answer": "Ketogenic products/acetoacetate", "distractors": ["Pyruvate", "Oxaloacetate", "Fumarate", "Alpha-ketoglutarate"], "rationale": "Tryptophan maps to Ketogenic products/acetoacetate.", "difficulty": "Challenge"}, {"id": "R0001", "bank": "review", "lecture": "Review 50", "subtopic": "GLUT/SGLT", "q": "Which transporter is insulin-dependent and primarily found in skeletal muscle and adipose tissue?", "answer": "GLUT4", "distractors": ["GLUT1", "GLUT2", "GLUT3", "GLUT5"], "rationale": "GLUT4 is insulin-dependent; insulin causes GLUT4 translocation to the membrane in muscle and adipose tissue.", "difficulty": "Review Challenge"}, {"id": "R0002", "bank": "review", "lecture": "Review 50", "subtopic": "GLUT/SGLT", "q": "Which transporter is low-affinity, high-capacity, and associated with liver, kidney, pancreas, and intestine?", "answer": "GLUT2", "distractors": ["GLUT1", "GLUT3", "GLUT4", "SGLT1"], "rationale": "GLUT2 functions when glucose is abundant and is important in liver and pancreatic glucose sensing.", "difficulty": "Review Challenge"}, {"id": "R0003", "bank": "review", "lecture": "Review 50", "subtopic": "GLUT/SGLT", "q": "Which transporter is the primary fructose transporter?", "answer": "GLUT5", "distractors": ["GLUT1", "GLUT2", "GLUT3", "GLUT4"], "rationale": "GLUT5 transports fructose, especially in intestinal epithelium.", "difficulty": "Review Challenge"}, {"id": "R0004", "bank": "review", "lecture": "Review 50", "subtopic": "GLUT/SGLT", "q": "Which transporter mediates sodium-dependent glucose absorption in the small intestine?", "answer": "SGLT1", "distractors": ["SGLT2", "GLUT2", "GLUT4", "GLUT5"], "rationale": "SGLT1 uses the sodium gradient to absorb glucose in the small intestine.", "difficulty": "Review Challenge"}, {"id": "R0005", "bank": "review", "lecture": "Review 50", "subtopic": "GLUT/SGLT", "q": "Which transporter is targeted by drugs that increase urinary glucose loss?", "answer": "SGLT2", "distractors": ["SGLT1", "GLUT1", "GLUT3", "GLUT5"], "rationale": "SGLT2 reabsorbs glucose in the kidney; inhibiting it increases glucose excretion.", "difficulty": "Review Challenge"}, {"id": "R0006", "bank": "review", "lecture": "Review 50", "subtopic": "Glycolysis", "q": "Which enzyme performs the committed, rate-limiting step of glycolysis?", "answer": "Phosphofructokinase-1", "distractors": ["Hexokinase", "Glucokinase", "Aldolase", "Pyruvate kinase"], "rationale": "PFK-1 converts fructose-6-phosphate to fructose-1,6-bisphosphate and is the main control point.", "difficulty": "Review Challenge"}, {"id": "R0007", "bank": "review", "lecture": "Review 50", "subtopic": "Glycolysis", "q": "Which glycolysis enzyme is feedback inhibited by glucose-6-phosphate?", "answer": "Hexokinase", "distractors": ["Glucokinase", "PFK-1", "Aldolase", "Pyruvate kinase"], "rationale": "Hexokinase is inhibited by its product, glucose-6-phosphate, preventing excessive trapping of glucose.", "difficulty": "Review Challenge"}, {"id": "R0008", "bank": "review", "lecture": "Review 50", "subtopic": "Glycolysis", "q": "Which glycolysis enzyme is not inhibited by glucose-6-phosphate and is found in liver and pancreatic beta cells?", "answer": "Glucokinase", "distractors": ["Hexokinase", "PFK-1", "Pyruvate kinase", "Aldolase"], "rationale": "Glucokinase keeps working after meals, allowing the liver to take up and store glucose.", "difficulty": "Review Challenge"}, {"id": "R0009", "bank": "review", "lecture": "Review 50", "subtopic": "Glycolysis", "q": "Which glycolysis reaction produces NADH?", "answer": "Glyceraldehyde-3-phosphate to 1,3-bisphosphoglycerate", "distractors": ["Glucose to glucose-6-phosphate", "F6P to F1,6BP", "PEP to pyruvate", "F1,6BP to DHAP and G3P"], "rationale": "Glyceraldehyde-3-phosphate dehydrogenase oxidizes G3P and reduces NAD+ to NADH.", "difficulty": "Review Challenge"}, {"id": "R0010", "bank": "review", "lecture": "Review 50", "subtopic": "Glycolysis", "q": "Which glycolysis enzyme catalyzes the final irreversible step?", "answer": "Pyruvate kinase", "distractors": ["Hexokinase", "PFK-1", "Enolase", "Aldolase"], "rationale": "Pyruvate kinase converts PEP to pyruvate and generates ATP.", "difficulty": "Review Challenge"}, {"id": "R0011", "bank": "review", "lecture": "Review 50", "subtopic": "Glycolysis", "q": "What is the net ATP yield of glycolysis per glucose?", "answer": "2 ATP", "distractors": ["0 ATP", "1 ATP", "4 ATP", "6 ATP"], "rationale": "Glycolysis invests 2 ATP and generates 4 ATP, giving a net of 2 ATP.", "difficulty": "Review Challenge"}, {"id": "R0012", "bank": "review", "lecture": "Review 50", "subtopic": "Glycolysis", "q": "What is the purpose of converting pyruvate to lactate anaerobically?", "answer": "Regenerate NAD+", "distractors": ["Produce FADH2", "Enter the TCA cycle", "Make NADPH", "Release CO2"], "rationale": "Lactate dehydrogenase regenerates NAD+ so glycolysis can continue without oxygen.", "difficulty": "Review Challenge"}, {"id": "R0013", "bank": "review", "lecture": "Review 50", "subtopic": "Fructose/Galactose", "q": "Hereditary fructose intolerance is caused by deficiency of which enzyme?", "answer": "Aldolase B", "distractors": ["Fructokinase", "GALT", "Galactokinase", "G6PD"], "rationale": "Aldolase B deficiency traps fructose as fructose-1-phosphate, impairing glycogenolysis and gluconeogenesis.", "difficulty": "Review Challenge"}, {"id": "R0014", "bank": "review", "lecture": "Review 50", "subtopic": "Fructose/Galactose", "q": "Which molecule accumulates in hereditary fructose intolerance?", "answer": "Fructose-1-phosphate", "distractors": ["Fructose-6-phosphate", "Galactitol", "Ribose-5-phosphate", "2,3-BPG"], "rationale": "Fructose-1-phosphate accumulation drives hypoglycemia and hepatotoxicity.", "difficulty": "Review Challenge"}, {"id": "R0015", "bank": "review", "lecture": "Review 50", "subtopic": "Fructose/Galactose", "q": "Essential fructosuria is caused by deficiency of which enzyme?", "answer": "Fructokinase", "distractors": ["Aldolase B", "GALT", "Hexokinase", "PFK-1"], "rationale": "Fructokinase deficiency is usually benign because fructose is excreted rather than trapped as a toxic phosphate.", "difficulty": "Review Challenge"}, {"id": "R0016", "bank": "review", "lecture": "Review 50", "subtopic": "Fructose/Galactose", "q": "Classic galactosemia is caused by deficiency of which enzyme?", "answer": "Galactose-1-phosphate uridylyltransferase", "distractors": ["Galactokinase", "Aldolase B", "Fructokinase", "Glucose-6-phosphatase"], "rationale": "GALT deficiency causes classic galactosemia.", "difficulty": "Review Challenge"}, {"id": "R0017", "bank": "review", "lecture": "Review 50", "subtopic": "Fructose/Galactose", "q": "Which finding is classically associated with galactosemia in infants?", "answer": "E. coli sepsis", "distractors": ["Myoglobinuria", "Fruity breath", "No lactate rise", "Low orotic acid"], "rationale": "Classic galactosemia is associated with jaundice, cataracts, hepatotoxicity, and E. coli sepsis.", "difficulty": "Review Challenge"}, {"id": "R0018", "bank": "review", "lecture": "Review 50", "subtopic": "Fructose/Galactose", "q": "What causes cataracts in galactosemia?", "answer": "Galactitol accumulation", "distractors": ["Fructose-1-phosphate accumulation", "2,3-BPG accumulation", "Orotic acid accumulation", "Acetone accumulation"], "rationale": "Galactose is reduced to galactitol, which draws water into the lens.", "difficulty": "Review Challenge"}, {"id": "R0019", "bank": "review", "lecture": "Review 50", "subtopic": "Glycogen", "q": "Which enzyme synthesizes glycogen?", "answer": "Glycogen synthase", "distractors": ["Glycogen phosphorylase", "Glucose-6-phosphatase", "Debranching enzyme", "Branching enzyme"], "rationale": "Glycogen synthase builds glycogen chains during glycogenesis.", "difficulty": "Review Challenge"}, {"id": "R0020", "bank": "review", "lecture": "Review 50", "subtopic": "Glycogen", "q": "Which enzyme breaks glycogen down?", "answer": "Glycogen phosphorylase", "distractors": ["Glycogen synthase", "Hexokinase", "G6PD", "Aldolase"], "rationale": "Glycogen phosphorylase performs glycogenolysis.", "difficulty": "Review Challenge"}, {"id": "R0021", "bank": "review", "lecture": "Review 50", "subtopic": "Glycogen", "q": "Which bond forms glycogen branch points?", "answer": "Alpha-1,6 glycosidic bond", "distractors": ["Alpha-1,4 glycosidic bond", "Beta-1,4 glycosidic bond", "Peptide bond", "Ester bond"], "rationale": "Glycogen has alpha-1,4 chains and alpha-1,6 branch points.", "difficulty": "Review Challenge"}, {"id": "R0022", "bank": "review", "lecture": "Review 50", "subtopic": "Glycogen Disorders", "q": "Von Gierke disease is caused by deficiency of which enzyme?", "answer": "Glucose-6-phosphatase", "distractors": ["Lysosomal acid alpha-glucosidase", "Muscle glycogen phosphorylase", "Branching enzyme", "Debranching enzyme"], "rationale": "Without glucose-6-phosphatase, liver cannot release free glucose during fasting.", "difficulty": "Review Challenge"}, {"id": "R0023", "bank": "review", "lecture": "Review 50", "subtopic": "Glycogen Disorders", "q": "Which disease causes cardiomegaly from lysosomal glycogen accumulation?", "answer": "Pompe disease", "distractors": ["Von Gierke disease", "McArdle disease", "Tarui disease", "G6PD deficiency"], "rationale": "Pompe disease is lysosomal acid alpha-glucosidase deficiency.", "difficulty": "Review Challenge"}, {"id": "R0024", "bank": "review", "lecture": "Review 50", "subtopic": "Glycogen Disorders", "q": "McArdle disease is caused by deficiency of which enzyme?", "answer": "Muscle glycogen phosphorylase", "distractors": ["Liver glycogen phosphorylase", "Glucose-6-phosphatase", "Lysosomal acid alpha-glucosidase", "PFK-1"], "rationale": "McArdle disease prevents skeletal muscle glycogen breakdown.", "difficulty": "Review Challenge"}, {"id": "R0025", "bank": "review", "lecture": "Review 50", "subtopic": "Glycogen Disorders", "q": "Which disease presents with exercise intolerance, cramps, and myoglobinuria?", "answer": "McArdle disease", "distractors": ["Von Gierke disease", "Pompe disease", "Classic galactosemia", "Essential fructosuria"], "rationale": "Muscle glycogen phosphorylase deficiency limits energy supply during exercise.", "difficulty": "Review Challenge"}, {"id": "R0026", "bank": "review", "lecture": "Review 50", "subtopic": "PPP/Antioxidants", "q": "Which pathway produces NADPH and ribose-5-phosphate?", "answer": "Pentose phosphate pathway", "distractors": ["Glycolysis", "TCA cycle", "Beta-oxidation", "Urea cycle"], "rationale": "The PPP produces NADPH for reductive reactions and ribose-5-phosphate for nucleotides.", "difficulty": "Review Challenge"}, {"id": "R0027", "bank": "review", "lecture": "Review 50", "subtopic": "PPP/Antioxidants", "q": "Which enzyme is rate-limiting in the pentose phosphate pathway?", "answer": "Glucose-6-phosphate dehydrogenase", "distractors": ["PFK-1", "Pyruvate kinase", "Citrate synthase", "Aldolase"], "rationale": "G6PD catalyzes the key oxidative step that produces NADPH.", "difficulty": "Review Challenge"}, {"id": "R0028", "bank": "review", "lecture": "Review 50", "subtopic": "PPP/Antioxidants", "q": "NADPH protects RBCs by maintaining which molecule?", "answer": "Reduced glutathione", "distractors": ["Oxidized NADH", "FADH2", "Coenzyme A", "Acetyl-CoA"], "rationale": "Reduced glutathione detoxifies oxidative stress; NADPH regenerates it.", "difficulty": "Review Challenge"}, {"id": "R0029", "bank": "review", "lecture": "Review 50", "subtopic": "PPP/Antioxidants", "q": "Which RBC findings are characteristic of G6PD deficiency?", "answer": "Heinz bodies and bite cells", "distractors": ["Spherocytes and Howell-Jolly bodies", "Schistocytes and helmet cells", "Target cells and basophilic stippling", "Hypersegmented neutrophils"], "rationale": "Oxidative damage precipitates hemoglobin as Heinz bodies, which the spleen bites out.", "difficulty": "Review Challenge"}, {"id": "R0030", "bank": "review", "lecture": "Review 50", "subtopic": "Lactate", "q": "Type A lactic acidosis is primarily caused by what?", "answer": "Tissue hypoxia", "distractors": ["Alcohol use without hypoxia", "Aldolase B deficiency", "Excess insulin", "Glucokinase activation"], "rationale": "Type A lactic acidosis results from impaired oxygen delivery/utilization.", "difficulty": "Review Challenge"}, {"id": "R0031", "bank": "review", "lecture": "Review 50", "subtopic": "Lactate", "q": "Type B lactic acidosis is associated with what?", "answer": "Alcohol, liver failure, or medications", "distractors": ["Tissue hypoxia only", "High oxygen delivery", "Reduced NADH", "Increased TCA flux"], "rationale": "Type B is non-hypoxic and can involve impaired lactate clearance or altered redox state.", "difficulty": "Review Challenge"}, {"id": "R0032", "bank": "review", "lecture": "Review 50", "subtopic": "Gluconeogenesis", "q": "Which enzyme converts pyruvate to oxaloacetate?", "answer": "Pyruvate carboxylase", "distractors": ["PEP carboxykinase", "Pyruvate kinase", "PFK-1", "Hexokinase"], "rationale": "Pyruvate carboxylase is a mitochondrial gluconeogenic bypass enzyme.", "difficulty": "Review Challenge"}, {"id": "R0033", "bank": "review", "lecture": "Review 50", "subtopic": "Gluconeogenesis", "q": "Which enzyme converts oxaloacetate to PEP?", "answer": "PEP carboxykinase", "distractors": ["Pyruvate carboxylase", "Pyruvate kinase", "Aldolase", "Hexokinase"], "rationale": "PEPCK converts oxaloacetate to phosphoenolpyruvate.", "difficulty": "Review Challenge"}, {"id": "R0034", "bank": "review", "lecture": "Review 50", "subtopic": "Gluconeogenesis", "q": "Which enzyme bypasses PFK-1 in gluconeogenesis?", "answer": "Fructose-1,6-bisphosphatase", "distractors": ["Glucose-6-phosphatase", "Pyruvate carboxylase", "PEPCK", "Pyruvate kinase"], "rationale": "Fructose-1,6-bisphosphatase reverses the committed glycolysis control point.", "difficulty": "Review Challenge"}, {"id": "R0035", "bank": "review", "lecture": "Review 50", "subtopic": "Gluconeogenesis", "q": "Which enzyme lets liver release free glucose into blood?", "answer": "Glucose-6-phosphatase", "distractors": ["Hexokinase", "Glucokinase", "PFK-1", "Aldolase"], "rationale": "Glucose-6-phosphatase removes the phosphate so glucose can exit the cell.", "difficulty": "Review Challenge"}, {"id": "R0036", "bank": "review", "lecture": "Review 50", "subtopic": "Membranes", "q": "Phospholipids form bilayers because they are what?", "answer": "Amphipathic", "distractors": ["Fully hydrophobic", "Fully hydrophilic", "Steroidal", "Enzymatic"], "rationale": "They have hydrophilic heads and hydrophobic tails.", "difficulty": "Review Challenge"}, {"id": "R0037", "bank": "review", "lecture": "Review 50", "subtopic": "Membranes", "q": "Which membrane lipid buffers membrane fluidity across temperature changes?", "answer": "Cholesterol", "distractors": ["Phosphatidylserine", "Cardiolipin", "Sphingomyelin", "Triacylglycerol"], "rationale": "Cholesterol stiffens membranes at high temperature and prevents tight packing at low temperature.", "difficulty": "Review Challenge"}, {"id": "R0038", "bank": "review", "lecture": "Review 50", "subtopic": "Membranes", "q": "Diphosphatidylglycerol is also known as what?", "answer": "Cardiolipin", "distractors": ["Sphingomyelin", "Phosphatidylserine", "Phosphatidylcholine", "Phosphatidylinositol"], "rationale": "Cardiolipin is concentrated in the inner mitochondrial membrane.", "difficulty": "Review Challenge"}, {"id": "R0039", "bank": "review", "lecture": "Review 50", "subtopic": "Membranes", "q": "Externalization of phosphatidylserine signals what process?", "answer": "Apoptosis", "distractors": ["Glycolysis", "Beta-oxidation", "Glycogenesis", "Ketogenesis"], "rationale": "External PS acts as an eat-me signal for apoptotic clearance.", "difficulty": "Review Challenge"}, {"id": "R0040", "bank": "review", "lecture": "Review 50", "subtopic": "Membranes", "q": "Which phospholipid is a precursor for IP3 and DAG signaling?", "answer": "Phosphatidylinositol", "distractors": ["Phosphatidylcholine", "Phosphatidylserine", "Sphingomyelin", "Cardiolipin"], "rationale": "PIP2, derived from phosphatidylinositol, is cleaved into IP3 and DAG.", "difficulty": "Review Challenge"}, {"id": "R0041", "bank": "review", "lecture": "Review 50", "subtopic": "Membranes", "q": "Which phospholipid is especially important in myelin sheaths?", "answer": "Sphingomyelin", "distractors": ["Cardiolipin", "Phosphatidylserine", "Phosphatidylinositol", "Phosphatidylethanolamine"], "rationale": "Sphingomyelin supports myelin structure and nerve conduction.", "difficulty": "Review Challenge"}, {"id": "R0042", "bank": "review", "lecture": "Review 50", "subtopic": "Membranes", "q": "Na+/K+ ATPase pumps what per ATP?", "answer": "3 Na+ out and 2 K+ in", "distractors": ["2 Na+ out and 3 K+ in", "3 K+ in and 2 Na+ out", "1 Na+ out and 1 K+ in", "4 Na+ out and 4 K+ in"], "rationale": "The sodium-potassium pump maintains electrochemical gradients.", "difficulty": "Review Challenge"}, {"id": "R0043", "bank": "review", "lecture": "Review 50", "subtopic": "GPCR", "q": "GPCR activation causes the alpha subunit to exchange what?", "answer": "GDP for GTP", "distractors": ["GTP for GDP", "NADH for NAD+", "FAD for FADH2", "ATP for AMP"], "rationale": "Ligand binding promotes GDP release and GTP binding on the alpha subunit.", "difficulty": "Review Challenge"}, {"id": "R0044", "bank": "review", "lecture": "Review 50", "subtopic": "GPCR", "q": "Gs signaling does what to cAMP?", "answer": "Increases cAMP", "distractors": ["Decreases cAMP", "Cleaves PIP2", "Releases calcium directly", "Blocks adenylyl cyclase"], "rationale": "Gs stimulates adenylyl cyclase, increasing cAMP.", "difficulty": "Review Challenge"}, {"id": "R0045", "bank": "review", "lecture": "Review 50", "subtopic": "GPCR", "q": "Gi signaling does what to cAMP?", "answer": "Decreases cAMP", "distractors": ["Increases cAMP", "Produces IP3", "Produces DAG", "Activates PLC"], "rationale": "Gi inhibits adenylyl cyclase, lowering cAMP.", "difficulty": "Review Challenge"}, {"id": "R0046", "bank": "review", "lecture": "Review 50", "subtopic": "GPCR", "q": "Gq signaling activates which enzyme?", "answer": "Phospholipase C", "distractors": ["Adenylyl cyclase", "Protein kinase A", "ATP synthase", "G6PD"], "rationale": "Gq activates PLC, which cleaves PIP2 into IP3 and DAG.", "difficulty": "Review Challenge"}, {"id": "R0047", "bank": "review", "lecture": "Review 50", "subtopic": "GPCR", "q": "IP3 causes release of which ion from the ER?", "answer": "Calcium", "distractors": ["Sodium", "Potassium", "Chloride", "Iron"], "rationale": "IP3 opens ER calcium channels.", "difficulty": "Review Challenge"}, {"id": "R0048", "bank": "review", "lecture": "Review 50", "subtopic": "GPCR", "q": "DAG activates which kinase?", "answer": "Protein kinase C", "distractors": ["Protein kinase A", "Pyruvate kinase", "Hexokinase", "Citrate synthase"], "rationale": "DAG remains in the membrane and activates PKC.", "difficulty": "Review Challenge"}, {"id": "R0049", "bank": "review", "lecture": "Review 50", "subtopic": "GPCR", "q": "D1, H2, V2, beta-1, and beta-2 receptors are coupled to what?", "answer": "Gs", "distractors": ["Gi", "Gq", "GLUT4", "SGLT2"], "rationale": "These receptors increase cAMP through Gs.", "difficulty": "Review Challenge"}, {"id": "R0050", "bank": "review", "lecture": "Review 50", "subtopic": "GPCR", "q": "M2, alpha-2, and D2 receptors are coupled to what?", "answer": "Gi", "distractors": ["Gs", "Gq", "GLUT5", "SGLT1"], "rationale": "These receptors inhibit cAMP through Gi.", "difficulty": "Review Challenge"}, {"id": "R0051", "bank": "review", "lecture": "Review 50", "subtopic": "GPCR", "q": "H1, alpha-1, V1, M1, and M3 receptors are coupled to what?", "answer": "Gq", "distractors": ["Gs", "Gi", "GLUT2", "Complex I"], "rationale": "These receptors activate PLC through Gq.", "difficulty": "Review Challenge"}, {"id": "R0052", "bank": "review", "lecture": "Review 50", "subtopic": "Acid Drugs", "q": "H2 blockers usually end with which suffix?", "answer": "-idine", "distractors": ["-azole", "-pril", "-sartan", "-olol"], "rationale": "Cimetidine and famotidine are H2 blockers.", "difficulty": "Review Challenge"}, {"id": "R0053", "bank": "review", "lecture": "Review 50", "subtopic": "Acid Drugs", "q": "Proton pump inhibitors usually end with which suffix?", "answer": "-azole", "distractors": ["-idine", "-pril", "-sartan", "-olol"], "rationale": "Omeprazole and pantoprazole are PPIs.", "difficulty": "Review Challenge"}, {"id": "R0054", "bank": "review", "lecture": "Review 50", "subtopic": "Acid Drugs", "q": "Omeprazole inhibits which pump?", "answer": "H+/K+ ATPase", "distractors": ["Na+/K+ ATPase", "Complex V", "SGLT2", "Ca2+ ATPase"], "rationale": "PPIs inhibit the gastric proton pump.", "difficulty": "Review Challenge"}, {"id": "R0055", "bank": "review", "lecture": "Review 50", "subtopic": "TCA", "q": "Which enzyme forms citrate from oxaloacetate and acetyl-CoA?", "answer": "Citrate synthase", "distractors": ["Aconitase", "Isocitrate dehydrogenase", "Succinate dehydrogenase", "Fumarase"], "rationale": "Citrate synthase begins the TCA cycle.", "difficulty": "Review Challenge"}, {"id": "R0056", "bank": "review", "lecture": "Review 50", "subtopic": "TCA", "q": "Which enzyme is rate-limiting in the TCA cycle?", "answer": "Isocitrate dehydrogenase", "distractors": ["Citrate synthase", "Succinate dehydrogenase", "Malate dehydrogenase", "Fumarase"], "rationale": "Isocitrate dehydrogenase is the primary regulated step.", "difficulty": "Review Challenge"}, {"id": "R0057", "bank": "review", "lecture": "Review 50", "subtopic": "TCA", "q": "Which TCA enzyme is also ETC Complex II?", "answer": "Succinate dehydrogenase", "distractors": ["Citrate synthase", "Aconitase", "Fumarase", "Malate dehydrogenase"], "rationale": "Succinate dehydrogenase is embedded in the inner mitochondrial membrane as Complex II.", "difficulty": "Review Challenge"}, {"id": "R0058", "bank": "review", "lecture": "Review 50", "subtopic": "TCA", "q": "One TCA turn produces how many NADH?", "answer": "3", "distractors": ["1", "2", "4", "6"], "rationale": "One acetyl-CoA produces three NADH in the TCA cycle.", "difficulty": "Review Challenge"}, {"id": "R0059", "bank": "review", "lecture": "Review 50", "subtopic": "TCA", "q": "One TCA turn produces how many FADH2?", "answer": "1", "distractors": ["0", "2", "3", "4"], "rationale": "Succinate dehydrogenase produces one FADH2 per turn.", "difficulty": "Review Challenge"}, {"id": "R0060", "bank": "review", "lecture": "Review 50", "subtopic": "TCA", "q": "One TCA turn produces how many GTP?", "answer": "1", "distractors": ["0", "2", "3", "4"], "rationale": "Succinyl-CoA synthetase produces one GTP per turn.", "difficulty": "Review Challenge"}, {"id": "R0061", "bank": "review", "lecture": "Review 50", "subtopic": "TCA", "q": "Which TCA intermediate supports heme synthesis?", "answer": "Succinyl-CoA", "distractors": ["Citrate", "Isocitrate", "Fumarate", "Malate"], "rationale": "Succinyl-CoA is used in heme synthesis.", "difficulty": "Review Challenge"}, {"id": "R0062", "bank": "review", "lecture": "Review 50", "subtopic": "TCA", "q": "Which TCA intermediate can feed gluconeogenesis?", "answer": "Oxaloacetate", "distractors": ["Succinate", "Citrate", "Fumarate", "Succinyl-CoA"], "rationale": "Oxaloacetate can be converted toward PEP for gluconeogenesis.", "difficulty": "Review Challenge"}, {"id": "R0063", "bank": "review", "lecture": "Review 50", "subtopic": "Pyruvate Oxidation", "q": "Which enzyme converts pyruvate to acetyl-CoA?", "answer": "Pyruvate dehydrogenase", "distractors": ["Pyruvate kinase", "Pyruvate carboxylase", "Lactate dehydrogenase", "PEPCK"], "rationale": "PDH links glycolysis to the TCA cycle.", "difficulty": "Review Challenge"}, {"id": "R0064", "bank": "review", "lecture": "Review 50", "subtopic": "Pyruvate Oxidation", "q": "Pyruvate dehydrogenase requires which vitamin?", "answer": "Thiamine (B1)", "distractors": ["Riboflavin (B2)", "Niacin (B3)", "Biotin (B7)", "Folate (B9)"], "rationale": "PDH requires thiamine pyrophosphate.", "difficulty": "Review Challenge"}, {"id": "R0065", "bank": "review", "lecture": "Review 50", "subtopic": "ETC", "q": "NADH enters the electron transport chain at which complex?", "answer": "Complex I", "distractors": ["Complex II", "Complex III", "Complex IV", "Complex V"], "rationale": "NADH donates electrons to Complex I.", "difficulty": "Review Challenge"}, {"id": "R0066", "bank": "review", "lecture": "Review 50", "subtopic": "ETC", "q": "FADH2 enters the electron transport chain at which complex?", "answer": "Complex II", "distractors": ["Complex I", "Complex III", "Complex IV", "Complex V"], "rationale": "FADH2 donates through Complex II.", "difficulty": "Review Challenge"}, {"id": "R0067", "bank": "review", "lecture": "Review 50", "subtopic": "ETC", "q": "Which ETC complex does not pump protons?", "answer": "Complex II", "distractors": ["Complex I", "Complex III", "Complex IV", "Complex V"], "rationale": "Complex II passes electrons but does not pump H+.", "difficulty": "Review Challenge"}, {"id": "R0068", "bank": "review", "lecture": "Review 50", "subtopic": "ETC", "q": "Which complexes pump protons?", "answer": "Complexes I, III, and IV", "distractors": ["Complexes I, II, and III", "Complexes II, III, and IV", "Complexes I and II only", "Complex V only"], "rationale": "I, III, and IV generate the proton gradient.", "difficulty": "Review Challenge"}, {"id": "R0069", "bank": "review", "lecture": "Review 50", "subtopic": "ETC", "q": "The final electron acceptor in the ETC is what?", "answer": "Oxygen", "distractors": ["Carbon dioxide", "NAD+", "FAD", "Water"], "rationale": "Oxygen accepts electrons at Complex IV and is reduced to water.", "difficulty": "Review Challenge"}, {"id": "R0070", "bank": "review", "lecture": "Review 50", "subtopic": "ETC", "q": "Rotenone inhibits which complex?", "answer": "Complex I", "distractors": ["Complex II", "Complex III", "Complex IV", "Complex V"], "rationale": "Rotenone blocks electron transfer from NADH to CoQ.", "difficulty": "Review Challenge"}, {"id": "R0071", "bank": "review", "lecture": "Review 50", "subtopic": "ETC", "q": "Antimycin A inhibits which complex?", "answer": "Complex III", "distractors": ["Complex I", "Complex II", "Complex IV", "Complex V"], "rationale": "Antimycin A blocks Complex III.", "difficulty": "Review Challenge"}, {"id": "R0072", "bank": "review", "lecture": "Review 50", "subtopic": "ETC", "q": "Cyanide and carbon monoxide inhibit which complex?", "answer": "Complex IV", "distractors": ["Complex I", "Complex II", "Complex III", "Complex V"], "rationale": "They prevent oxygen from accepting electrons.", "difficulty": "Review Challenge"}, {"id": "R0073", "bank": "review", "lecture": "Review 50", "subtopic": "ATP Yield", "q": "NADH yields approximately how many ATP?", "answer": "2.5 ATP", "distractors": ["1 ATP", "1.5 ATP", "3 ATP", "5 ATP"], "rationale": "NADH entry at Complex I pumps more protons, yielding about 2.5 ATP.", "difficulty": "Review Challenge"}, {"id": "R0074", "bank": "review", "lecture": "Review 50", "subtopic": "ATP Yield", "q": "FADH2 yields approximately how many ATP?", "answer": "1.5 ATP", "distractors": ["1 ATP", "2.5 ATP", "3 ATP", "5 ATP"], "rationale": "FADH2 enters at Complex II and bypasses Complex I proton pumping.", "difficulty": "Review Challenge"}, {"id": "R0075", "bank": "review", "lecture": "Review 50", "subtopic": "ATP Yield", "q": "Complete oxidation of one glucose yields approximately how many ATP?", "answer": "30–32 ATP", "distractors": ["2 ATP", "12–15 ATP", "20 ATP", "50 ATP"], "rationale": "Modern estimates are 30–32 ATP depending on shuttle use.", "difficulty": "Review Challenge"}, {"id": "R0076", "bank": "review", "lecture": "Review 50", "subtopic": "ROS", "q": "Most ETC-derived superoxide is generated at which complexes?", "answer": "Complex I and Complex III", "distractors": ["Complex II and V", "Complex IV and V", "Complex V only", "Complex II only"], "rationale": "Electron leakage at  "Review 50", "subtopic": "TAG/Lipids", "q": "Dietary lipids are packaged in intestinal cells into what?", "answer": "Chylomicrons", "distractors": ["LDL", "HDL", "VLDL", "Albumin"], "rationale": "Chylomicrons transport dietary TAGs through lymph and blood.", "difficulty": "Review Challenge"}, {"id": "R0083", "bank": "review", "lecture": "Review 50", "subtopic": "TAG/Lipids", "q": "Which enzyme mobilizes stored TAGs during fasting?", "answer": "Hormone-sensitive lipase", "distractors": ["Pancreatic lipase", "Acetyl-CoA carboxylase", "Fatty acid synthase", "Glycogen synthase"], "rationale": "HSL releases glycerol and free fatty acids from adipose stores.", "difficulty": "Review Challenge"}, {"id": "R0084", "bank": "review", "lecture": "Review 50", "subtopic": "Glycerol", "q": "Glycerol is first converted into what?", "answer": "Glycerol-3-phosphate", "distractors": ["Glyceraldehyde-3-phosphate", "Glucose-6-phosphate", "Fructose-1-phosphate", "Malonyl-CoA"], "rationale": "Glycerol becomes glycerol-3-phosphate before becoming DHAP.", "difficulty": "Review Challenge"}, {"id": "R0085", "bank": "review", "lecture": "Review 50", "subtopic": "Glycerol", "q": "Glycerol-3-phosphate is oxidized into what glycolysis/gluconeogenesis intermediate?", "answer": "Dihydroxyacetone phosphate", "distractors": ["Pyruvate", "Acetyl-CoA", "Oxaloacetate", "Ribose-5-phosphate"], "rationale": "DHAP links glycerol metabolism to carbohydrate metabolism.", "difficulty": "Review Challenge"}, {"id": "R0086", "bank": "review", "lecture": "Review 50", "subtopic": "Beta-Oxidation", "q": "Beta-oxidation occurs in which compartment?", "answer": "Mitochondrial matrix", "distractors": ["Cytosol", "Nucleus", "Lysosome", "Golgi"], "rationale": "Fatty acids are oxidized in the mitochondrial matrix.", "difficulty": "Review Challenge"}, {"id": "R0087", "bank": "review", "lecture": "Review 50", "subtopic": "Beta-Oxidation", "q": "Which enzyme is rate-limiting in the carnitine shuttle?", "answer": "CPT-I", "distractors": ["CPT-II", "Acyl-CoA synthetase", "Thiolase", "Fatty acid synthase"], "rationale": "CPT-I controls long-chain fatty acid entry into mitochondria.", "difficulty": "Review Challenge"}, {"id": "R0088", "bank": "review", "lecture": "Review 50", "subtopic": "Beta-Oxidation", "q": "One round of beta-oxidation produces what?", "answer": "1 FADH2, 1 NADH, and 1 acetyl-CoA", "distractors": ["2 NADPH and 1 GTP", "1 NADPH and 1 lactate", "2 FADH2 only", "1 GTP and 1 CO2"], "rationale": "Each cycle shortens the fatty acid by two carbons.", "difficulty": "Review Challenge"}, {"id": "R0089", "bank": "review", "lecture": "Review 50", "subtopic": "Beta-Oxidation", "q": "Which enzyme performs the final cleavage step of beta-oxidation?", "answer": "Thiolase", "distractors": ["Hydratase", "Dehydrogenase", "CPT-I", "Acetyl-CoA carboxylase"], "rationale": "Thiolase releases acetyl-CoA.", "difficulty": "Review Challenge"}, {"id": "R0090", "bank": "review", "lecture": "Review 50", "subtopic": "Fatty Acid Synthesis", "q": "Fatty acid synthesis occurs in which compartment?", "answer": "Cytosol", "distractors": ["Mitochondrial matrix", "Nucleus", "Lysosome", "Intermembrane space"], "rationale": "De novo fatty acid synthesis is cytosolic.", "difficulty": "Review Challenge"}, {"id": "R0091", "bank": "review", "lecture": "Review 50", "subtopic": "Fatty Acid Synthesis", "q": "Which enzyme is rate-limiting in fatty acid synthesis?", "answer": "Acetyl-CoA carboxylase", "distractors": ["Fatty acid synthase", "CPT-I", "Hormone-sensitive lipase", "Pancreatic lipase"], "rationale": "ACC converts acetyl-CoA to malonyl-CoA.", "difficulty": "Review Challenge"}, {"id": "R0092", "bank": "review", "lecture": "Review 50", "subtopic": "Fatty Acid Synthesis", "q": "Malonyl-CoA inhibits which enzyme?", "answer": "CPT-I", "distractors": ["CPT-II", "PFK-1", "G6PD", "CPS-I"], "rationale": "Malonyl-CoA prevents simultaneous fatty acid synthesis and oxidation.", "difficulty": "Review Challenge"}, {"id": h hormone?", "answer": "Insulin", "distractors": ["Glucagon", "Epinephrine", "Cortisol", "Thyroxine"], "rationale": "Insulin deficiency drives lipolysis, ketogenesis, hyperglycemia, and acidosis.", "difficulty": "Review Challenge"}, {"id": "R0099", "bank": "review", "lecture": "Review 50", "subtopic": "Ketones/DKA", "q": "Standard DKA treatment includes what?", "answer": "IV fluids and insulin", "distractors": ["L-carnitine only", "Thiamine only", "Avoid galactose", "Low phenylalanine diet"], "rationale": "Fluids and insulin correct dehydration, hyperglycemia, and ketogenesis.", "difficulty": "Review Challenge"}, {"id": "R0100", "bank": "review", "lecture": "Review 50", "subtopic": "Urea/Amino Acids", "q": "The urea cycle detoxifies which molecule?", "answer": "Ammonia", "distractors": ["Glucose", "Palmitate", "Cholesterol", "Fructose"], "rationale": "Ammonia is toxic and is converted to urea for excretion.", "difficulty": "Review Challenge"}]</script>

var PREFIX="bio_stable";
function qs(id){return document.getElementById(id);}
function showErr(e){var box=qs("errorBox"); if(box) box.innerHTML='<div class="err">App error: '+String(e&&e.message?e.message:e)+'</div>'; console.error(e);}
window.onerror=function(msg,src,line,col,err){showErr(err||msg);};
var BANK=JSON.parse(qs("question-data").textContent);
var LECTURE=BANK.filter(function(q){return q.bank!=="review";});
var REVIEW=BANK.filter(function(q){return q.bank==="review";});
var ALL=BANK.slice();
var letters=["A","B","C","D","E"];
var selectedLecture="All", selectedCount=20, quiz=[], idx=0, answers=[], conf=[], saved=[], mode="practice", started=0, qStarted=0, timer=null;
function k(x){return PREFIX+"_"+x;}
function load(x,f){try{var v=localStorage.getItem(k(x)); return v?JSON.parse(v):f;}catch(e){return f;}}
function save(x,v){try{localStorage.setItem(k(x),JSON.stringify(v));}catch(e){}}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m];});}
function shuffle(a){a=a.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t;} return a;}
function fmt(sec){sec=Math.max(0,Math.floor(sec)); return String(Math.floor(sec/60)).padStart(2,"0")+":"+String(sec%60).padStart(2,"0");}
function setScreen(name){["home","quiz","results","weak","analytics","settings"].forEach(function(id){qs(id).classList.toggle("hidden",id!==name);}); ["tabHome","tabAnalytics","tabSettings"].forEach(function(id){qs(id).classList.remove("active");}); if(name==="analytics")qs("tabAnalytics").classList.add("active"); else if(name==="settings")qs("tabSettings").classList.add("active"); else qs("tabHome").classList.add("active"); if(name==="home")buildHome(); if(name==="analytics")renderAnalytics(); if(name==="settings")renderSettings(); if(name==="weak")renderWeak(); window.scrollTo(0,0);}
function stat(){var p=Object.values(load("prog",{})); var total=p.reduce(function(a,b){return a+b.total;},0), right=p.reduce(function(a,b){return a+b.right;},0); var acc=total?Math.round(right/total*100):0; var miss=Object.keys(load("miss",{})).length, weak=Object.keys(load("weak",{})).length; var wt=p.filter(function(x){return x.total>=2 && x.right/x.total<.8;}).length; var wc=miss+weak+wt; var prep=total?Math.max(0,Math.min(100,acc-Math.min(15,Math.round(wc/5)))):0; return {p:p,total:total,right:right,acc:acc,wc:wc,prep:prep};}
function updateHeader(){var s=stat(); qs("prepared").innerHTML="<strong>"+s.prep+"%</strong><span> Prepared</span>"; qs("weaknum").innerHTML="<strong>"+s.wc+"</strong><span> Weak</span>";}
function buildHome(){updateHeader(); var lectures=["All"]; LECTURE.forEach(function(q){if(lectures.indexOf(q.lecture)<0)lectures.push(q.lecture);}); var g=qs("lectureGrid"); g.innerHTML=""; lectures.forEach(function(name){var n=name==="All"?LECTURE.length:LECTURE.filter(function(q){return q.lecture===name;}).length; var b=document.createElement("button"); b.className="tile"+(name===selectedLecture?" selected":""); b.innerHTML="<strong>"+esc(name)+"</strong><br><span class='small'>"+n+" questions</span>"; b.onclick=function(){selectedLecture=name; buildHome();}; g.appendChild(b);}); var r=qs("countRange"), num=qs("countNum"), hint=qs("countHint"); r.value=selectedCount; num.value=selectedCount; hint.textContent=selectedCount+" question"+(selectedCount===1?"":"s")+" selected"; r.oninput=function(){selectedCount=Number(r.value); num.value=selectedCount; hint.textContent=selectedCount+" question"+(selectedCount===1?"":"s")+" selected";}; num.oninput=function(){selectedCount=Math.max(1,Math.min(100,Number(num.value)||1)); r.value=selectedCount; hint.textContent=selectedCount+" question"+(selectedCount===1?"":"s")+" selected";};}
function lecturePool(){return selectedLecture==="All"?LECTURE:LECTURE.filter(function(q){return q.lecture===selectedLecture;});}
function weakPool(){var miss=load("miss",{}), weak=load("weak",{}), prog=load("prog",{}); var keys=Object.keys(prog).filter(function(x){return prog[x].total>=2 && prog[x].right/prog[x].total<.8;}); var arr=ALL.filter(function(q){return miss[q.id]||weak[q.id]||keys.indexOf(q.lecture+"|"+q.subtopic)>=0;}); return arr.length?arr:LECTURE;}
function makeQ(q){var opts=shuffle([q.answer].concat(q.distractors)).slice(0,5); if(opts.indexOf(q.answer)<0)opts[0]=q.answer; opts=shuffle(opts); var n={}; Object.keys(q).forEach(function(k){n[k]=q[k];}); n.options=opts; n.correct=opts.indexOf(q.answer); return n;}
function start(m,count){mode=m; var pool=m==="review"?REVIEW:m==="weak"?weakPool():lecturePool(); if(!pool.length){alert("No questions available");return;} var n=Math.min(count||selectedCount,pool.length); quiz=shuffle(pool).slice(0,n).map(makeQ); idx=0; answers=new Array(n).fill(null); conf=new Array(n).fill(""); saved=new Array(n).fill(false); started=Date.now(); qStarted=Date.now(); clearInterval(timer); timer=setInterval(function(){qs("clock").textContent=fmt((Date.now()-started)/1000);},500); setScreen("quiz"); renderQuestion();}
function renderQuestion(){var q=quiz[idx], chosen=answers[idx], answered=chosen!==null; qs("bar").style.width=((idx+1)/quiz.length*100)+"%"; qs("qnum").textContent="Question "+(idx+1)+" / "+quiz.length; qs("score").textContent="Score: "+answers.filter(function(a,i){return a===quiz[i].correct;}).length; var h="<span class='tag'>"+esc(q.lecture)+" · "+esc(q.subtopic)+"</span><div class='qtext'>"+esc(q.q)+"</div>"; q.options.forEach(function(op,i){var cls="option"; if(answered)cls+=i===q.correct?" correct":i===chosen?" wrong":" dim"; h+="<button class='"+cls+"' "+(answered?"disabled":"")+" data-choice='"+i+"'><span class='letter'>"+letters[i]+"</span><span>"+esc(op)+"</span></button>";}); if(answered)h+="<div class='explain'><strong>"+(chosen===q.correct?"Correct.":"Correct answer: "+letters[q.correct]+" — "+esc(q.answer))+"</strong><br><br>"+esc(q.rationale)+"<div class='confrow'><button class='confbtn' data-conf='knew'>I knew that</button><button class='confbtn' data-conf='guessed'>I guessed</button><button class='confbtn' data-conf='dontknow'>I don’t fucking know</button><button class='confbtn' data-conf='tricked'>I got tricked</button></div><button class='flagbtn' data-flag='1'>Flag bad question / remove</button></div>"; qs("qslot").innerHTML=h; document.querySelectorAll("[data-choice]").forEach(function(b){b.onclick=function(){answers[idx]=Number(b.getAttribute("data-choice")); if(!conf[idx])conf[idx]="guessed"; saveAnswer(idx); renderQuestion();};}); document.querySelectorAll("[data-conf]").forEach(function(b){b.onclick=function(){conf[idx]=b.getAttribute("data-conf"); if(conf[idx]==="guessed"||conf[idx]==="dontknow"||conf[idx]==="tricked"){var wk=load("weak",{}); wk[q.id]=true; save("weak",wk);} saveConf(idx); updateHeader(); setTimeout(nextQuestion,250);};}); document.querySelectorAll("[data-flag]").forEach(function(b){b.onclick=function(){var fl=load("flagged",{}); fl[q.id]=true; save("flagged",fl); b.textContent="Flagged"; b.disabled=true;};}); qs("next").disabled=!answered; qs("prev").disabled=idx===0; qs("next").textContent=idx===quiz.length-1?"Finish":"Next";}
function saveAnswer(i){if(saved[i]||answers[i]===null)return; var q=quiz[i], ok=answers[i]===q.correct, t=Math.max(1,Math.round((Date.now()-qStarted)/1000)); var prog=load("prog",{}), miss=load("miss",{}), hist=load("hist",[]); var key=q.lecture+"|"+q.subtopic; if(!prog[key])prog[key]={lecture:q.lecture,subtopic:q.subtopic,right:0,total:0,time:0}; prog[key].total++; prog[key].time+=t; if(ok){prog[key].right++; delete miss[q.id];} else miss[q.id]=true; hist.push({date:Date.now(),right:ok?1:0,time:t,lecture:q.lecture,subtopic:q.subtopic,conf:conf[i]}); save("prog",prog); save("miss",miss); save("hist",hist.slice(-1000)); saved[i]=true; updateHeader();}
function saveConf(i){var q=quiz[i], ok=answers[i]===q.correct; var c=load("conf",{knew:{r:0,t:0},guessed:{r:0,t:0},dontknow:{r:0,t:0},tricked:{r:0,t:0}}); var x=conf[i]; if(c[x]){c[x].t++; if(ok)c[x].r++;} save("conf",c);}
function nextQuestion(){if(idx<quiz.length-1){idx++; qStarted=Date.now(); renderQuestion(); window.scrollTo(0,0);} else finish();}
function finish(){clearInterval(timer); var right=answers.filter(function(a,i){return a===quiz[i].correct;}).length; var pct=Math.round(right/quiz.length*100); qs("results").innerHTML="<section class='card'><div class='label'>Results</div><div class='result'>"+pct+"%</div><div class='small'>"+right+" / "+quiz.length+" correct</div><div class='nav'><button class='secondary' data-action='home'>Home</button><button class='primaryBtn' data-action='weak'>Weak Areas</button></div></section>"; setScreen("results");}
function renderWeak(){var arr=weakPool(); qs("weak").innerHTML="<section class='card'><div class='label'>Weak Areas</div><div class='small'>Guessed, tricked, missed, and low-performing topics.</div><button class='primaryBtn' data-action='weakStart' style='width:100%;margin-top:12px'>Start Weak Quiz</button></section><section class='card'><div class='label'>Weak Pool</div><table>"+(arr.slice(0,25).map(function(q){return "<tr><td><strong>"+esc(q.subtopic)+"</strong><br><span class='small'>"+esc(q.q)+"</span></td></tr>";}).join("")||"<tr><td class='small'>No weak questions yet.</td></tr>")+"</table></section>";}
function renderAnalytics(){var s=stat(), hist=load("hist",[]), avg=hist.length?Math.round(hist.reduce(function(a,b){return a+(b.time||0);},0)/hist.length):0, confs=load("conf",{knew:{r:0,t:0},guessed:{r:0,t:0},dontknow:{r:0,t:0},tricked:{r:0,t:0}}); function row(k,l){var x=confs[k]||{r:0,t:0}; return "<tr><td><strong>"+l+"</strong></td><td>"+(x.t?Math.round(x.r/x.t*100)+"%":"—")+"<br><span class='small'>"+x.r+"/"+x.t+"</span></td></tr>";} var topics=s.p.slice().sort(function(a,b){return a.right/a.total-b.right/b.total;}).slice(0,10).map(function(x){return "<tr><td><strong>"+esc(x.subtopic)+"</strong><br><span class='small'>"+esc(x.lecture)+"</span></td><td>"+Math.round(x.right/x.total*100)+"%<br><span class='small'>"+x.right+"/"+x.total+"</span></td></tr>";}).join(""); qs("analytics").innerHTML="<section class='card'><div class='label'>Analytics</div><div class='kpi'><div class='box'><span class='small'>Prepared</span><strong>"+s.prep+"%</strong></div><div class='box'><span class='small'>Accuracy</span><strong>"+s.acc+"%</strong></div><div class='box'><span class='small'>Answered</span><strong>"+s.total+"</strong></div></div><div class='small' style='margin-top:10px'>Average: "+avg+" sec/question</div></section><section class='card'><div class='label'>Confidence</div><table>"+row("knew","I knew that")+row("guessed","I guessed")+row("dontknow","I don’t fucking know")+row("tricked","I got tricked")+"</table></section><section class='card'><div class='label'>Lowest Topics</div><table>"+topics+"</table></section>";}
function renderSettings(){qs("settings").innerHTML="<section class='card'><div class='label'>Settings</div><button class='danger' data-action='reset' style='width:100%'>Reset Progress</button></section>";}
document.addEventListener("click",function(e){var b=e.target.closest("[data-action]"); if(!b)return; var a=b.getAttribute("data-action"); if(a==="home")setScreen("home"); if(a==="analytics")setScreen("analytics"); if(a==="settings")setScreen("settings"); if(a==="practice"){selectedLecture="All";start("practice");} if(a==="review")start("review",50); if(a==="weak")setScreen("weak"); if(a==="weakStart")start("weak"); if(a==="custom")qs("custom").classList.toggle("hidden"); if(a==="startCustom")start("practice"); if(a==="prev"&&idx>0){idx--;qStarted=Date.now();renderQuestion();} if(a==="next"&&answers[idx]!==null)nextQuestion(); if(a==="quit")setScreen("home"); if(a==="reset"){if(confirm("Reset all progress?")){["prog","miss","weak","hist","conf","flagged"].forEach(function(x){localStorage.removeItem(k(x));}); updateHeader(); renderSettings();}}});
buildHome();
}catch(e){showErr(e);}
})();
</script>
</body>
</html>
