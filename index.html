const BANK = [{"id": "Q0001", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "q": "Glycolysis occurs in which cellular compartment?", "answer": "Cytosol", "distractors": ["Mitochondrial matrix", "Inner mitochondrial membrane", "Nucleus", "Lysosome"], "rationale": "Glycolysis occurs in the cytosol, which is why RBCs can use glycolysis despite lacking mitochondria."}, {"id": "Q0002", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "q": "Which enzyme is the rate-limiting enzyme of glycolysis?", "answer": "Phosphofructokinase-1", "distractors": ["Hexokinase", "Glucokinase", "Pyruvate kinase", "Aldolase"], "rationale": "PFK-1 is the committed, rate-limiting step of glycolysis."}, {"id": "Q0003", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "q": "Which enzyme converts glucose to glucose-6-phosphate in most tissues?", "answer": "Hexokinase", "distractors": ["Glucokinase", "Phosphofructokinase-1", "Pyruvate kinase", "Aldolase"], "rationale": "Hexokinase traps glucose in cells as glucose-6-phosphate. Glucokinase mainly functions in liver and pancreatic beta cells."}, {"id": "Q0004", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "q": "Which enzyme converts phosphoenolpyruvate to pyruvate?", "answer": "Pyruvate kinase", "distractors": ["Hexokinase", "Phosphofructokinase-1", "Aldolase", "Enolase"], "rationale": "Pyruvate kinase catalyzes the final irreversible glycolysis step."}, {"id": "Q0005", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "q": "What is the net ATP yield of glycolysis per glucose?", "answer": "2 ATP", "distractors": ["0 ATP", "1 ATP", "4 ATP", "6 ATP"], "rationale": "Glycolysis uses 2 ATP and produces 4 ATP, for a net of 2 ATP."}, {"id": "Q0006", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Lactate", "q": "Why is pyruvate converted to lactate during anaerobic glycolysis?", "answer": "To regenerate NAD+", "distractors": ["To produce FADH2", "To enter the TCA cycle", "To make NADPH", "To release CO2"], "rationale": "Lactate dehydrogenase regenerates NAD+ so glycolysis can continue."}, {"id": "Q0007", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "GLUT Transporters", "q": "Which GLUT transporter is insulin-dependent?", "answer": "GLUT4", "distractors": ["GLUT1", "GLUT2", "GLUT3", "GLUT5"], "rationale": "GLUT4 is insulin-dependent and is found in skeletal muscle and adipose tissue."}, {"id": "Q0008", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "GLUT Transporters", "q": "Which GLUT transporter primarily transports fructose?", "answer": "GLUT5", "distractors": ["GLUT1", "GLUT2", "GLUT3", "GLUT4"], "rationale": "GLUT5 is the fructose transporter."}, {"id": "Q0009", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Fructose Disorders", "q": "Hereditary fructose intolerance is caused by deficiency of which enzyme?", "answer": "Aldolase B", "distractors": ["Fructokinase", "GALT", "Galactokinase", "Glucose-6-phosphatase"], "rationale": "Aldolase B deficiency traps fructose as fructose-1-phosphate, causing hypoglycemia and hepatotoxicity."}, {"id": "Q0010", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Galactose Disorders", "q": "Classic galactosemia is caused by deficiency of which enzyme?", "answer": "Galactose-1-phosphate uridylyltransferase", "distractors": ["Galactokinase", "Aldolase B", "Fructokinase", "Glucose-6-phosphatase"], "rationale": "Classic galactosemia is GALT deficiency."}, {"id": "Q0011", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycogen", "q": "Which enzyme builds glycogen?", "answer": "Glycogen synthase", "distractors": ["Glycogen phosphorylase", "Glucose-6-phosphatase", "Debranching enzyme", "Hexokinase"], "rationale": "Glycogen synthase performs glycogenesis."}, {"id": "Q0012", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycogen", "q": "Which enzyme breaks glycogen down?", "answer": "Glycogen phosphorylase", "distractors": ["Glycogen synthase", "Glucose-6-phosphatase", "Glucokinase", "Aldolase"], "rationale": "Glycogen phosphorylase performs glycogenolysis."}, {"id": "Q0013", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "PPP", "q": "Which pathway produces NADPH and ribose-5-phosphate?", "answer": "Pentose phosphate pathway", "distractors": ["Glycolysis", "TCA cycle", "Beta-oxidation", "Urea cycle"], "rationale": "The PPP produces NADPH for antioxidant defense and ribose-5-phosphate for nucleotides."}, {"id": "Q0014", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "PPP", "q": "Which enzyme is rate-limiting in the pentose phosphate pathway?", "answer": "Glucose-6-phosphate dehydrogenase", "distractors": ["Phosphofructokinase-1", "Pyruvate kinase", "Aldolase", "Citrate synthase"], "rationale": "G6PD is the key oxidative PPP enzyme."}, {"id": "Q0015", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Membrane Structure", "q": "Phospholipids form bilayers because they are what?", "answer": "Amphipathic", "distractors": ["Completely hydrophobic", "Completely hydrophilic", "Enzymatic", "Steroidal"], "rationale": "Phospholipids have hydrophilic heads and hydrophobic tails."}, {"id": "Q0016", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Membrane Structure", "q": "Cholesterol does what to membrane fluidity?", "answer": "Buffers fluidity across temperature changes", "distractors": ["Only increases fluidity", "Only decreases fluidity", "Destroys lipid bilayers", "Blocks all membrane proteins"], "rationale": "Cholesterol stiffens membranes at high temperature and prevents tight packing at low temperature."}, {"id": "Q0017", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Membrane Phospholipids", "q": "Diphosphatidylglycerol is also called what?", "answer": "Cardiolipin", "distractors": ["Sphingomyelin", "Phosphatidylserine", "Phosphatidylcholine", "Phosphatidylinositol"], "rationale": "Diphosphatidylglycerol is cardiolipin, important in the inner mitochondrial membrane."}, {"id": "Q0018", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Membrane Phospholipids", "q": "Externalized phosphatidylserine signals what process?", "answer": "Apoptosis", "distractors": ["Glycolysis", "Glycogenesis", "Beta-oxidation", "Steroid synthesis"], "rationale": "Phosphatidylserine externalization is an apoptotic eat-me signal."}, {"id": "Q0019", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR", "q": "Gs proteins stimulate which enzyme?", "answer": "Adenylyl cyclase", "distractors": ["Phospholipase C", "Protein phosphatase", "Glycogen synthase", "Citrate synthase"], "rationale": "Gs activates adenylyl cyclase, increasing cAMP."}, {"id": "Q0020", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR", "q": "Gi proteins inhibit which enzyme?", "answer": "Adenylyl cyclase", "distractors": ["Phospholipase C", "Pyruvate kinase", "G6PD", "ATP synthase"], "rationale": "Gi inhibits adenylyl cyclase, lowering cAMP."}, {"id": "Q0021", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR", "q": "Gq proteins activate which enzyme?", "answer": "Phospholipase C", "distractors": ["Adenylyl cyclase", "Glucose-6-phosphatase", "Acetyl-CoA carboxylase", "ATP synthase"], "rationale": "Gq activates PLC, producing IP3 and DAG."}, {"id": "Q0022", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR Classes", "q": "D1, H2, V2, beta-1, and beta-2 receptors couple to which G protein?", "answer": "Gs", "distractors": ["Gi", "Gq", "G12", "No G protein"], "rationale": "These receptors are Gs-coupled and increase cAMP."}, {"id": "Q0023", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR Classes", "q": "M2, alpha-2, and D2 receptors couple to which G protein?", "answer": "Gi", "distractors": ["Gs", "Gq", "G12", "No G protein"], "rationale": "These receptors are Gi-coupled and decrease cAMP."}, {"id": "Q0024", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR Classes", "q": "H1, alpha-1, V1, M1, and M3 receptors couple to which G protein?", "answer": "Gq", "distractors": ["Gs", "Gi", "G12", "No G protein"], "rationale": "These receptors are Gq-coupled and activate PLC/IP3/DAG signaling."}, {"id": "Q0025", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "The TCA cycle occurs primarily in which compartment?", "answer": "Mitochondrial matrix", "distractors": ["Cytosol", "Nucleus", "Golgi apparatus", "Lysosome"], "rationale": "The TCA cycle occurs in the mitochondrial matrix."}, {"id": "Q0026", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "Which enzyme is the rate-limiting enzyme of the TCA cycle?", "answer": "Isocitrate dehydrogenase", "distractors": ["Citrate synthase", "Succinate dehydrogenase", "Fumarase", "Malate dehydrogenase"], "rationale": "Isocitrate dehydrogenase is the TCA rate-limiting enzyme."}, {"id": "Q0027", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "One turn of the TCA cycle produces how many NADH?", "answer": "3", "distractors": ["1", "2", "4", "6"], "rationale": "Each acetyl-CoA turn produces 3 NADH."}, {"id": "Q0028", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "Which TCA enzyme is also ETC Complex II?", "answer": "Succinate dehydrogenase", "distractors": ["Citrate synthase", "Aconitase", "Malate dehydrogenase", "Fumarase"], "rationale": "Succinate dehydrogenase is ETC Complex II."}, {"id": "Q0029", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "Pyruvate Oxidation", "q": "Which enzyme converts pyruvate to acetyl-CoA?", "answer": "Pyruvate dehydrogenase", "distractors": ["Pyruvate kinase", "Pyruvate carboxylase", "Lactate dehydrogenase", "PEP carboxykinase"], "rationale": "Pyruvate dehydrogenase links glycolysis to TCA."}, {"id": "Q0030", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ETC", "q": "NADH donates electrons to which ETC complex?", "answer": "Complex I", "distractors": ["Complex II", "Complex III", "Complex IV", "Complex V"], "rationale": "NADH enters the ETC at Complex I."}, {"id": "Q0031", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ETC", "q": "FADH2 donates electrons through which ETC complex?", "answer": "Complex II", "distractors": ["Complex I", "Complex III", "Complex IV", "Complex V"], "rationale": "FADH2 enters through Complex II."}, {"id": "Q0032", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ETC", "q": "Which ETC complex does not pump protons?", "answer": "Complex II", "distractors": ["Complex I", "Complex III", "Complex IV", "Complex V"], "rationale": "Complex II transfers electrons but does not pump protons."}, {"id": "Q0033", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ETC", "q": "The final electron acceptor in the ETC is what?", "answer": "Oxygen", "distractors": ["Carbon dioxide", "NAD+", "FAD", "Water"], "rationale": "Oxygen accepts electrons at Complex IV and becomes water."}, {"id": "Q0034", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ATP Yield", "q": "Mitochondrial NADH yields approximately how many ATP?", "answer": "2.5 ATP", "distractors": ["1.5 ATP", "1 ATP", "3.5 ATP", "5 ATP"], "rationale": "NADH yields about 2.5 ATP."}, {"id": "Q0035", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ATP Yield", "q": "FADH2 yields approximately how many ATP?", "answer": "1.5 ATP", "distractors": ["2.5 ATP", "1 ATP", "3 ATP", "5 ATP"], "rationale": "FADH2 yields about 1.5 ATP."}, {"id": "Q0036", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "TAG Digestion", "q": "A triacylglyceride contains what structure?", "answer": "One glycerol backbone and three fatty acids", "distractors": ["Three glycerols and one fatty acid", "One phosphate and two fatty acids", "One cholesterol and one phosphate", "One amino acid and three sugars"], "rationale": "TAGs are glycerol esterified to three fatty acids."}, {"id": "Q0037", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "TAG Digestion", "q": "Bile salts perform which role in fat digestion?", "answer": "Emulsify fat into micelles", "distractors": ["Hydrolyze peptide bonds", "Transport glucose into cells", "Convert lactate to pyruvate", "Make ketone bodies"], "rationale": "Bile salts emulsify fat globules into micelles."}, {"id": "Q0038", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Fasting Lipolysis", "q": "Which enzyme hydrolyzes stored TAGs in adipose tissue during fasting?", "answer": "Hormone-sensitive lipase", "distractors": ["Pancreatic lipase", "Acetyl-CoA carboxylase", "Fatty acid synthase", "Glycogen synthase"], "rationale": "Hormone-sensitive lipase breaks stored TAGs into glycerol and free fatty acids."}, {"id": "Q0039", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Glycerol", "q": "Glycerol is first phosphorylated into what molecule?", "answer": "Glycerol-3-phosphate", "distractors": ["Glyceraldehyde-3-phosphate", "Glucose-6-phosphate", "Fructose-1-phosphate", "Ribose-5-phosphate"], "rationale": "Glycerol becomes glycerol-3-phosphate, not glyceraldehyde-3-phosphate."}, {"id": "Q0040", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Glycerol", "q": "Glycerol-3-phosphate is oxidized into what molecule?", "answer": "Dihydroxyacetone phosphate", "distractors": ["Pyruvate", "Acetyl-CoA", "Oxaloacetate", "Malonyl-CoA"], "rationale": "DHAP can enter glycolysis or gluconeogenesis."}, {"id": "Q0041", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Beta-Oxidation", "q": "Beta-oxidation occurs in which compartment?", "answer": "Mitochondrial matrix", "distractors": ["Cytosol", "Nucleus", "Golgi", "Lysosome"], "rationale": "Fatty acid oxidation occurs in the mitochondrial matrix."}, {"id": "Q0042", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Beta-Oxidation", "q": "One round of beta-oxidation produces which reduced coenzymes?", "answer": "1 FADH2 and 1 NADH", "distractors": ["2 NADPH", "2 FADH2 only", "1 NADPH and 1 GTP", "No reduced coenzymes"], "rationale": "Each round produces 1 FADH2, 1 NADH, and 1 acetyl-CoA."}, {"id": "Q0043", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Carnitine Shuttle", "q": "Which enzyme is rate-limiting in the carnitine shuttle?", "answer": "CPT-I", "distractors": ["CPT-II", "Acyl-CoA synthetase", "Thiolase", "Fatty acid synthase"], "rationale": "CPT-I controls long-chain fatty acid entry into mitochondria."}, {"id": "Q0044", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "FA Synthesis", "q": "Which enzyme is rate-limiting in fatty acid synthesis?", "answer": "Acetyl-CoA carboxylase", "distractors": ["Fatty acid synthase", "CPT-I", "Hormone-sensitive lipase", "Pancreatic lipase"], "rationale": "Acetyl-CoA carboxylase produces malonyl-CoA."}, {"id": "Q0045", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "FA Disorders", "q": "MCAD deficiency most classically causes what finding?", "answer": "Hypoketotic hypoglycemia", "distractors": ["Elevated orotic acid", "Musty urine odor", "E. coli sepsis", "Fructose-1-phosphate accumulation"], "rationale": "MCAD deficiency impairs fatty acid oxidation, causing low ketones despite hypoglycemia."}, {"id": "Q0046", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Ketogenesis", "q": "Which three molecules are ketone bodies?", "answer": "Acetoacetate, beta-hydroxybutyrate, acetone", "distractors": ["Pyruvate, lactate, alanine", "Citrate, malate, fumarate", "Ornithine, citrulline, arginine", "Glucose, glycogen, galactose"], "rationale": "The ketone bodies are acetoacetate, beta-hydroxybutyrate, and acetone."}, {"id": "Q0047", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Ketogenesis", "q": "Which ketone body causes fruity breath?", "answer": "Acetone", "distractors": ["Acetoacetate", "Beta-hydroxybutyrate", "Oxaloacetate", "Pyruvate"], "rationale": "Acetone is volatile and causes fruity breath."}, {"id": "Q0048", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Urea Cycle", "q": "Which enzyme is rate-limiting in the urea cycle?", "answer": "Carbamoyl phosphate synthetase I", "distractors": ["Ornithine transcarbamylase", "Arginase", "Argininosuccinate lyase", "Phenylalanine hydroxylase"], "rationale": "CPS-I is the mitochondrial rate-limiting enzyme of the urea cycle."}, {"id": "Q0049", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Urea Cycle Disorders", "q": "OTC deficiency causes elevation of what molecule?", "answer": "Orotic acid", "distractors": ["Galactitol", "Fructose-1-phosphate", "2,3-BPG", "Malonyl-CoA"], "rationale": "Carbamoyl phosphate is shunted into pyrimidine synthesis, increasing orotic acid."}, {"id": "Q0050", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Disorders", "q": "MSUD is caused by deficiency of which enzyme complex?", "answer": "Branched-chain alpha-ketoacid dehydrogenase", "distractors": ["Phenylalanine hydroxylase", "Ornithine transcarbamylase", "GALT", "Pyruvate kinase"], "rationale": "MSUD is due to BCKDH deficiency."}, {"id": "Q0051", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Disorders", "q": "PKU is caused by deficiency of which enzyme?", "answer": "Phenylalanine hydroxylase", "distractors": ["BCKDH", "OTC", "CPS-I", "Aldolase B"], "rationale": "PKU is usually due to phenylalanine hydroxylase deficiency."}, {"id": "R0001", "bank": "review", "lecture": "Review", "subtopic": "Exam Priorities", "q": "According to the review, which category should be prioritized for pathway-based questions?", "answer": "Pathway overview and summary slides", "distractors": ["Only biography slides", "Only non-testable slides", "Only non-highlighted images", "Only historical background"], "rationale": "The review emphasizes pathway overview/summary slides, substrate names, and rate-limiting enzymes."}, {"id": "R0002", "bank": "review", "lecture": "Review", "subtopic": "Exam Priorities", "q": "Which enzyme detail does the review specifically emphasize?", "answer": "Rate-limiting enzymes", "distractors": ["Only digestive enzymes", "Only enzymes not on slides", "Only enzymes from Block 1", "Only enzyme abbreviations"], "rationale": "Rate-limiting enzymes are explicitly high-yield."}, {"id": "R0003", "bank": "review", "lecture": "Review", "subtopic": "Exam Priorities", "q": "Which molecule example does the review use to emphasize full names and alternate names?", "answer": "Phosphatidylglycerol AKA cardiolipin", "distractors": ["Glucose AKA glycogen", "Pyruvate AKA lactate", "NADH AKA ATP", "Fructose AKA galactose"], "rationale": "The review emphasizes knowing full names and alternate names like cardiolipin."}, {"id": "R0004", "bank": "review", "lecture": "Review", "subtopic": "Metabolic Map", "q": "Which molecule is the hub for carbohydrate, lipid, and protein metabolism?", "answer": "Acetyl-CoA", "distractors": ["Glucose-6-phosphate", "Ribose-5-phosphate", "Galactitol", "Orotic acid"], "rationale": "Acetyl-CoA connects carbohydrate, lipid, and amino acid metabolism."}, {"id": "R0005", "bank": "review", "lecture": "Review", "subtopic": "GLUT/SGLT", "q": "Which transporter is insulin-dependent in muscle and adipose tissue?", "answer": "GLUT4", "distractors": ["GLUT1", "GLUT2", "GLUT3", "GLUT5"], "rationale": "The review diagram highlights GLUT4 as insulin-dependent."}, {"id": "R0006", "bank": "review", "lecture": "Review", "subtopic": "Glycolysis", "q": "Which glycolysis step uses phosphofructokinase?", "answer": "Step 3", "distractors": ["Step 1", "Step 4", "Step 6", "Step 10"], "rationale": "PFK is step 3 and is the key rate-limiting enzyme."}, {"id": "R0007", "bank": "review", "lecture": "Review", "subtopic": "PPP", "q": "Which pathway produces NADPH and ribose-5-phosphate?", "answer": "Pentose phosphate pathway", "distractors": ["TCA cycle", "Beta-oxidation", "Urea cycle", "Ketogenesis"], "rationale": "The PPP/HMP shunt produces NADPH and ribose-5-phosphate."}];

const LETTERS=["A","B","C","D","E"];
const $=id=>document.getElementById(id);
const store={get(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};
let selected="All", count=20, quiz=[], idx=0, answers=[], startTime=0, timer=null, mode="practice";
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function fmt(s){let m=Math.floor(s/60);s=s%60;return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function pool(){return selected==="All"?LECTURE:LECTURE.filter(q=>q.lecture===selected)}
function build(){let lectures=["All",...Array.from(new Set(LECTURE.map(q=>q.lecture)))];$("lecGrid").innerHTML="";lectures.forEach(l=>{let n=l==="All"?LECTURE.length:LECTURE.filter(q=>q.lecture===l).length;let b=document.createElement("button");b.className="tile"+(selected===l?" selected":"");b.innerHTML="<strong>"+esc(l)+"</strong><br><span>"+n+" questions</span>";b.onclick=()=>{selected=l;build()};$("lecGrid").appendChild(b)});$("countGrid").innerHTML="";[10,20,30,50].filter(n=>n<=pool().length).forEach(n=>{let b=document.createElement("button");b.className="chip"+(count===n?" selected":"");b.textContent=n;b.onclick=()=>{count=n;build()};$("countGrid").appendChild(b)})}
function make(q){let opts=shuffle([q.answer,...q.distractors]);let correct=opts.indexOf(q.answer);return {...q,options:opts,correct}}
function start(source){mode=source||"practice";let p=mode==="exam"?LECTURE:mode==="review"?REVIEW:mode==="missed"?getMissed():pool();if(!p.length){alert("No questions here yet.");return}let n=mode==="exam"?Math.min(50,p.length):Math.min(count,p.length);quiz=shuffle(p).slice(0,n).map(make);idx=0;answers=Array(quiz.length).fill(null);startTime=Date.now();clearInterval(timer);timer=setInterval(()=>{$("timer").textContent=fmt(Math.floor((Date.now()-startTime)/1000))},500);show("quiz");render()}
function render(){let q=quiz[idx], chosen=answers[idx], answered=chosen!==null;$("fill").style.width=((idx+1)/quiz.length*100)+"%";$("qnum").textContent="Question "+(idx+1)+" / "+quiz.length;$("score").textContent="Score: "+answers.filter((a,i)=>a!==null&&a===quiz[i].correct).length;let h="<div class='tag'>"+esc(q.lecture)+" · "+esc(q.subtopic)+"</div><div class='qtext'>"+esc(q.q)+"</div>";q.options.forEach((op,i)=>{let cls="option";if(answered){cls+=i===q.correct?" correct":i===chosen?" wrong":" dim"}h+="<button class='"+cls+"' "+(answered?"disabled":"")+" data-i='"+i+"'><span class='letter'>"+LETTERS[i]+"</span><span>"+esc(op)+"</span></button>"});if(answered){h+="<div class='explain'><strong>"+(chosen===q.correct?"Correct.":"Correct answer: "+LETTERS[q.correct]+" — "+esc(q.answer))+"</strong><br>"+esc(q.rationale)+"<br><br><strong>Breakdown:</strong> Memorize the exact relationship: "+esc(q.q.replace("?",""))+" → "+esc(q.answer)+".</div>"}$("slot").innerHTML=h;document.querySelectorAll(".option").forEach(b=>b.onclick=()=>{answers[idx]=Number(b.dataset.i);render()});$("next").disabled=!answered;$("next").textContent=idx===quiz.length-1?"Finish":"Next"}
function finish(){clearInterval(timer);let right=answers.filter((a,i)=>a===quiz[i].correct).length;save();let pct=Math.round(right/quiz.length*100);$("results").innerHTML="<section class='card'><div class='label'>Results</div><div class='result'>"+pct+"%</div><div class='small'>"+right+" / "+quiz.length+" correct · Time "+fmt(Math.floor((Date.now()-startTime)/1000))+"</div><button class='primary' onclick='show("setup")'>New Quiz</button></section>";show("results")}
function save(){let prog=store.get("prog",{}),miss=store.get("miss",{});quiz.forEach((q,i)=>{let k=q.lecture+"|"+q.subtopic;prog[k]=prog[k]||{lecture:q.lecture,subtopic:q.subtopic,right:0,total:0};prog[k].total++;if(answers[i]===q.correct){prog[k].right++; delete miss[q.id]}else{miss[q.id]=true}});store.set("prog",prog);store.set("miss",miss)}
function getMissed(){let m=store.get("miss",{});return ALL.filter(q=>m[q.id])}
function renderMissed(){let m=getMissed();$("missed").innerHTML="<section class='card'><div class='label'>Missed</div><div class='small'>"+m.length+" missed questions stored.</div><button class='primary' onclick='start("missed")'>Redo Missed Only</button></section>"}
function renderAnalytics(){let p=Object.values(store.get("prog",{}));if(!p.length){$("analytics").innerHTML="<section class='card'><div class='label'>Analytics</div><div class='small'>No data yet.</div></section>";return}p.sort((a,b)=>(a.right/a.total)-(b.right/b.total));$("analytics").innerHTML="<section class='card'><div class='label'>Weakest Topics</div><table><tr><th>Topic</th><th>Score</th></tr>"+p.map(x=>"<tr><td><strong>"+esc(x.subtopic)+"</strong><br><span class='small'>"+esc(x.lecture)+"</span></td><td>"+Math.round(x.right/x.total*100)+"%<br><span class='small'>"+x.right+"/"+x.total+"</span></td></tr>").join("")+"</table></section>"}
function show(page){["setup","quiz","results","missed","analytics"].forEach(id=>$(id).classList.toggle("hidden",id!==page));["tPractice","tExam","tReview","tMissed","tAnalytics"].forEach(id=>$(id).classList.remove("active")); if(page==="missed"){$("tMissed").classList.add("active");renderMissed()} else if(page==="analytics"){$("tAnalytics").classList.add("active");renderAnalytics()} else if(mode==="exam")$("tExam").classList.add("active"); else if(mode==="review")$("tReview").classList.add("active"); else $("tPractice").classList.add("active"); scrollTo(0,0)}
$("start").onclick=()=>start("practice");$("next").onclick=()=>{if(answers[idx]===null)return;if(idx<quiz.length-1){idx++;render();scrollTo(0,0)}else finish()};$("quit").onclick=()=>show("setup");$("tPractice").onclick=()=>{mode="practice";show("setup")};$("tExam").onclick=()=>start("exam");$("tReview").onclick=()=>start("review");$("tMissed").onclick=()=>show("missed");$("tAnalytics").onclick=()=>show("analytics");build();
</script>
</body></html>
