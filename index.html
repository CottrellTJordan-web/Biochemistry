 "lecture": "Review", "subtopic": "Lipids", "q": "Which pathway converts excess acetyl-CoA into fatty acids?", "answer": "Fatty acid synthesis", "distractors": ["Beta-oxidation", "Urea cycle", "Glycogenolysis", "PPP"], "rationale": "Fatty acid synthesis stores excess fuel.", "whyWrong": "", "tag": "High Yield", "difficulty": "Review"}, {"id": "R0244", "bank": "review", "lecture": "Review", "subtopic": "Lipids", "q": "Which pathway breaks fatty acids into acetyl-CoA during fasting?", "answer": "Beta-oxidation", "distractors": ["Fatty acid synthesis", "PPP", "Glycogenesis", "Glycolysis"], "rationale": "Beta-oxidation breaks down fatty acids.", "whyWrong": "", "tag": "High Yield", "difficulty": "Review"}, {"id": "R0245", "bank": "review", "lecture": "Review", "subtopic": "Amino Acids", "q": "Glucogenic amino acids support which process?", "answer": "Gluconeogenesis", "distractors": ["Ketogenesis only", "Bile salt synthesis only", "DNA replication only", "Chylomicron assembly"], "rationale": "Glucogenic amino acids can feed glucose production.", "whyWrong": "", "tag": "High Yield", "difficulty": "Review"}, {"id": "R0246", "bank": "review", "lecture": "Review", "subtopic": "Amino Acids", "q": "Ketogenic amino acids are degraded into what category?", "answer": "Acetyl-CoA or acetoacetate", "distractors": ["Glucose-6-phosphate only", "Ribose-5-phosphate only", "Urea only", "Lactose only"], "rationale": "Ketogenic amino acids yield acetyl-CoA or acetoacetate.", "whyWrong": "", "tag": "High Yield", "difficulty": "Review"}]</script>
<script>
(function(){
"use strict";
var BANK = JSON.parse(document.getElementById("question-data").textContent);
var LECTURE = BANK.filter(function(q){return q.bank==="lecture";});
var REVIEW = BANK.filter(function(q){return q.bank==="review";});
var ALL = BANK.slice();
var LETTERS = ["A","B","C","D","E"];
var selectedLecture = "All";
var selectedCount = 20;
var avoidRepeats = true;
var currentMode = "practice";
var quiz = [];
var idx = 0;
var answers = [];
var confidence = [];
var timerHandle = null;
var startTime = 0;
var silentExam = false;

function el(id){return document.getElementById(id);}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function fmt(sec){var m=Math.floor(sec/60);var s=sec%60;return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");}
function esc(s){return String(s).replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m];});}
function getStore(k,f){try{var v=localStorage.getItem(k);return v?JSON.parse(v):f;}catch(e){return f;}}
function setStore(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lecturePool(){return selectedLecture==="All"?LECTURE:LECTURE.filter(function(q){return q.lecture===selectedLecture;});}
function haptic(ms){try{if(navigator.vibrate)navigator.vibrate(ms||10);}catch(e){}}

function buildSetup(){
  el("bankStat").textContent = ALL.length + " Q";
  var lectures = ["All"];
  LECTURE.forEach(function(q){if(lectures.indexOf(q.lecture)<0)lectures.push(q.lecture);});
  var lg = el("lectureGrid"); lg.innerHTML = "";
  lectures.forEach(function(name){
    var count = name==="All" ? LECTURE.length : LECTURE.filter(function(q){return q.lecture===name;}).length;
    var b = document.createElement("button");
    b.className = "tile" + (name===selectedLecture ? " selected" : "");
    b.innerHTML = "<strong>"+esc(name)+"</strong><br><span>"+count+" questions</span>";
    b.onclick = function(){haptic(); selectedLecture=name; if(selectedCount>lecturePool().length)selectedCount=Math.min(20,lecturePool().length); buildSetup();};
    lg.appendChild(b);
  });
  var cg = el("countGrid"); cg.innerHTML = "";
  [10,20,30,50,75,100,150].forEach(function(n){
    if(n <= lecturePool().length){
      var b = document.createElement("button");
      b.className = "chip" + (n===selectedCount ? " selected" : "");
      b.textContent = n;
      b.onclick = function(){haptic(); selectedCount=n; buildSetup();};
      cg.appendChild(b);
    }
  });
  el("repeatSwitch").classList.toggle("on", avoidRepeats);
}

function seenKey(mode){return mode==="review"?"review":mode==="exam"?"exam":selectedLecture;}
function filterSeen(pool, mode){
  if(!avoidRepeats || mode==="missed" || mode==="weak") return pool;
  var seen = getStore("bc_seen_billion_v1",{});
  var key = seenKey(mode);
  var list = seen[key] || [];
  var unseen = pool.filter(function(q){return list.indexOf(q.id)<0;});
  return unseen.length ? unseen : pool;
}

function makeQuestion(q){
  var opts = shuffle([q.answer].concat(q.distractors)).slice(0,5);
  if(opts.indexOf(q.answer)<0) opts[0]=q.answer;
  opts = shuffle(opts);
  var copy = {};
  for(var k in q) copy[k]=q[k];
  copy.options = opts;
  copy.correct = opts.indexOf(q.answer);
  return copy;
}

function weakPool(){
  var prog = getStore("bc_prog_billion_v1",{});
  var weakTopics = Object.keys(prog).filter(function(k){var p=prog[k]; return p.total>=2 && (p.right/p.total)<0.78;});
  if(!weakTopics.length) return lecturePool();
  return LECTURE.filter(function(q){return weakTopics.indexOf(q.lecture+"|"+q.subtopic)>=0;});
}

function missedPool(){
  var miss = getStore("bc_miss_billion_v1",{});
  return ALL.filter(function(q){return miss[q.id];});
}

function start(mode, forcedCount){
  currentMode = mode;
  silentExam = mode==="exam";
  var pool = mode==="review" ? REVIEW : mode==="exam" ? LECTURE : mode==="missed" ? missedPool() : mode==="weak" ? weakPool() : lecturePool();
  if(!pool.length){alert("No questions available here yet.");return;}
  pool = filterSeen(pool, mode);
  var count = forcedCount || (mode==="exam" ? Math.min(50,pool.length) : mode==="review" ? Math.min(20,pool.length) : Math.min(selectedCount,pool.length));
  quiz = shuffle(pool).slice(0,count).map(makeQuestion);
  idx = 0; answers = new Array(quiz.length).fill(null); confidence = new Array(quiz.length).fill("normal");
  startTime = Date.now();
  clearInterval(timerHandle);
  timerHandle = setInterval(function(){el("timer").textContent=fmt(Math.floor((Date.now()-startTime)/1000));},500);
  show("quiz");
  renderQuestion();
}

function renderQuestion(){
  var q = quiz[idx];
  var chosen = answers[idx];
  var answered = chosen !== null;
  var reveal = answered && !silentExam;
  el("fill").style.width = ((idx+1)/quiz.length*100)+"%";
  el("qnum").textContent = "Question " + (idx+1) + " / " + quiz.length;
  el("score").textContent = "Score: " + answers.filter(function(a,i){return a!==null && a===quiz[i].correct;}).length;
  var h = "<div class='tag'>"+esc(q.lecture)+" · "+esc(q.subtopic)+" · "+esc(q.difficulty||"Core")+"</div><div class='qtext'>"+esc(q.q)+"</div>";
  q.options.forEach(function(op,i){
    var cls = "option";
    if(reveal) cls += i===q.correct ? " correct" : i===chosen ? " wrong" : " dim";
    h += "<button class='"+cls+"' "+(answered?"disabled":"")+" data-i='"+i+"'><span class='letter'>"+LETTERS[i]+"</span><span>"+esc(op)+"</span></button>";
  });
  if(answered && silentExam) h += "<div class='explain'><strong>Answer locked.</strong><br>Exam mode hides explanations until the end.</div>";
  if(reveal){
    h += "<div class='explain'><strong>"+(chosen===q.correct?"Correct.":"Correct answer: "+LETTERS[q.correct]+" — "+esc(q.answer))+"</strong><br>"+esc(q.rationale)+"<br><br><strong>Memory anchor:</strong> "+esc(q.q.replace("?",""))+" → "+esc(q.answer)+".<div class='nav'><button class='secondary' data-conf='low'>I guessed</button><button class='secondary' data-conf='normal'>Okay</button><button class='secondary' data-conf='high'>Knew it cold</button></div></div>";
  }
  el("slot").innerHTML = h;
  Array.prototype.forEach.call(document.querySelectorAll(".option"), function(btn){
    btn.onclick = function(){haptic(); answers[idx]=Number(btn.getAttribute("data-i"));renderQuestion();};
  });
  Array.prototype.forEach.call(document.querySelectorAll("[data-conf]"), function(btn){
    btn.onclick=function(){confidence[idx]=btn.getAttribute("data-conf"); haptic();};
  });
  el("next").disabled = !answered;
  el("next").textContent = idx===quiz.length-1 ? "Finish" : "Next";
}

function saveSession(){
  var prog = getStore("bc_prog_billion_v1",{});
  var miss = getStore("bc_miss_billion_v1",{});
  var seen = getStore("bc_seen_billion_v1",{});
  var history = getStore("bc_history_billion_v1",[]);
  var lowconf = getStore("bc_lowconf_billion_v1",{});
  var keySeen = seenKey(currentMode);
  if(!seen[keySeen]) seen[keySeen]=[];
  var right=0;
  quiz.forEach(function(q,i){
    if(seen[keySeen].indexOf(q.id)<0) seen[keySeen].push(q.id);
    var key = q.lecture+"|"+q.subtopic;
    if(!prog[key]) prog[key] = {lecture:q.lecture, subtopic:q.subtopic, right:0, total:0};
    prog[key].total += 1;
    if(answers[i]===q.correct){right++; prog[key].right += 1; delete miss[q.id];}
    else {miss[q.id] = true;}
    if(confidence[i]==="low") lowconf[q.id]=true;
    if(confidence[i]==="high" && lowconf[q.id]) delete lowconf[q.id];
  });
  history.push({date:Date.now(),mode:currentMode,total:quiz.length,right:right,time:Math.floor((Date.now()-startTime)/1000)});
  history = history.slice(-80);
  setStore("bc_prog_billion_v1", prog);
  setStore("bc_miss_billion_v1", miss);
  setStore("bc_seen_billion_v1", seen);
  setStore("bc_history_billion_v1", history);
  setStore("bc_lowconf_billion_v1", lowconf);
}

function finish(){
  clearInterval(timerHandle);
  var right = answers.filter(function(a,i){return a===quiz[i].correct;}).length;
  var pct = Math.round(right/quiz.length*100);
  var elapsed = Math.floor((Date.now()-startTime)/1000);
  saveSession();
  var missedHTML = quiz.map(function(q,i){
    if(answers[i]===q.correct) return "";
    return "<div class='card'><strong>"+esc(q.q)+"</strong><div class='small'>Your answer: <strong>"+esc(q.options[answers[i]])+"</strong><br>Correct: <strong>"+esc(q.answer)+"</strong><br>"+esc(q.rationale)+"</div></div>";
  }).join("");
  if(!missedHTML) missedHTML = "<div class='small'>No misses. Perfect run.</div>";
  var verdict = pct>=90 ? "Elite run." : pct>=80 ? "Strong. Tighten weak spots." : pct>=70 ? "Passing range. Keep drilling." : "Rebuild the weak topics before exam day.";
  el("results").innerHTML = "<section class='card'><div class='label'>Results</div><div class='result'>"+pct+"%</div><div><strong>"+verdict+"</strong></div><div class='small'>"+right+" / "+quiz.length+" correct · Time "+fmt(elapsed)+" · Avg "+fmt(Math.round(elapsed/quiz.length))+" per question</div><div class='nav'><button class='secondary' id='goMissed'>Weak Areas</button><button class='secondary' id='goWeak'>Weak Areas</button><button class='primary' id='goNew'>New Quiz</button></div></section><section><div class='label'>Missed this session</div>"+missedHTML+"</section>";
  show("results");
  el("goMissed").onclick=function(){show("missed");};
  el("goWeak").onclick=function(){start("weak");};
  el("goNew").onclick=function(){currentMode="practice";show("setup");};
}

function renderMissed(){
  var m = missedPool();
  el("missed").innerHTML = "<section class='card'><div class='label'>Weak Areas</div><div class='small'>"+m.length+" missed questions stored. Use this area to repair weak topics and redo misses.</div><button class='primary' id='startMissed'>Redo Missed</button><button class='danger' id='clearMissed' style='width:100%;margin-top:10px'>Clear Missed</button></section>";
  el("startMissed").onclick = function(){start("missed");};
  el("clearMissed").onclick = function(){if(confirm("Clear missed questions?")){localStorage.removeItem("bc_miss_billion_v1");renderMissed();}};
}

function renderAnalytics(){
  var p = Object.values(getStore("bc_prog_billion_v1",{}));
  var h = getStore("bc_history_billion_v1",[]);
  if(!p.length){el("analytics").innerHTML="<section class='card'><div class='label'>Analytics</div><div class='small'>No data yet.</div></section>";return;}
  var total=p.reduce(function(a,b){return a+b.total;},0);
  var right=p.reduce(function(a,b){return a+b.right;},0);
  p.sort(function(a,b){return (a.right/a.total)-(b.right/b.total);});
  var recent = h.slice(-6).reverse().map(function(x){return "<tr><td>"+new Date(x.date).toLocaleDateString()+"<br><span class='small'>"+esc(x.mode)+"</span></td><td>"+Math.round(x.right/x.total*100)+"%<br><span class='small'>"+x.right+"/"+x.total+" · "+fmt(x.time)+"</span></td></tr>";}).join("");
  el("analytics").innerHTML="<section class='card'><div class='label'>Command Center</div><div class='kpi'><div class='box'><span class='small'>Accuracy</span><strong>"+Math.round(right/total*100)+"%</strong></div><div class='box'><span class='small'>Answered</span><strong>"+total+"</strong></div><div class='box'><span class='small'>Sessions</span><strong>"+h.length+"</strong></div></div></section><section class='card'><div class='label'>Weakest Topics</div><table><tr><th>Topic</th><th>Score</th></tr>"+p.map(function(x){return "<tr><td><strong>"+esc(x.subtopic)+"</strong><br><span class='small'>"+esc(x.lecture)+"</span></td><td>"+Math.round(x.right/x.total*100)+"%<br><span class='small'>"+x.right+"/"+x.total+"</span></td></tr>";}).join("")+"</table></section><section class='card'><div class='label'>Recent runs</div><table><tr><th>Date</th><th>Score</th></tr>"+recent+"</table></section>";
}

function renderAudit(){
  var seen=getStore("bc_seen_billion_v1",{});
  var seenCount=Object.values(seen).reduce(function(a,b){return a+b.length;},0);
  var lowconf = Object.keys(getStore("bc_lowconf_billion_v1",{})).length;
  el("audit").innerHTML="<section class='card'><div class='label'>Settings</div><table><tr><th>Bank</th><th>Questions</th></tr><tr><td>Lecture questions</td><td>"+LECTURE.length+"</td></tr><tr><td>Review questions</td><td>"+REVIEW.length+"</td></tr><tr><td>Total</td><td>"+ALL.length+"</td></tr><tr><td>Seen records</td><td>"+seenCount+"</td></tr><tr><td>Missed stored</td><td>"+missedPool().length+"</td></tr><tr><td>Low confidence</td><td>"+lowconf+"</td></tr></table><button class='danger' id='resetAll'>Reset all local data</button></section>";
  el("resetAll").onclick=function(){if(confirm("Reset all saved progress?")){['bc_prog_billion_v1','bc_miss_billion_v1','bc_seen_billion_v1','bc_history_billion_v1','bc_lowconf_billion_v1'].forEach(function(k){localStorage.removeItem(k);});renderAudit();}};
}

function show(page){
  ["setup","quiz","results","missed","analytics","audit"].forEach(function(id){el(id).classList.toggle("hidden", id!==page);});
  ["tabPractice","tabExam","tabReview","tabWeak","tabAnalytics","tabAudit"].forEach(function(id){el(id).classList.remove("active");});
  if(page==="missed"){el("tabWeak").classList.add("active");renderMissed();}
  else if(page==="analytics"){el("tabAnalytics").classList.add("active");renderAnalytics();}
  else if(page==="audit"){el("tabAudit").classList.add("active");renderAudit();}
  else if(currentMode==="exam" && (page==="quiz"||page==="results")) el("tabExam").classList.add("active");
  else if(currentMode==="review" && (page==="quiz"||page==="results")) el("tabReview").classList.add("active");
  else if(currentMode==="weak" && (page==="quiz"||page==="results")) el("tabWeak").classList.add("active");
  else el("tabPractice").classList.add("active");
  window.scrollTo(0,0);
}

el("repeatToggle").onclick=function(){avoidRepeats=!avoidRepeats;el("repeatSwitch").classList.toggle("on",avoidRepeats);haptic();};
el("startPractice").onclick=function(){start("practice");};
el("quick10").onclick=function(){start("practice",10);};
el("challenge25").onclick=function(){start("weak",25);};
el("boss50").onclick=function(){start("exam",50);};
el("next").onclick=function(){if(answers[idx]===null)return;if(idx<quiz.length-1){idx++;renderQuestion();window.scrollTo(0,0);}else finish();};
