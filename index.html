rived from which vitamin?", "answer": "Pantothenic acid (B5)", "distractors": ["Niacin (B3)", "Riboflavin (B2)", "Thiamine (B1)", "Vitamin C"], "rationale": "Pantothenic acid, vitamin B5, is required to make coenzyme A."}, {"id": "Q0007", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "q": "Which enzyme catalyzes the first step of glycolysis in most tissues?", "answer": "Hexokinase", "distractors": ["Glucokinase", "Phosphofructokinase-1", "Pyruvate kinase", "Aldolase"], "rationale": "Hexokinase converts glucose to glucose-6-phosphate in most tissues."}, {"id": "Q0008", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "q": "Which enzyme catalyzes the first step of glycolysis in liver and pancreatic beta cells?", "answer": "Glucokinase", "distractors": ["Hexokinase", "Phosphofructokinase-1", "Pyruvate kinase", "Aldolase"], "rationale": "Glucokinase is the liver and pancreatic beta-cell isoform for glucose phosphorylation."}, {"id": "Q0009", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "q": "Which enzyme is the rate-limiting enzyme of glycolysis?", "answer": "Phosphofructokinase-1", "distractors": ["Hexokinase", "Glucokinase", "Pyruvate kinase", "Aldolase"], "rationale": "PFK-1 is the committed and rate-limiting step of glycolysis."}, {"id": "Q0010", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "q": "Which enzyme cleaves fructose-1,6-bisphosphate?", "answer": "Aldolase", "distractors": ["Hexokinase", "Phosphofructokinase-1", "Pyruvate kinase", "Enolase"], "rationale": "Aldolase splits fructose-1,6-bisphosphate into DHAP and glyceraldehyde-3-phosphate."}, {"id": "Q0011", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "q": "Which enzyme produces NADH during glycolysis?", "answer": "Glyceraldehyde-3-phosphate dehydrogenase", "distractors": ["Pyruvate kinase", "Hexokinase", "Aldolase", "Enolase"], "rationale": "Glyceraldehyde-3-phosphate dehydrogenase produces NADH while oxidizing G3P."}, {"id": "Q0012", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "q": "Which enzyme converts phosphoenolpyruvate to pyruvate?", "answer": "Pyruvate kinase", "distractors": ["Hexokinase", "Phosphofructokinase-1", "Aldolase", "Enolase"], "rationale": "Pyruvate kinase catalyzes the final irreversible glycolysis step."}, {"id": "Q0013", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "q": "What is the net ATP yield of glycolysis per glucose?", "answer": "2 ATP", "distractors": ["0 ATP", "1 ATP", "4 ATP", "6 ATP"], "rationale": "Glycolysis consumes 2 ATP and produces 4 ATP, giving a net of 2 ATP."}, {"id": "Q0014", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "q": "What are the net products of glycolysis per glucose?", "answer": "2 pyruvate, 2 ATP, and 2 NADH", "distractors": ["1 pyruvate, 2 ATP, and 2 NADH", "2 lactate, 4 ATP, and 0 NADH", "2 acetyl-CoA, 2 ATP, and 2 FADH2", "2 pyruvate, 0 ATP, and 2 NADPH"], "rationale": "One glucose produces two pyruvate, two net ATP, and two NADH."}, {"id": "Q0015", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis Regulation", "q": "Which glycolysis enzyme is inhibited by glucose-6-phosphate?", "answer": "Hexokinase", "distractors": ["Glucokinase", "Phosphofructokinase-1", "Pyruvate kinase", "Aldolase"], "rationale": "Hexokinase is feedback inhibited by glucose-6-phosphate."}, {"id": "Q0016", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis Regulation", "q": "Which glycolysis enzyme is activated by AMP and inhibited by ATP?", "answer": "Phosphofructokinase-1", "distractors": ["Hexokinase", "Glucokinase", "Pyruvate kinase", "Aldolase"], "rationale": "PFK-1 responds to energy status: AMP activates it and ATP inhibits it."}, {"id": "Q0017", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis Regulation", "q": "Which glycolysis enzyme is inhibited by ATP and acetyl-CoA?", "answer": "Pyruvate kinase", "distractors": ["Hexokinase", "Glucokinase", "Phosphofructokinase-1", "Aldolase"], "rationale": "Pyruvate kinase slows when ATP or acetyl-CoA indicates energy abundance."}, {"id": "Q0018", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Lactate", "q": "Why is pyruvate converted to lactate during anaerobic glycolysis?", "answer": "To regenerate NAD+", "distractors": ["To produce FADH2", "To enter the TCA cycle", "To make NADPH", "To release CO2"], "rationale": "Lactate dehydrogenase regenerates NAD+, allowing glycolysis to continue."}, {"id": "Q0019", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Lactate", "q": "Which enzyme converts pyruvate to lactate?", "answer": "Lactate dehydrogenase", "distractors": ["Pyruvate dehydrogenase", "Pyruvate kinase", "Alanine aminotransferase", "Citrate synthase"], "rationale": "Lactate dehydrogenase interconverts pyruvate and lactate."}, {"id": "Q0020", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Lactate", "q": "Type A lactic acidosis is most directly caused by what?", "answer": "Tissue hypoxia", "distractors": ["Alcohol use without hypoxia", "Aldolase B deficiency", "Excess insulin", "High oxygen delivery"], "rationale": "Type A lactic acidosis is caused by hypoxia or impaired oxygen utilization."}, {"id": "Q0021", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": "Lactate", "q": "Type B lactic acidosis is best associated with what?", "answer": "Alcohol, liver failure, or medications", "distractors": ["Tissue hypoxia only", "High oxygen delivery", "Low NADH", "Increased ETC flux"], "rationale": "Type B lactic acidosis occurs without tissue hypoxia and can be caused by alcohol, liver failure, or drugs."}, {"id": "Q0022", "bank": "lecture", "lecture": "Carbohydrate Metabolism", "subtopic": , {"id": "Q0044", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Membrane Structure", "q": "In the lipid bilayer, hydrophobic fatty acid tails face which direction?", "answer": "Inward toward each other", "distractors": ["Outward toward water", "Only toward cytosol", "Only toward extracellular fluid", "Toward ribosomes"], "rationale": "Hydrophobic tails avoid water and face inward."}, {"id": "Q0045", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Membrane Structure", "q": "Cholesterol does what to membrane fluidity?", "answer": "Buffers fluidity across temperature changes", "distractors": ["Only increases fluidity", "Only decreases fluidity", "Destroys lipid bilayers", "Blocks all membrane proteins"], "rationale": "Cholesterol stiffens membranes at high temperature and prevents tight packing at low temperature."}, {"id": "Q0046", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Membrane Phospholipids", "q": "Diphosphatidylglycerol is also called what?", "answer": "Cardiolipin", "distractors": ["Sphingomyelin", "Phosphatidylserine", "Phosphatidylcholine", "Phosphatidylinositol"], "rationale": "Diphosphatidylglycerol is cardiolipin, important in the inner mitochondrial membrane."}, {"id": "Q0047", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Membrane Phospholipids", "q": "Externalized phosphatidylserine signals what process?", "answer": "Apoptosis", "distractors": ["Glycolysis", "Glycogenesis", "Beta-oxidation", "Steroid synthesis"], "rationale": "Externalized phosphatidylserine is an apoptotic eat-me signal."}, {"id": "Q0048", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Membrane Phospholipids", "q": "Phosphatidylinositol is the precursor for which second messengers?", "answer": "IP3 and DAG", "distractors": ["cAMP and PKA", "NADPH and GSH", "FADH2 and NADH", "GTP and GDP"], "rationale": "PIP2 from phosphatidylinositol is cleaved into IP3 and DAG."}, {"id": "Q0049", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Membrane Phospholipids", "q": "Sphingomyelin is especially important in what structure?", "answer": "Myelin sheath", "distractors": ["Glycogen granule", "Ribosome", "Lysosome lumen", "Mitochondrial matrix"], "rationale": "Sphingomyelin supports myelin sheath structure."}, {"id": "Q0050", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Membrane Transport", "q": "Na+/K+ ATPase pumps what per ATP?", "answer": "3 Na+ out and 2 K+ in", "distractors": ["2 Na+ out and 3 K+ in", "3 K+ out and 2 Na+ in", "1 Na+ out and 1 K+ in", "4 Na+ in and 4 K+ out"], "rationale": "Na+/K+ ATPase moves 3 sodium out and 2 potassium in per ATP."}, {"id": "Q0051", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Steroid Signaling", "q": "Steroid hormones bind what type of receptor?", "answer": "Intracellular receptor", "distractors": ["Ligand-gated ion channel", "GLUT4 transporter", "Na+/K+ ATPase", "SGLT2 cotransporter"], "rationale": "Steroid hormones are lipid-soluble and bind intracellular receptors."}, {"id": "Q0052", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR", "q": "GPCR activation causes the alpha subunit to exchange what?", "answer": "GDP for GTP", "distractors": ["GTP for GDP", "NADH for NAD+", "FAD for FADH2", "ATP for AMP"], "rationale": "GPCR activation causes GDP to be exchanged for GTP on the alpha subunit."}, {"id": "Q0053", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR", "q": "Gs proteins stimulate which enzyme?", "answer": "Adenylyl cyclase", "distractors": ["Phospholipase C", "Protein phosphatase", "Glycogen synthase", "Citrate synthase"], "rationale": "Gs activates adenylyl cyclase, increasing cAMP."}, {"id": "Q0054", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR", "q": "Gi proteins inhibit which enzyme?", "answer": "Adenylyl cyclase", "distractors": ["Phospholipase C", "Pyruvate kinase", "G6PD", "ATP synthase"], "rationale": "Gi inhibits adenylyl cyclase, lowering cAMP."}, {"id": "Q0055", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR", "q": "Gq proteins activate which enzyme?", "answer": "Phospholipase C", "distractors": ["Adenylyl cyclase", "Glucose-6-phosphatase", "Acetyl-CoA carboxylase", "ATP synthase"], "rationale": "Gq activates PLC, producing IP3 and DAG."}, {"id": "Q0056", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR", "q": "IP3 releases which ion from the endoplasmic reticulum?", "answer": "Calcium", "distractors": ["Sodium", "Potassium", "Chloride", "Iron"], "rationale": "IP3 triggers calcium release from the ER."}, {"id": "Q0057", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR", "q": "DAG activates which protein kinase?", "answer": "Protein kinase C", "distractors": ["Protein kinase A", "Pyruvate kinase", "Hexokinase", "Adenylyl cyclase"], "rationale": "DAG remains in the membrane and activates protein kinase C."}, {"id": "Q0058", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR Classes", "q": "D1, H2, V2, beta-1, and beta-2 receptors couple to which G protein?", "answer": "Gs", "distractors": ["Gi", "Gq", "G12", "No G protein"], "rationale": "These receptors are Gs-coupled and increase cAMP."}, {"id": "Q0059", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR Classes", "q": "M2, alpha-2, and D2 receptors couple to which G protein?", "answer": "Gi", "distractors": ["Gs", "Gq", "G12", "No G protein"], "rationale": "These receptors are Gi-coupled and decrease cAMP."}, {"id": "Q0060", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "GPCR Classes", "q": "H1, alpha-1, V1, M1, and M3 receptors couple to which G protein?", "answer": "Gq", "distractors": ["Gs", "Gi", "G12", "No G protein"], "rationale": "These receptors are Gq-coupled and activate PLC signaling."}, {"id": "Q0061", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Acid Drugs", "q": "H2 receptor blockers commonly end in which suffix?", "answer": "-idine", "distractors": ["-azole", "-pril", "-sartan", "-olol"], "rationale": "H2 blockers such as cimetidine and famotidine end in -idine."}, {"id": "Q0062", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Acid Drugs", "q": "Proton pump inhibitors commonly end in which suffix?", "answer": "-azole", "distractors": ["-idine", "-pril", "-sartan", "-olol"], "rationale": "PPIs such as omeprazole end in -azole."}, {"id": "Q0063", "bank": "lecture", "lecture": "Membranes & Signaling", "subtopic": "Acid Drugs", "q": "Omeprazole inhibits which pump?", "answer": "H+/K+ ATPase", "distractors": ["Na+/K+ ATPase", "Ca2+ ATPase", "Complex V", "SGLT1"], "rationale": "Omeprazole inhibits the gastric proton pump."}, {"id": "Q0064", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "The TCA cycle occurs primarily in which compartment?", "answer": "Mitochondrial matrix", "distractors": ["Cytosol", "Nucleus", "Golgi apparatus", "Lysosome"], "rationale": "The TCA cycle occurs in the mitochondrial matrix."}, {"id": "Q0065", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "The TCA cycle oxidizes acetyl-CoA into what molecule?", "answer": "CO2", "distractors": ["Glucose", "Lactate", "Ribose-5-phosphate", "Urea"], "rationale": "The acetyl group is oxidized to carbon dioxide."}, {"id": "Q0066", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "The TCA cycle operates under what condition?", "answer": "Aerobic conditions", "distractors": ["Strictly anaerobic conditions", "Only without NAD+", "Only during hypoxia", "Only in RBCs"], "rationale": "The TCA cycle depends on oxidative phosphorylation to regenerate NAD+ and FAD."}, {"id": "Q0067", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "Which enzyme forms citrate from acetyl-CoA and oxaloacetate?", "answer": "Citrate synthase", "distractors": ["Isocitrate dehydrogenase", "Succinate dehydrogenase", "Malate dehydrogenase", "Fumarase"], "rationale": "Citrate synthase catalyzes the first TCA step."}, {"id": "Q0068", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "Which enzyme is the rate-limiting enzyme of the TCA cycle?", "answer": "Isocitrate dehydrogenase", "distractors": ["Citrate synthase", "Succinate dehydrogenase", "Fumarase", "Malate dehydrogenase"], "rationale": "Isocitrate dehydrogenase is the TCA rate-limiting enzyme."}, {"id": "Q0069", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "Which TCA enzyme is also ETC Complex II?", "answer": "Succinate dehydrogenase", "distractors": ["Citrate synthase", "Aconitase", "Malate dehydrogenase", "Fumarase"], "rationale": "Succinate dehydrogenase is Complex II of the ETC."}, {"id": "Q0070", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "One turn of the TCA cycle produces how many NADH?", "answer": "3", "distractors": ["1", "2", "4", "6"], "rationale": "One acetyl-CoA turn produces 3 NADH."}, {"id": "Q0071", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "One turn of the TCA cycle produces how many FADH2?", "answer": "1", "distractors": ["0", "2", "3", "4"], "rationale": "One acetyl-CoA turn produces 1 FADH2."}, {"id": "Q0072", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "One turn of the TCA cycle produces how many GTP?", "answer": "1", "distractors": ["0", "2", "3", "4"], "rationale": "One acetyl-CoA turn produces 1 GTP."}, {"id": "Q0073", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "Which TCA intermediate is used for heme synthesis?", "answer": "Succinyl-CoA", "distractors": ["Citrate", "Isocitrate", "Malate", "Oxaloacetate"], "rationale": "Succinyl-CoA is used in heme synthesis."}, {"id": "Q0074", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "q": "Which TCA intermediate feeds gluconeogenesis?", "answer": "Oxaloacetate", "distractors": ["Citrate", "Succinate", "Fumarate", "Succinyl-CoA"], "rationale": "Oxaloacetate can be converted toward PEP in gluconeogenesis."}, {"id": "Q0075", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "Pyruvate Oxidation", "q": "Which enzyme converts pyruvate to acetyl-CoA?", "answer": "Pyruvate dehydrogenase", "distractors": ["Pyruvate kinase", "Pyruvate carboxylase", "Lactate dehydrogenase", "PEP carboxykinase"], "rationale": "Pyruvate dehydrogenase links glycolysis to the TCA cycle."}, {"id": "Q0076", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "Pyruvate Oxidation", "q": "Pyruvate dehydrogenase requires which vitamin-derived cofactor?", "answer": "Thiamine (B1)", "distractors": ["Niacin (B3) only", "Biotin (B7) only", "Folate (B9) only", "Vitamin K"], "rationale": "Pyruvate dehydrogenase requires thiamine pyrophosphate."}, {"id": "Q0077", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ETC", "q": "NADH donates electrons to which ETC complex?", "answer": "Complex I", "distractors": ["Complex II", "Complex III", "Complex IV", "Complex V"], "rationale": "NADH enters the ETC at Complex I."}, {"id": "Q0078", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ETC", "q": "FADH2 donates electrons through which ETC complex?", "answer": "Complex II", "distractors": ["Complex I", "Complex III", "Complex IV", "Complex V"], "rationale": "FADH2 enters through Complex II."}, {"id": "Q0079", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ETC", "q": "Which ETC complex does not pump protons?", "answer": "Complex II", "distractors": ["Complex I", "Complex III", "Complex IV", "Complex V"], "rationale": "Complex II transfers electrons but does not pump protons."}, {"id": "Q0080", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ETC", "q": "Which ETC complexes pump protons?", "answer": "Complexes I, III, and IV", "distractors": ["Complexes I, II, and III", "Complexes II, III, and IV", "Complexes I and II only", "Complex V only"], "rationale": "Complexes I, III, and IV pump protons."}, {"id": "Q0081", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ETC", "q": "The final electron acceptor in the ETC is what?", "answer": "Oxygen", "distractors": ["Carbon dioxide", "NAD+", "FAD", "Water"], "rationale": "Oxygen accepts electrons at Complex IV and is reduced to water."}, {"id": "Q0082", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ETC", "q": "Complex V is also called what?", "answer": "ATP synthase", "distractors": ["NADH dehydrogenase", "Succinate dehydrogenase", "Cytochrome oxidase", "Adenylyl cyclase"], "rationale": "Complex V is ATP synthase."}, {"id": "Q0083", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ETC Inhibitors", "q": "Rotenone inhibits which complex?", "answer": "Complex I", "distractors": ["Complex II", "Complex III", "Complex IV", "Complex V"], "rationale": "Rotenone inhibits Complex I."}, {"id": "Q0084", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ETC Inhibitors", "q": "Antimycin A inhibits which complex?", "answer": "Complex III", "distractors": ["Complex I", "Complex II", "Complex IV", "Complex V"], "rationale": "Antimycin A inhibits Complex III."}, {"id": "Q0085", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ETC Inhibitors", "q": "Cyanide inhibits which complex?", "answer": "Complex IV", "distractors": ["Complex I", "Complex II", "Complex III", "Complex V"], "rationale": "Cyanide blocks Complex IV."}, {"id": "Q0086", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ATP Yield", "q": "Mitochondrial NADH yields approximately how many ATP?", "answer": "2.5 ATP", "distractors": ["1.5 ATP", "1 ATP", "3.5 ATP", "5 ATP"], "rationale": "NADH yields about 2.5 ATP."}, {"id": "Q0087", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ATP Yield", "q": "FADH2 yields approximately how many ATP?", "answer": "1.5 ATP", "distractors": ["2.5 ATP", "1 ATP", "3 ATP", "5 ATP"], "rationale": "FADH2 yields about 1.5 ATP because it enters at Complex II."}, {"id": "Q0088", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ATP Yield", "q": "Complete oxidation of one glucose produces approximately how many ATP?", "answer": "30–32 ATP", "distractors": ["2 ATP", "12–15 ATP", "20 ATP", "50 ATP"], "rationale": "Complete glucose oxidation yields about 30–32 ATP."}, {"id": "Q0089", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ROS", "q": "Most ETC-derived superoxide is generated at which complexes?", "answer": "Complex I and Complex III", "distractors": ["Complex II and Complex V", "Complex IV and Complex V", "Complex V only", "Complex II only"], "rationale": "Electron leak at Complex I and III can generate superoxide."}, {"id": "Q0090", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ROS", "q": "Superoxide dismutase converts superoxide into what?", "answer": "Hydrogen peroxide", "distractors": ["Water only", "Oxygen only", "Lactate", "NADPH"], "rationale": "SOD converts superoxide to hydrogen peroxide."}, {"id": "Q0091", "bank": "lecture", "lecture": "TCA & ETC", "subtopic": "ROS", "q": "Catalase converts hydrogen peroxide into what?", "answer": "Water and oxygen", "distractors": ["Superoxide", "Lactate", "NADPH", "Acetyl-CoA"], "rationale": "Catalase decomposes hydrogen peroxide into water and oxygen."}, {"id": "Q0092", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "TAG Digestion", "q": "A triacylglyceride contains what structure?", "answer": "One glycerol backbone and three fatty acids", "distractors": ["Three glycerols and one fatty acid", "One phosphate and two fatty acids", "One cholesterol and one phosphate", "One amino acid and three sugars"], "rationale": "A TAG is glycerol esterified to three fatty acids."}, {"id": "Q0093", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "TAG Digestion", "q": "Bile salts perform which role in fat digestion?", "answer": "Emulsify fat into micelles", "distractors": ["Hydrolyze peptide bonds", "Transport glucose into cells", "Convert lactate to pyruvate", "Make ketone bodies"], "rationale": "Bile salts emulsify fat into micelles."}, {"id": "Q0094", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "TAG Digestion", "q": "Pancreatic lipase breaks micelles into what products?", "answer": "Monoacylglycerols and free fatty acids", "distractors": ["Glucose and fructose", "Amino acids and ammonia", "Urea and ornithine", "NADPH and ribose"], "rationale": "Pancreatic lipase digests dietary TAGs."}, {"id": "Q0095", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "TAG Digestion", "q": "Dietary TAGs are packaged in intestinal cells into what particle?", "answer": "Chylomicrons", "distractors": ["LDL", "HDL", "VLDL", "Albumin"], "rationale": "Chylomicrons transport dietary lipids."}, {"id": "Q0096", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Fasting Lipolysis", "q": "Which enzyme hydrolyzes stored TAGs in adipose tissue during fasting?", "answer": "Hormone-sensitive lipase", "distractors": ["Pancreatic lipase", "Acetyl-CoA carboxylase", "Fatty acid synthase", "Glycogen synthase"], "rationale": "Hormone-sensitive lipase releases glycerol and free fatty acids."}, {"id": "Q0097", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Glycerol", "q": "Glycerol is first phosphorylated into what molecule?", "answer": "Glycerol-3-phosphate", "distractors": ["Glyceraldehyde-3-phosphate", "Glucose-6-phosphate", "Fructose-1-phosphate", "Ribose-5-phosphate"], "rationale": "Glycerol becomes glycerol-3-phosphate, not glyceraldehyde-3-phosphate."}, {"id": "Q0098", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Glycerol", "q": "Glycerol-3-phosphate is oxidized into what molecule?", "answer": "Dihydroxyacetone phosphate", "distractors": ["Pyruvate", "Acetyl-CoA", "Oxaloacetate", "Malonyl-CoA"], "rationale": "Glycerol-3-phosphate becomes DHAP."}, {"id": "Q0099", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Beta-Oxidation", "q": "Beta-oxidation occurs in which compartment?", "answer": "Mitochondrial matrix", "distractors": ["Cytosol", "Nucleus", "Golgi", "Lysosome"], "rationale": "Beta-oxidation occurs in the mitochondrial matrix."}, {"id": "Q0100", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Beta-Oxidation", "q": "One round of beta-oxidation produces which reduced coenzymes?", "answer": "1 FADH2 and 1 NADH", "distractors": ["2 NADPH", "2 FADH2 only", "1 NADPH and 1 GTP", "No reduced coenzymes"], "rationale": "Each beta-oxidation round produces one FADH2 and one NADH."}, {"id": "Q0101", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Beta-Oxidation", "q": "The final step of beta-oxidation is catalyzed by which enzyme?", "answer": "Thiolase", "distractors": ["Hydratase", "Dehydrogenase", "Acetyl-CoA carboxylase", "Fatty acid synthase"], "rationale": "Thiolase cleaves the fatty acyl chain to release acetyl-CoA."}, {"id": "Q0102", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Carnitine Shuttle", "q": "Which enzyme is rate-limiting in the carnitine shuttle?", "answer": "CPT-I", "distractors": ["CPT-II", "Acyl-CoA synthetase", "Thiolase", "Fatty acid synthase"], "rationale": "CPT-I controls long-chain fatty acid entry into mitochondria."}, {"id": "Q0103", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "FA Synthesis", "q": "Fatty acid synthesis occurs in which compartment?", "answer": "Cytosol", "distractors": ["Mitochondrial matrix", "Nucleus", "Lysosome", "Intermembrane space"], "rationale": "Fatty acid synthesis is cytosolic."}, {"id": "Q0104", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "FA Synthesis", "q": "Fatty acid synthesis uses which reducing power?", "answer": "NADPH", "distractors": ["NADH", "FADH2", "GTP", "Reduced oxygen"], "rationale": "NADPH provides reducing equivalents for fatty acid synthesis."}, {"id": "Q0105", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "FA Synthesis", "q": "Which enzyme is rate-limiting in fatty acid synthesis?", "answer": "Acetyl-CoA carboxylase", "distractors": ["Fatty acid synthase", "CPT-I", "Hormone-sensitive lipase", "Pancreatic lipase"], "rationale": "Acetyl-CoA carboxylase produces malonyl-CoA."}, {"id": "Q0106", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "FA Synthesis", "q": "Malonyl-CoA inhibits which enzyme?", "answer": "CPT-I", "distractors": ["CPT-II", "Pyruvate kinase", "G6PD", "CPS-I"], "rationale": "Malonyl-CoA prevents simultaneous fatty acid oxidation by inhibiting CPT-I."}, {"id": "Q0107", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "FA Disorders", "q": "MCAD deficiency most classically causes what finding?", "answer": "Hypoketotic hypoglycemia", "distractors": ["Elevated orotic acid", "Musty urine odor", "E. coli sepsis", "Fructose-1-phosphate accumulation"], "rationale": "MCAD deficiency impairs fatty acid oxidation, causing low ketones despite hypoglycemia."}, {"id": "Q0108", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "FA Disorders", "q": "Which fatty acid oxidation disorder is associated with cardiomyopathy?", "answer": "VLCAD deficiency", "distractors": ["MCAD deficiency", "SCAD deficiency", "PKU", "Tarui disease"], "rationale": "VLCAD deficiency can involve cardiac muscle."}, {"id": "Q0109", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Ketogenesis", "q": "Which three molecules are ketone bodies?", "answer": "Acetoacetate, beta-hydroxybutyrate, acetone", "distractors": ["Pyruvate, lactate, alanine", "Citrate, malate, fumarate", "Ornithine, citrulline, arginine", "Glucose, glycogen, galactose"], "rationale": "The three ketone bodies are acetoacetate, beta-hydroxybutyrate, and acetone."}, {"id": "Q0110", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Ketogenesis", "q": "Which ketone body causes fruity breath?", "answer": "Acetone", "distractors": ["Acetoacetate", "Beta-hydroxybutyrate", "Oxaloacetate", "Pyruvate"], "rationale": "Acetone is volatile and causes fruity breath."}, {"id": "Q0111", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Urea Cycle", "q": "Which enzyme is rate-limiting in the urea cycle?", "answer": "Carbamoyl phosphate synthetase I", "distractors": ["Ornithine transcarbamylase", "Arginase", "Argininosuccinate lyase", "Phenylalanine hydroxylase"], "rationale": "CPS-I is the mitochondrial rate-limiting enzyme of the urea cycle."}, {"id": "Q0112", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Urea Cycle Disorders", "q": "OTC deficiency causes elevation of what molecule?", "answer": "Orotic acid", "distractors": ["Galactitol", "Fructose-1-phosphate", "2,3-BPG", "Malonyl-CoA"], "rationale": "Carbamoyl phosphate is shunted into pyrimidine synthesis, increasing orotic acid."}, {"id": "Q0113", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Disorders", "q": "MSUD is caused by deficiency of which enzyme complex?", "answer": "Branched-chain alpha-ketoacid dehydrogenase", "distractors": ["Phenylalanine hydroxylase", "Ornithine transcarbamylase", "GALT", "Pyruvate kinase"], "rationale": "MSUD is due to BCKDH deficiency."}, {"id": "Q0114", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Disorders", "q": "Which amino acids accumulate in MSUD?", "answer": "Leucine, isoleucine, and valine", "distractors": ["Phenylalanine and tyrosine", "Arginine and ornithine", "Glutamate and aspartate", "Cysteine and methionine"], "rationale": "MSUD involves branched-chain amino acids: leucine, isoleucine, and valine."}, {"id": "Q0115", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Disorders", "q": "PKU is caused by deficiency of which enzyme?", "answer": "Phenylalanine hydroxylase", "distractors": ["BCKDH", "OTC", "CPS-I", "Aldolase B"], "rationale": "PKU is usually due to phenylalanine hydroxylase deficiency."}, {"id": "Q0116", "bank": "lecture", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Disorders", "q": "Patients with PKU should avoid what sweetener?", "answer": "Aspartame", "distractors": ["Glucose", "Stevia only", "Sucralose only", "Fructose only"], "rationale": "Aspartame contains phenylalanine."}, {"id": "R0117", "bank": "review", "lecture": "Review", "subtopic": "Exam Priorities", "q": "According to the review, which category should be prioritized for pathway-based questions?", "answer": "Pathway overview and summary slides", "distractors": ["Only biography slides", "Only non-testable slides", "Only non-highlighted images", "Only historical background"], "rationale": "The review emphasizes pathway overview/summary slides, substrate names, and rate-limiting enzymes."}, {"id": "R0118", "bank": "review", "lecture": "Review", "subtopic": "Exam Priorities", "q": "Which enzyme detail does the review specifically emphasize?", "answer": "Rate-limiting enzymes", "distractors": ["Only digestive enzymes", "Only enzymes not on slides", "Only enzymes from Block 1", "Only enzyme abbreviations"], "rationale": "Rate-limiting enzymes are explicitly high-yield."}, {"id": "R0119", "bank": "review", "lecture": "Review", "subtopic": "Exam Priorities", "q": "Which molecule example does the review use to emphasize full names and alternate names?", "answer": "Phosphatidylglycerol AKA cardiolipin", "distractors": ["Glucose AKA glycogen", "Pyruvate AKA lactate", "NADH AKA ATP", "Fructose AKA galactose"], "rationale": "The review emphasizes full names and alternate names."}, {"id": "R0120", "bank": "review", "lecture": "Review", "subtopic": "Metabolic Map", "q": "Which molecule is the hub for carbohydrate, lipid, and protein metabolism?", "answer": "Acetyl-CoA", "distractors": ["Glucose-6-phosphate", "Ribose-5-phosphate", "Galactitol", "Orotic acid"], "rationale": "Acetyl-CoA connects carbohydrate, lipid, and amino acid metabolism."}, {"id": "R0121", "bank": "review", "lecture": "Review", "subtopic": "GLUT/SGLT", "q": "Which transporter is insulin-dependent in muscle and adipose tissue?", "answer": "GLUT4", "distractors": ["GLUT1", "GLUT2", "GLUT3", "GLUT5"], "rationale": "The review diagram highlights GLUT4 as insulin-dependent."}, {"id": "R0122", "bank": "review", "lecture": "Review", "subtopic": "Glycolysis", "q": "Which glycolysis step uses phosphofructokinase?", "answer": "Step 3", "distractors": ["Step 1", "Step 4", "Step 6", "Step 10"], "rationale": "PFK is step 3 and is the key rate-limiting enzyme."}, {"id": "R0123", "bank": "review", "lecture": "Review", "subtopic": "PPP", "q": "Which pathway produces NADPH and ribose-5-phosphate?", "answer": "Pentose phosphate pathway", "distractors": ["TCA cycle", "Beta-oxidation", "Urea cycle", "Ketogenesis"], "rationale": "The PPP/HMP shunt produces NADPH and ribose-5-phosphate."}, {"id": "R0124", "bank": "review", "lecture": "Review", "subtopic": "Glycerol", "q": "Glycerol first becomes which molecule?", "answer": "Glycerol-3-phosphate", "distractors": ["Glyceraldehyde-3-phosphate", "Glucose-6-phosphate", "Fructose-1-phosphate", "Malonyl-CoA"], "rationale": "Glycerol becomes glycerol-3-phosphate, not glyceraldehyde-3-phosphate."}, {"id": "R0125", "bank": "review", "lecture": "Review", "subtopic": "Glycerol", "q": "Glycerol-3-phosphate is oxidized into which intermediate?", "answer": "Dihydroxyacetone phosphate", "distractors": ["Pyruvate", "Acetyl-CoA", "Oxaloacetate", "Ribose-5-phosphate"], "rationale": "Glycerol-3-phosphate becomes DHAP."}]</script>
<script>
(function(){
"use strict";
var BANK = JSON.parse(document.getElementById("question-data").textContent);
var LECTURE = BANK.filter(function(q){return q.bank==="lecture";});
var REVIEW = BANK.filter(function(q){return q.bank==="review";});
var ALL = BANK.slice();
var LETTERS = ["A","B","C","D","E"];
var selectedLecture = "All";
var selectedCount = 20;
var currentMode = "practice";
var quiz = [];
var idx = 0;
var answers = [];
var timerHandle = null;
var startTime = 0;

function el(id){return document.getElementById(id);}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function fmt(sec){var m=Math.floor(sec/60);var s=sec%60;return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");}
function esc(s){return String(s).replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m];});}
function getStore(k,f){try{var v=localStorage.getItem(k);return v?JSON.parse(v):f;}catch(e){return f;}}
function setStore(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lecturePool(){return selectedLecture==="All"?LECTURE:LECTURE.filter(function(q){return q.lecture===selectedLecture;});}

function buildSetup(){
  var lectures = ["All"];
  LECTURE.forEach(function(q){if(lectures.indexOf(q.lecture)<0)lectures.push(q.lecture);});
  var lg = el("lectureGrid"); lg.innerHTML = "";
  lectures.forEach(function(name){
    var count = name==="All" ? LECTURE.length : LECTURE.filter(function(q){return q.lecture===name;}).length;
    var b = document.createElement("button");
    b.className = "tile" + (name===selectedLecture ? " selected" : "");
    b.innerHTML = "<strong>"+esc(name)+"</strong><br><span>"+count+" questions</span>";
    b.onclick = function(){selectedLecture=name; if(selectedCount>lecturePool().length)selectedCount=Math.min(20,lecturePool().length); buildSetup();};
    lg.appendChild(b);
  });
  var cg = el("countGrid"); cg.innerHTML = "";
  [10,20,30,50,75,100].forEach(function(n){
    if(n <= lecturePool().length){
      var b = document.createElement("button");
      b.className = "chip" + (n===selectedCount ? " selected" : "");
      b.textContent = n;
      b.onclick = function(){selectedCount=n; buildSetup();};
      cg.appendChild(b);
    }
  });
}

function makeQuestion(q){
  var opts = shuffle([q.answer].concat(q.distractors)).slice(0,5);
  if(opts.indexOf(q.answer)<0) opts[0]=q.answer;
  opts = shuffle(opts);
  var copy = Object.assign({}, q);
  copy.options = opts;
  copy.correct = opts.indexOf(q.answer);
  return copy;
}

function start(mode){
  currentMode = mode;
  var pool = mode==="review" ? REVIEW : mode==="exam" ? LECTURE : mode==="missed" ? missedPool() : lecturePool();
  if(!pool.length){alert("No questions available here yet.");return;}
  var count = mode==="exam" ? Math.min(50,pool.length) : mode==="review" ? Math.min(20,pool.length) : Math.min(selectedCount,pool.length);
  quiz = shuffle(pool).slice(0,count).map(makeQuestion);
  idx = 0; answers = new Array(quiz.length).fill(null);
  startTime = Date.now();
  clearInterval(timerHandle);
  timerHandle = setInterval(function(){el("timer").textContent=fmt(Math.floor((Date.now()-startTime)/1000));},500);
  show("quiz");
  renderQuestion();
}

function renderQuestion(){
  var q = quiz[idx];
  var chosen = answers[idx];
  var answered = chosen !== null;
  el("fill").style.width = ((idx+1)/quiz.length*100)+"%";
  el("qnum").textContent = "Question " + (idx+1) + " / " + quiz.length;
  el("score").textContent = "Score: " + answers.filter(function(a,i){return a!==null && a===quiz[i].correct;}).length;
  var h = "<div class='tag'>"+esc(q.lecture)+" · "+esc(q.subtopic)+"</div><div class='qtext'>"+esc(q.q)+"</div>";
  q.options.forEach(function(op,i){
    var cls = "option";
    if(answered) cls += i===q.correct ? " correct" : i===chosen ? " wrong" : " dim";
    h += "<button class='"+cls+"' "+(answered?"disabled":"")+" data-i='"+i+"'><span class='letter'>"+LETTERS[i]+"</span><span>"+esc(op)+"</span></button>";
  });
  if(answered){
    h += "<div class='explain'><strong>"+(chosen===q.correct?"Correct.":"Correct answer: "+LETTERS[q.correct]+" — "+esc(q.answer))+"</strong><br>"+esc(q.rationale)+"<br><br><strong>Breakdown:</strong> Memorize the exact relationship: "+esc(q.q.replace("?",""))+" → "+esc(q.answer)+".</div>";
  }
  el("slot").innerHTML = h;
  Array.prototype.forEach.call(document.querySelectorAll(".option"), function(btn){
    btn.onclick = function(){answers[idx]=Number(btn.getAttribute("data-i"));renderQuestion();};
  });
  el("next").disabled = !answered;
  el("next").textContent = idx===quiz.length-1 ? "Finish" : "Next";
}

function saveSession(){
  var prog = getStore("bc_prog_v2",{});
  var miss = getStore("bc_miss_v2",{});
  quiz.forEach(function(q,i){
    var key = q.lecture+"|"+q.subtopic;
    if(!prog[key]) prog[key] = {lecture:q.lecture, subtopic:q.subtopic, right:0, total:0};
    prog[key].total += 1;
    if(answers[i]===q.correct){prog[key].right += 1; delete miss[q.id];}
    else {miss[q.id] = true;}
  });
  setStore("bc_prog_v2", prog);
  setStore("bc_miss_v2", miss);
}

function finish(){
  clearInterval(timerHandle);
  var right = answers.filter(function(a,i){return a===quiz[i].correct;}).length;
  var pct = Math.round(right/quiz.length*100);
  var elapsed = Math.floor((Date.now()-startTime)/1000);
  saveSession();
  el("results").innerHTML = "<section class='card'><div class='label'>Results</div><div class='result'>"+pct+"%</div><div class='small'>"+right+" / "+quiz.length+" correct · Time "+fmt(elapsed)+"</div><button class='primary' onclick='window.BC_showSetup()'>New Quiz</button></section>";
  show("results");
}

function missedPool(){
  var miss = getStore("bc_miss_v2",{});
  return ALL.filter(function(q){return miss[q.id];});
}

function renderMissed(){
  var m = missedPool();
  el("missed").innerHTML = "<section class='card'><div class='label'>Missed Questions</div><div class='small'>"+m.length+" missed questions stored.</div><button class='primary' id='startMissed'>Redo Missed Only</button></section>";
  var btn = el("startMissed");
  if(btn) btn.onclick = function(){start("missed");};
}

function renderAnalytics(){
  var p = Object.values(getStore("bc_prog_v2",{}));
  if(!p.length){el("analytics").innerHTML="<section class='card'><div class='label'>Analytics</div><div class='small'>No data yet.</div></section>";return;}
  p.sort(function(a,b){return (a.right/a.total)-(b.right/b.total);});
  el("analytics").innerHTML = "<section class='card'><div class='label'>Weakest Topics</div><table><tr><th>Topic</th><th>Score</th></tr>"+p.map(function(x){return "<tr><td><strong>"+esc(x.subtopic)+"</strong><br><span class='small'>"+esc(x.lecture)+"</span></td><td>"+Math.round(x.right/x.total*100)+"%<br><span class='small'>"+x.right+"/"+x.total+"</span></td></tr>";}).join("")+"</table></section>";
}

function renderAudit(){
  el("audit").innerHTML = "<section class='card'><div class='label'>Audit</div><table><tr><th>Bank</th><th>Questions</th></tr><tr><td>Lecture bank</td><td>"+LECTURE.length+"</td></tr><tr><td>Review bank</td><td>"+REVIEW.length+"</td></tr><tr><td>Total</td><td>"+ALL.length+"</td></tr></table><button class='danger' id='resetAll'>Reset local data</button></section>";
  el("resetAll").onclick = function(){if(confirm("Reset all saved progress?")){localStorage.removeItem("bc_prog_v2");localStorage.removeItem("bc_miss_v2");renderAudit();}};
}

function show(page){
  ["setup","quiz","results","missed","analytics","audit"].forEach(function(id){el(id).classList.toggle("hidden", id!==page);});
  ["tabPractice","tabExam","tabReview","tabMissed","tabAnalytics","tabAudit"].forEach(function(id){el(id).classList.remove("active");});
  if(page==="missed"){el("tabMissed").classList.add("active");renderMissed();}
  else if(page==="analytics"){el("tabAnalytics").classList.add("active");renderAnalytics();}
  else if(page==="audit"){el("tabAudit").classList.add("active");renderAudit();}
  else if(currentMode==="exam" && (page==="quiz" || page==="results")) el("tabExam").classList.add("active");
  else if(currentMode==="review" && (page==="quiz" || page==="results")) el("tabReview").classList.add("active");
  else el("tabPractice").classList.add("active");
  window.scrollTo(0,0);
}

window.BC_showSetup = function(){currentMode="practice";show("setup");};

el("startPractice").onclick = function(){start("practice");};
el("next").onclick = function(){if(answers[idx]===null)return;if(idx<quiz.length-1){idx++;renderQuestion();window.scrollTo(0,0);}else finish();};
el("quit").onclick = function(){show("setup");};
el("tabPractice").onclick = function(){currentMode="practice";show("setup");};
el("tabExam").onclick = function(){start("exam");};
el("tabReview").onclick = function(){start("review");};
el("tabMissed").onclick = function(){show("missed");};
el("tabAnalytics").onclick = function(){show("analytics");};
el("tabAudit").onclick = function(){show("audit");};
buildSetup();
})();
</script>
</body>
</html>
