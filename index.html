<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f7fbf8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="BioChemistry">
<title>BioChemistry</title>
<style>
:root {
  color-scheme: light;
  --bg:#f6faf7; --card:#ffffff; --ink:#17211b; --muted:#6d7b72; --line:#dce7df;
  --accent:#2f8f5b; --accent2:#dff2e7; --soft:#eef8f1; --wrong:#b42318; --right:#087443;
  --shadow:0 16px 45px rgba(26,48,35,.08);
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;background:
radial-gradient(900px 500px at 50% -250px,#dff2e7,transparent),var(--bg);color:var(--ink);padding:env(safe-area-inset-top) 16px 34px}
.app{max-width:780px;margin:0 auto;padding-top:22px}
.header{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
.brand h1{font-size:34px;letter-spacing:-.04em;margin:0;font-weight:750}
.brand p{margin:4px 0 0;color:var(--muted);font-size:15px}
.badge{background:var(--soft);color:var(--accent);font-weight:700;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:13px;white-space:nowrap}
.segment{display:grid;grid-template-columns:repeat(3,1fr);background:#e9f1ec;border:1px solid var(--line);border-radius:16px;padding:4px;margin:14px 0 18px}
.segment button{border:0;background:transparent;padding:11px 8px;border-radius:12px;font:inherit;font-weight:650;color:var(--muted)}
.segment button.active{background:#fff;color:var(--ink);box-shadow:0 2px 12px rgba(30,50,35,.08)}
.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:24px;padding:20px;margin:14px 0;box-shadow:var(--shadow)}
.section-title{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.choice-card{text-align:left;border:1px solid var(--line);background:#fff;border-radius:18px;padding:15px;font:inherit;color:var(--ink)}
.choice-card.selected{border-color:var(--accent);background:var(--soft);box-shadow:inset 0 0 0 1px var(--accent)}
.choice-card strong{display:block;font-size:15px;margin-bottom:3px}
.choice-card span{font-size:12px;color:var(--muted)}
.counts{display:flex;gap:8px;flex-wrap:wrap}
.counts button,.primary,.secondary{border:1px solid var(--line);background:#fff;border-radius:16px;padding:13px 16px;font:inherit;font-weight:700;color:var(--ink)}
.counts button.selected{background:var(--accent);color:white;border-color:var(--accent)}
.primary{width:100%;background:var(--accent);color:white;border-color:var(--accent);margin-top:16px}
.primary:disabled{opacity:.35}
.secondary{background:#fff}
.toggle{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px;border:1px solid var(--line);border-radius:18px;background:#fff;margin-top:12px}
.switch{width:52px;height:32px;border-radius:999px;background:#cfdad3;padding:3px;transition:.2s}
.knob{width:26px;height:26px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:.2s}
.switch.on{background:var(--accent)} .switch.on .knob{transform:translateX(20px)}
.progressbar{height:9px;background:#e4ece7;border-radius:999px;overflow:hidden;margin-bottom:9px}
.progressbar span{display:block;height:100%;background:var(--accent);width:0%;transition:.25s}
.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-bottom:14px}
.qtag{display:inline-flex;padding:6px 10px;border-radius:999px;background:var(--accent2);color:var(--accent);font-size:12px;font-weight:800;margin-bottom:10px}
.qtext{font-size:20px;font-weight:750;letter-spacing:-.02em;line-height:1.25;margin-bottom:16px}
.option{width:100%;display:flex;gap:12px;align-items:flex-start;text-align:left;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px 14px;margin:9px 0;font:inherit;color:var(--ink)}
.letter{width:28px;height:28px;border-radius:10px;display:grid;place-items:center;background:#eef3ef;color:var(--muted);font-weight:800;flex:0 0 auto}
.option.correct{border-color:rgba(8,116,67,.45);background:#eefaf3} .option.correct .letter{background:var(--right);color:#fff}
.option.wrong{border-color:rgba(180,35,24,.45);background:#fff1ef} .option.wrong .letter{background:var(--wrong);color:#fff}
.option.dim{opacity:.55}
.explain{border:1px solid var(--line);background:#f8fbf9;border-radius:18px;padding:14px;margin-top:12px;color:var(--muted)}
.explain strong{color:var(--ink)}
.nav{display:flex;gap:10px;margin-top:14px} .nav button{flex:1}
.hidden{display:none!important}
table{width:100%;border-collapse:collapse} th,td{padding:10px 6px;border-bottom:1px solid var(--line);text-align:left} th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em} td:last-child{text-align:right;font-weight:800}
.small{font-size:13px;color:var(--muted);line-height:1.45}
.footer{text-align:center;color:var(--muted);font-size:12px;margin-top:24px}
@media(max-width:560px){.grid{grid-template-columns:1fr}.brand h1{font-size:30px}.qtext{font-size:18px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="brand"><h1>BioChemistry</h1><p>Block 2 practice built for hard, high-yield repetition.</p></div>
    <div class="badge" id="bankBadge">500 Q</div>
  </div>
  <div class="segment">
    <button id="tabPractice" class="active">Practice</button>
    <button id="tabProgress">Progress</button>
    <button id="tabAudit">Audit</button>
  </div>

  <main id="setup">
    <section class="card">
      <div class="section-title">Lecture</div>
      <div class="grid" id="lectureGrid"></div>
    </section>
    <section class="card">
      <div class="section-title">Quiz size</div>
      <div class="counts" id="countGrid"></div>
      <div class="toggle" id="repeatToggle">
        <div><strong>Avoid repeats</strong><div class="small">Uses unseen questions first until the bank is exhausted.</div></div>
        <div class="switch on" id="switch"><div class="knob"></div></div>
      </div>
      <button class="primary" id="start" disabled>Start Quiz</button>
    </section>
  </main>

  <main id="quiz" class="hidden">
    <section class="card">
      <div class="progressbar"><span id="bar"></span></div>
      <div class="meta"><span id="qNum"></span><span id="score"></span></div>
      <div id="questionSlot"></div>
      <div class="nav"><button class="secondary" id="quit">Quit</button><button class="primary" id="next" disabled>Next</button></div>
    </section>
  </main>

  <main id="results" class="hidden"></main>
  <main id="progress" class="hidden"></main>
  <main id="audit" class="hidden"></main>
  <div class="footer">Study aid only. Saves progress on this device/browser.</div>
</div>

<script>
const BANK = [{"id": "Q001", "lecture": "TCA & ETC", "subtopic": "TCA Cycle", "style": "Negative clue", "q": "Which answer best fits this concept: Which TCA intermediate feeds gluconeogenesis?", "answer": "Oxaloacetate", "distractors": ["Citrate", "Succinate", "Fumarate", "Succinyl-CoA"], "rationale": "Oxaloacetate can be converted toward PEP in gluconeogenesis."}, {"id": "Q002", "lecture": "Carbohydrate Metabolism", "subtopic": "Transporters", "style": "Direct recall", "q": "Which GLUT transporter is insulin-dependent in muscle and adipose tissue?", "answer": "GLUT4", "distractors": ["GLUT1", "GLUT2", "GLUT3", "GLUT5"], "rationale": "Insulin triggers GLUT4 translocation to the membrane."}, {"id": "Q003", "lecture": "TCA & ETC", "subtopic": "ETC Inhibitors", "style": "Application", "q": "If this pathway or condition is being tested, what is the best answer? Cyanide and carbon monoxide inhibit which complex?", "answer": "Complex IV", "distractors": ["Complex I", "Complex II", "Complex III", "Complex V"], "rationale": "Both prevent oxygen use at Complex IV."}, {"id": "Q004", "lecture": "Carbohydrate Metabolism", "subtopic": "Fructose/Galactose", "style": "Direct recall", "q": "Essential fructosuria is caused by deficiency of what enzyme?", "answer": "Fructokinase", "distractors": ["Aldolase B", "GALT", "Galactokinase", "Phosphofructokinase"], "rationale": "Fructokinase deficiency is benign because fructose is not trapped as fructose-1-phosphate."}, {"id": "Q005", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycogen", "style": "Scrubbed wording", "q": "Select the most accurate statement for: Which enzyme stimulates glycogen synthesis?", "answer": "Glycogen synthase", "distractors": ["Glycogen phosphorylase", "Glucose-6-phosphatase", "Debranching enzyme", "Phosphorylase kinase"], "rationale": "Glycogen synthase builds glycogen during the fed/insulin state."}, {"id": "Q006", "lecture": "Lipids & Amino Acids", "subtopic": "Ketogenesis", "style": "Negative clue", "q": "Which answer best fits this concept: What are the three ketone bodies?", "answer": "Acetoacetate, beta-hydroxybutyrate, and acetone", "distractors": ["Pyruvate, lactate, and alanine", "Citrate, succinate, and malate", "Urea, ammonia, and orotic acid", "Glucose, glycogen, and ribose"], "rationale": "The three ketones are acetoacetate, beta-hydroxybutyrate, and acetone."}, {"id": "Q007", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycogen Storage Disorders", "style": "Application", "q": "If this pathway or condition is being tested, what is the best answer? Von Gierke disease is deficiency of what enzyme?", "answer": "Glucose-6-phosphatase", "distractors": ["Muscle glycogen phosphorylase", "Lysosomal acid alpha-glucosidase", "Branching enzyme", "Debranching enzyme"], "rationale": "Von Gierke is glucose-6-phosphatase deficiency with severe fasting hypoglycemia."}, {"id": "Q008", "lecture": "TCA & ETC", "subtopic": "ETC", "style": "High-yield detail", "q": "For Block 2 biochemistry, identify the high-yield answer: What is the final electron acceptor in the ETC?", "answer": "Oxygen", "distractors": ["Carbon dioxide", "NAD+", "FAD", "Water"], "rationale": "Oxygen accepts electrons at Complex IV and forms water."}, {"id": "Q009", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Disorders", "style": "Exam-style", "q": "A patient/pathway question asks: MSUD is caused by deficiency of what enzyme complex?", "answer": "Branched-chain alpha-ketoacid dehydrogenase", "distractors": ["Phenylalanine hydroxylase", "Ornithine transcarbamoylase", "CPS-I", "Pyruvate kinase"], "rationale": "MSUD is impaired branched-chain amino acid catabolism."}, {"id": "Q010", "lecture": "Carbohydrate Metabolism", "subtopic": "Fructose/Galactose", "style": "High-yield detail", "q": "For Block 2 biochemistry, identify the high-yield answer: Classic galactosemia is caused by deficiency of what enzyme?", "answer": "Galactose-1-phosphate uridylyltransferase", "distractors": ["Galactokinase", "Fructokinase", "Aldolase B", "Glucose-6-phosphatase"], "rationale": "Classic galactosemia is GALT deficiency."}, {"id": "Q011", "lecture": "Lipids & Amino Acids", "subtopic": "Beta-Oxidation", "style": "Exam-style", "q": "A patient/pathway question asks: Malonyl-CoA inhibits what enzyme?", "answer": "CPT-I", "distractors": ["CPT-II", "Citrate synthase", "Pyruvate kinase", "G6PD"], "rationale": "Malonyl-CoA prevents simultaneous fatty acid synthesis and oxidation."}, {"id": "Q012", "lecture": "Membranes & Signaling", "subtopic": "Transport", "style": "Negative clue", "q": "Which answer best fits this concept: What is the Na+/K+ ATPase stoichiometry?", "answer": "3 Na+ out and 2 K+ in per ATP", "distractors": ["2 Na+ out and 3 K+ in", "3 K+ out and 2 Na+ in", "1 Na+ out and 1 K+ in", "4 Na+ in and 4 K+ out"], "rationale": "The pump moves 3 sodium out and 2 potassium in."}, {"id": "Q013", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "style": "High-yield detail", "q": "For Block 2 biochemistry, identify the high-yield answer: Which enzyme converts phosphoenolpyruvate to pyruvate?", "answer": "Pyruvate kinase", "distractors": ["Hexokinase", "Aldolase", "Phosphofructokinase-1", "Glyceraldehyde-3-phosphate dehydrogenase"], "rationale": "Pyruvate kinase catalyzes the final irreversible glycolysis step."}, {"id": "Q014", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycogen", "style": "Scrubbed wording", "q": "Select the most accurate statement for: Glycogen branch points use which bond?", "answer": "Alpha-1,6 glycosidic bonds", "distractors": ["Alpha-1,4 glycosidic bonds", "Beta-1,4 glycosidic bonds", "Beta-1,6 glycosidic bonds", "Peptide bonds"], "rationale": "Straight chains are alpha-1,4; branches are alpha-1,6."}, {"id": "Q015", "lecture": "TCA & ETC", "subtopic": "ROS", "style": "High-yield detail", "q": "For Block 2 biochemistry, identify the high-yield answer: Which enzyme converts superoxide to hydrogen peroxide?", "answer": "Superoxide dismutase", "distractors": ["Catalase", "Glutathione reductase", "Pyruvate kinase", "Citrate synthase"], "rationale": "SOD converts superoxide to H2O2."}, {"id": "Q016", "lecture": "TCA & ETC", "subtopic": "ROS", "style": "Exam-style", "q": "A patient/pathway question asks: Most ETC-derived ROS leak from which complexes?", "answer": "Complex I and Complex III", "distractors": ["Complex II and V", "Complex IV and V", "Complex I only", "Complex V only"], "rationale": "Electron leak at Complex I and III generates superoxide."}, {"id": "Q017", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycogen", "style": "Exam-style", "q": "A patient/pathway question asks: Which enzyme stimulates glycogen synthesis?", "answer": "Glycogen synthase", "distractors": ["Glycogen phosphorylase", "Glucose-6-phosphatase", "Debranching enzyme", "Phosphorylase kinase"], "rationale": "Glycogen synthase builds glycogen during the fed/insulin state."}, {"id": "Q018", "lecture": "Membranes & Signaling", "subtopic": "GPCRs", "style": "Exam-style", "q": "A patient/pathway question asks: Gi activation does what to cAMP?", "answer": "Decreases cAMP by inhibiting adenylyl cyclase", "distractors": ["Increases cAMP", "Creates IP3 and DAG", "Activates G6PD", "Releases acetone"], "rationale": "Gi inhibits adenylyl cyclase."}, {"id": "Q019", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycogen Storage Disorders", "style": "Exam-style", "q": "A patient/pathway question asks: Von Gierke disease is deficiency of what enzyme?", "answer": "Glucose-6-phosphatase", "distractors": ["Muscle glycogen phosphorylase", "Lysosomal acid alpha-glucosidase", "Branching enzyme", "Debranching enzyme"], "rationale": "Von Gierke is glucose-6-phosphatase deficiency with severe fasting hypoglycemia."}, {"id": "Q020", "lecture": "Lipids & Amino Acids", "subtopic": "Fatty Acid Synthesis", "style": "Scrubbed wording", "q": "Select the most accurate statement for: Where does fatty acid synthesis occur?", "answer": "Cytosol", "distractors": ["Mitochondrial matrix", "Nucleus", "Lysosome", "Peroxisome only"], "rationale": "Fatty acid synthesis is cytosolic."}, {"id": "Q021", "lecture": "TCA & ETC", "subtopic": "ROS", "style": "Direct recall", "q": "What is the primary ROS formed by electron leak to oxygen?", "answer": "Superoxide", "distractors": ["Lactate", "Acetone", "Carbon dioxide", "Urea"], "rationale": "Superoxide is the primary reactive oxygen species generated."}, {"id": "Q022", "lecture": "Carbohydrate Metabolism", "subtopic": "Fructose/Galactose", "style": "Scrubbed wording", "q": "Select the most accurate statement for: Classic galactosemia is caused by deficiency of what enzyme?", "answer": "Galactose-1-phosphate uridylyltransferase", "distractors": ["Galactokinase", "Fructokinase", "Aldolase B", "Glucose-6-phosphatase"], "rationale": "Classic galactosemia is GALT deficiency."}, {"id": "Q023", "lecture": "Lipids & Amino Acids", "subtopic": "Fatty Acid Synthesis", "style": "Application", "q": "If this pathway or condition is being tested, what is the best answer? Fatty acid synthesis uses which reducing power?", "answer": "NADPH", "distractors": ["NADH", "FADH2", "GTP", "ATP only"], "rationale": "NADPH provides reducing equivalents for lipogenesis."}, {"id": "Q024", "lecture": "Carbohydrate Metabolism", "subtopic": "PPP", "style": "Direct recall", "q": "Why are RBCs vulnerable in G6PD deficiency?", "answer": "They need NADPH to keep glutathione reduced", "distractors": ["They rely on mitochondria for ATP", "They cannot make lactate", "They lack hemoglobin", "They cannot use glucose"], "rationale": "RBCs need NADPH/GSH to protect hemoglobin and membranes from oxidative stress."}, {"id": "Q025", "lecture": "Membranes & Signaling", "subtopic": "Transport", "style": "Scrubbed wording", "q": "Select the most accurate statement for: How do steroid hormones usually cross the membrane?", "answer": "They diffuse through the lipid bilayer", "distractors": ["They use GLUT4", "They require gap junctions", "They bind only GPCRs", "They use Na+/K+ ATPase"], "rationale": "Steroid hormones are lipid-soluble and bind intracellular receptors."}, {"id": "Q026", "lecture": "Carbohydrate Metabolism", "subtopic": "Fructose/Galactose", "style": "Direct recall", "q": "Which finding is classically associated with galactosemia?", "answer": "Jaundice, cataracts, and E. coli sepsis", "distractors": ["Exercise intolerance and myoglobinuria", "Rust-colored urine after exercise", "Fruity breath and acidosis", "Musty odor and intellectual disability"], "rationale": "Galactosemia classically causes liver injury, cataracts from galactitol, and E. coli sepsis risk."}, {"id": "Q027", "lecture": "TCA & ETC", "subtopic": "ATP Yield", "style": "Direct recall", "q": "How much ATP does mitochondrial NADH yield in modern estimates?", "answer": "2.5 ATP", "distractors": ["1.5 ATP", "1 ATP", "3.5 ATP", "5 ATP"], "rationale": "NADH yields about 2.5 ATP."}, {"id": "Q028", "lecture": "Carbohydrate Metabolism", "subtopic": "Fructose/Galactose", "style": "Exam-style", "q": "A patient/pathway question asks: Essential fructosuria is caused by deficiency of what enzyme?", "answer": "Fructokinase", "distractors": ["Aldolase B", "GALT", "Galactokinase", "Phosphofructokinase"], "rationale": "Fructokinase deficiency is benign because fructose is not trapped as fructose-1-phosphate."}, {"id": "Q029", "lecture": "Membranes & Signaling", "subtopic": "Transport", "style": "Negative clue", "q": "Which answer best fits this concept: How do steroid hormones usually cross the membrane?", "answer": "They diffuse through the lipid bilayer", "distractors": ["They use GLUT4", "They require gap junctions", "They bind only GPCRs", "They use Na+/K+ ATPase"], "rationale": "Steroid hormones are lipid-soluble and bind intracellular receptors."}, {"id": "Q030", "lecture": "Carbohydrate Metabolism", "subtopic": "Fructose/Galactose", "style": "Application", "q": "If this pathway or condition is being tested, what is the best answer? Hereditary fructose intolerance is caused by deficiency of what enzyme?", "answer": "Aldolase B", "distractors": ["Fructokinase", "Galactokinase", "GALT", "Hexokinase"], "rationale": "Aldolase B deficiency causes fructose-1-phosphate trapping and hypoglycemia/hepatotoxicity."}, {"id": "Q031", "lecture": "Lipids & Amino Acids", "subtopic": "Fatty Acid Synthesis", "style": "High-yield detail", "q": "For Block 2 biochemistry, identify the high-yield answer: What is the rate-limiting enzyme of fatty acid synthesis?", "answer": "Acetyl-CoA carboxylase", "distractors": ["Fatty acid synthase", "CPT-I", "Hormone-sensitive lipase", "Pancreatic lipase"], "rationale": "ACC converts acetyl-CoA to malonyl-CoA."}, {"id": "Q032", "lecture": "Carbohydrate Metabolism", "subtopic": "Lactic Acidosis", "style": "High-yield detail", "q": "For Block 2 biochemistry, identify the high-yield answer: Why is pyruvate converted to lactate under anaerobic conditions?", "answer": "To regenerate NAD+ so glycolysis can continue", "distractors": ["To enter the TCA cycle", "To generate FADH2", "To form glycogen", "To make NADPH"], "rationale": "Lactate dehydrogenase oxidizes NADH back to NAD+."}, {"id": "Q033", "lecture": "Membranes & Signaling", "subtopic": "Acid Drugs", "style": "Negative clue", "q": "Which answer best fits this concept: What does omeprazole inhibit?", "answer": "H+/K+ ATPase proton pump", "distractors": ["H2 receptor competitively", "GLUT4", "Na+/K+ ATPase in neurons", "Complex IV"], "rationale": "PPIs inhibit the gastric proton pump."}, {"id": "Q034", "lecture": "TCA & ETC", "subtopic": "ROS", "style": "Negative clue", "q": "Which answer best fits this concept: Most ETC-derived ROS leak from which complexes?", "answer": "Complex I and Complex III", "distractors": ["Complex II and V", "Complex IV and V", "Complex I only", "Complex V only"], "rationale": "Electron leak at Complex I and III generates superoxide."}, {"id": "Q035", "lecture": "Carbohydra  "Lipids & Amino Acids", "subtopic": "Beta-Oxidation", "style": "Exam-style", "q": "A patient/pathway question asks: Each beta-oxidation cycle produces what?", "answer": "1 FADH2, 1 NADH, and 1 acetyl-CoA", "distractors": ["2 NADPH and 1 lactate", "1 ATP and 1 pyruvate", "2 GTP and 1 urea", "1 ribose and 1 NADPH"], "rationale": "Each cycle shortens the fatty acid by two carbons."}, {"id": "Q100", "lecture": "Lipids & Amino Acids", "subtopic": "Urea Cycle", "style": "Detail check", "q": "Do not rely on answer-letter patterns. Choose the precise answer: Which urea cycle disorder elevates orotic acid?", "answer": "Ornithine transcarbamoylase deficiency", "distractors": ["CPS-I deficiency", "PKU", "MSUD", "MCAD deficiency"], "rationale": "OTC deficiency shunts carbamoyl phosphate into pyrimidine synthesis, raising orotic acid."}, {"id": "Q101", "lecture": "Membranes & Signaling", "subtopic": "Transport", "style": "Detail check", "q": "Do not rely on answer-letter patterns. Choose the precise answer: What is the Na+/K+ ATPase stoichiometry?", "answer": "3 Na+ out and 2 K+ in per ATP", "distractors": ["2 Na+ out and 3 K+ in", "3 K+ out and 2 Na+ in", "1 Na+ out and 1 K+ in", "4 Na+ in and 4 K+ out"], "rationale": "The pump moves 3 sodium out and 2 potassium in."}, {"id": "Q102", "lecture": "Lipids & Amino Acids", "subtopic": "Ketogenesis", "style": "Scrubbed wording", "q": "Select the most accurate statement for: What are the three ketone bodies?", "answer": "Acetoacetate, beta-hydroxybutyrate, and acetone", "distractors": ["Pyruvate, lactate, and alanine", "Citrate, succinate, and malate", "Urea, ammonia, and orotic acid", "Glucose, glycogen, and ribose"], "rationale": "The three ketones are acetoacetate, beta-hydroxybutyrate, and acetone."}, {"id": "Q103", "lecture": "Carbohydrate Metabolism", "subtopic": "PPP", "style": "Detail check", "q": "Do not rely on answer-letter patterns. Choose the precise answer: Why are RBCs vulnerable in G6PD deficiency?", "answer": "They n swer": "Cardiolipin", "distractors": ["Phosphatidylcholine", "Phosphatidylserine", "Sphingomyelin", "Phosphatidylinositol"], "rationale": "Cardiolipin is diphosphatidylglycerol and is important in the inner mitochondrial membrane."}, {"id": "Q485", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "style": "High-yield detail", "q": "For Block 2 biochemistry, identify the high-yield answer: Which enzyme is the rate-limiting enzyme of glycolysis?", "answer": "Phosphofructokinase-1", "distractors": ["Hexokinase", "Pyruvate kinase", "Aldolase", "Enolase"], "rationale": "PFK-1 is the committed/rate-limiting glycolysis step."}, {"id": "Q486", "lecture": "Carbohydrate Metabolism", "subtopic": "Transporters", "style": "Scrubbed wording", "q": "Select the most accurate statement for: Which GLUT transporter is insulin-dependent in muscle and adipose tissue?", "answer": "GLUT4", "distractors": ["GLUT1", "GLUT2", "GLUT3", "GLUT5"], "rationale": "Insulin triggers GLUT4 translocation to the membrane."}, {"id": "Q487", "lecture": "Membranes & Signaling", "subtopic": "Acid Drugs", "style": "Negative clue", "q": "Which answer best fits this concept: What suffix is common for H2 blockers?", "answer": "-idine", "distractors": ["-azole", "-pril", "-sartan", "-olol"], "rationale": "Cimetidine/famotidine style H2 blockers end in -idine."}, {"id": "Q488", "lecture": "TCA & ETC", "subtopic": "Pyruvate Oxidation", "style": "Exam-style", "q": "A patient/pathway question asks: Pyruvate dehydrogenase requires which vitamin-derived cofactor?", "answer": "Thiamine (B1)", "distractors": ["Vitamin C", "Vitamin K", "Folate (B9)", "Cobalamin (B12)"], "rationale": "PDH requires TPP, derived from thiamine."}, {"id": "Q489", "lecture": "TCA & ETC", "subtopic": "ETC", "style": "Detail check", "q": "Do not rely on answer-letter patterns. Choose the precise answer: What does Complex V do?", "answer": "Uses the proton gradient to synthesize ATP", "distractors": ["Pumps sodium", "Makes lactate", "Oxidizes pyruvate", "Creates NADPH"], "rationale": "ATP synthase/Complex V uses proton flow to generate ATP."}, {"id": "Q490", "lecture": "TCA & ETC", "subtopic": "Pyruvate Oxidation", "style": "Negative clue", "q": "Which answer best fits this concept: Which enzyme converts pyruvate to acetyl-CoA?", "answer": "Pyruvate dehydrogenase", "distractors": ["Pyruvate kinase", "Pyruvate carboxylase", "Citrate synthase", "Lactate dehydrogenase"], "rationale": "PDH links glycolysis to TCA by making acetyl-CoA."}, {"id": "Q491", "lecture": "Lipids & Amino Acids", "subtopic": "TAG Digestion", "style": "Application", "q": "If this pathway or condition is being tested, what is the best answer? What transports dietary TAGs from intestinal lining to tissues?", "answer": "Chylomicrons", "distractors": ["HDL only", "LDL only", "Albumin only", "Hemoglobin"], "rationale": "Chylomicrons transport dietary lipids."}, {"id": "Q492", "lecture": "Lipids & Amino Acids", "subtopic": "Amino Acid Disorders", "style": "Detail check", "q": "Do not rely on answer-letter patterns. Choose the precise answer: MSUD is caused by deficiency of what enzyme complex?", "answer": "Branched-chain alpha-ketoacid dehydrogenase", "distractors": ["Phenylalanine hydroxylase", "Ornithine transcarbamoylase", "CPS-I", "Pyruvate kinase"], "rationale": "MSUD is impaired branched-chain amino acid catabolism."}, {"id": "Q493", "lecture": "Lipids & Amino Acids", "subtopic": "TAG Digestion", "style": "Detail check", "q": "Do not rely on answer-letter patterns. Choose the precise answer: What transports dietary TAGs from intestinal lining to tissues?", "answer": "Chylomicrons", "distractors": ["HDL only", "LDL only", "Albumin only", "Hemoglobin"], "rationale": "Chylomicrons transport dietary lipids."}, {"id": "Q494", "lecture": "TCA & ETC", "subtopic": "Pyruvate Oxidation", "style": "Application", "q": "If this pathway or condition is being tested, what is the best answer? Which enzyme converts pyruvate to acetyl-CoA?", "answer": "Pyruvate dehydrogenase", "distractors": ["Pyruvate kinase", "Pyruvate carboxylase", "Citrate synthase", "Lactate dehydrogenase"], "rationale": "PDH links glycolysis to TCA by making acetyl-CoA."}, {"id": "Q495", "lecture": "TCA & ETC", "subtopic": "ROS", "style": "Scrubbed wording", "q": "Select the most accurate statement for: What is the primary ROS formed by electron leak to oxygen?", "answer": "Superoxide", "distractors": ["Lactate", "Acetone", "Carbon dioxide", "Urea"], "rationale": "Superoxide is the primary reactive oxygen species generated."}, {"id": "Q496", "lecture": "TCA & ETC", "subtopic": "ROS", "style": "Application", "q": "If this pathway or condition is being tested, what is the best answer? Most ETC-derived ROS leak from which complexes?", "answer": "Complex I and Complex III", "distractors": ["Complex II and V", "Complex IV and V", "Complex I only", "Complex V only"], "rationale": "Electron leak at Complex I and III generates superoxide."}, {"id": "Q497", "lecture": "Lipids & Amino Acids", "subtopic": "TAG Digestion", "style": "High-yield detail", "q": "For Block 2 biochemistry, identify the high-yield answer: What emulsifies dietary fat in the small intestine?", "answer": "Bile salts", "distractors": ["Pancreatic amylase", "Pepsin", "Trypsin", "Insulin"], "rationale": "Bile salts break fat globules into micelles."}, {"id": "Q498", "lecture": "Carbohydrate Metabolism", "subtopic": "Glycolysis", "style": "Application", "q": "If this pathway or condition is being tested, what is the best answer? Where does glycolysis occur?", "answer": "Cytosol", "distractors": ["Mitochondrial matrix", "Nucleus", "Smooth ER", "Lysosome"], "rationale": "Glycolysis occurs in the cytosol and can proceed without mitochondria."}, {"id": "Q499", "lecture": "Membranes & Signaling", "subtopic": "GPCRs", "style": "Application", "q": "If this pathway or condition is being tested, what is the best answer? What happens to the G alpha subunit after GPCR activation?", "answer": "GDP is exchanged for GTP", "distractors": ["GTP is exchanged for GDP", "It becomes DNA", "It is secreted", "It forms lactate"], "rationale": "Ligand binding triggers GDP-GTP exchange on the alpha subunit."}, {"id": "Q500", "lecture": "Lipids & Amino Acids", "subtopic": "Fasting Lipolysis", "style": "Exam-style", "q": "A patient/pathway question asks: Which enzyme hydrolyzes stored TAGs during fasting?", "answer": "Hormone-sensitive lipase", "distractors": ["Pancreatic lipase", "Glycogen synthase", "CPS-I", "Aldolase B"], "rationale": "Glucagon/epinephrine activate hormone-sensitive lipase."}];
const LETTERS = ["A","B","C","D","E"];
const store = {
  get(k, fallback){ try{ return JSON.parse(localStorage.getItem(k)) ?? fallback }catch{ return fallback } },
  set(k, v){ localStorage.setItem(k, JSON.stringify(v)) }
};
let selectedLecture="All", selectedCount=20, avoidRepeats=true, quiz=[], idx=0, answers=[];
const lectures=["All",...Array.from(new Set(BANK.map(q=>q.lecture)))];
function haptic(){ try{ navigator.vibrate && navigator.vibrate(10); }catch(e){} }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
function byId(id){ return document.getElementById(id) }
function poolForLecture(){ return selectedLecture==="All" ? BANK : BANK.filter(q=>q.lecture===selectedLecture); }
function buildSetup(){
  byId("bankBadge").textContent = BANK.length + " Q";
  const lg=byId("lectureGrid"); lg.innerHTML="";
  lectures.forEach(l=>{
    const n=(l==="All"?BANK:BANK.filter(q=>q.lecture===l)).length;
    const b=document.createElement("button"); b.className="choice-card"+(l===selectedLecture?" selected":"");
    b.innerHTML=`<strong>${l}</strong><span>${n} questions</span>`;
    b.onclick=()=>{haptic();selectedLecture=l;selectedCount=Math.min(selectedCount,poolForLecture().length);buildSetup();};
    lg.appendChild(b);
  });
  const cg=byId("countGrid"); cg.innerHTML="";
  [10,20,30,50,100].filter(n=>n<=poolForLecture().length).forEach(n=>{
    const b=document.createElement("button"); b.textContent=n; b.className=n===selectedCount?"selected":"";
    b.onclick=()=>{haptic(); selectedCount=n; buildSetup();};
    cg.appendChild(b);
  });
  const all=document.createElement("button"); all.textContent="All"; all.onclick=()=>{selectedCount=poolForLecture().length;buildSetup();}; cg.appendChild(all);
  byId("switch").classList.toggle("on", avoidRepeats);
  byId("start").disabled=false;
}
function makeQuiz(){
  haptic();
  let pool=poolForLecture();
  const seen=store.get("seenIds", []);
  if(avoidRepeats){
    const unseen=pool.filter(q=>!seen.includes(q.id));
    if(unseen.length >= Math.min(selectedCount,pool.length)) pool=unseen;
    else pool=[...unseen, ...pool.filter(q=>seen.includes(q.id))];
  }
  quiz=shuffle(pool).slice(0, Math.min(selectedCount,pool.length)).map(q=>{
    const opts=shuffle([q.answer, ...q.distractors]).slice(0,5);
    if(!opts.includes(q.answer)) opts[0]=q.answer;
    const finalOpts=shuffle(opts);
    return {...q, options:finalOpts, correct:finalOpts.indexOf(q.answer)};
  });
  idx=0; answers=Array(quiz.length).fill(null);
  show("quiz"); renderQ();
}
function renderQ(){
  const q=quiz[idx], chosen=answers[idx], answered=chosen!==null;
  byId("bar").style.width=((idx+1)/quiz.length*100)+"%";
  byId("qNum").textContent=`Question ${idx+1} / ${quiz.length}`;
  byId("score").textContent=`Score ${answers.filter((a,i)=>a!==null && a===quiz[i].correct).length}`;
  let html=`<div class="qtag">${q.lecture} · ${q.subtopic}</div><div class="qtext">${q.q}</div>`;
  q.options.forEach((op,i)=>{
    let cls="option";
    if(answered) cls += i===q.correct ? " correct" : (i===chosen ? " wrong" : " dim");
    html += `<button class="${cls}" ${answered?"disabled":""} data-i="${i}"><span class="letter">${LETTERS[i]}</span><span>${op}</span></button>`;
  });
  if(answered) html += `<div class="explain"><strong>${chosen===q.correct?"Correct.":"Correct answer: "+LETTERS[q.correct]+"."}</strong><br>${q.rationale}</div>`;
  byId("questionSlot").innerHTML=html;
  document.querySelectorAll(".option").forEach(btn=>btn.onclick=()=>{haptic(); answers[idx]=Number(btn.dataset.i); renderQ();});
  byId("next").disabled=!answered;
  byId("next").textContent=idx===quiz.length-1?"Finish":"Next";
}
function finish(){
  haptic();
  const seen=store.get("seenIds", []);
  quiz.forEach(q=>{ if(!seen.includes(q.id)) seen.push(q.id); });
  store.set("seenIds", seen);
  const prog=store.get("progress", {});
  quiz.forEach((q,i)=>{
    const key=q.lecture+"|"+q.subtopic;
    prog[key]=prog[key]||{right:0,total:0,lecture:q.lecture,subtopic:q.subtopic};
    prog[key].total++; if(answers[i]===q.correct) prog[key].right++;
  });
  store.set("progress", prog);
  const correct=answers.filter((a,i)=>a===quiz[i].correct).length, pct=Math.round(correct/quiz.length*100);
  byId("results").innerHTML=`<section class="card"><div class="section-title">Results</div><div style="font-size:44px;font-weight:800;letter-spacing:-.05em">${pct}%</div><p class="small">${correct} / ${quiz.length} correct</p><div class="nav"><button class="secondary" onclick="show('progress')">Progress</button><button class="primary" onclick="show('setup')">New Quiz</button></div></section>`;
  show("results");
}
function renderProgress(){
 const prog=Object.values(store.get("progress", {}));
 if(!prog.length){byId("progress").innerHTML='<section class="card"><p class="small">No progress yet. Take a quiz first.</p></section>';return;}
 prog.sort((a,b)=>(a.right/a.total)-(b.right/b.total));
 let html='<section class="card"><div class="section-title">Weakest subtopics first</div><table><tr><th>Subtopic</th><th>Accuracy</th></tr>';
 prog.forEach(p=>{html+=`<tr><td>${p.lecture}<br><span class="small">${p.subtopic}</span></td><td>${Math.round(p.right/p.total*100)}%<br><span class="small">${p.right}/${p.total}</span></td></tr>`});
 html+='</table><button class="secondary" onclick="if(confirm(\'Reset progress?\')){localStorage.removeItem(\'progress\');renderProgress()}">Reset progress</button> <button class="secondary" onclick="if(confirm(\'Reset seen questions?\')){localStorage.removeItem(\'seenIds\');renderProgress()}">Reset seen questions</button></section>';
 byId("progress").innerHTML=html;
}
function renderAudit(){
  const dist={A:0,B:0,C:0,D:0,E:0}, sample=shuffle(BANK).slice(0,100).map(q=>{
    const opts=shuffle([q.answer,...q.distractors]); const correct=opts.indexOf(q.answer); dist[LETTERS[correct]]++; return correct;
  });
  const seen=store.get("seenIds", []).length;
  byId("audit").innerHTML=`<section class="card"><div class="section-title">Question bank audit</div><p class="small">Questions: <strong>${BANK.length}</strong><br>Seen in no-repeat mode: <strong>${seen}</strong></p><table><tr><th>Correct letter in random sample</th><th>Count</th></tr>${LETTERS.map(l=>`<tr><td>${l}</td><td>${dist[l]}</td></tr>`).join("")}</table><p class="small">This sample reshuffles each time. It checks that answers are not stuck on one letter.</p></section>`;
}
function show(page){
 ["setup","quiz","results","progress","audit"].forEach(id=>byId(id).classList.toggle("hidden", id!==page));
 byId("tabPractice").classList.toggle("active", ["setup","quiz","results"].includes(page));
 byId("tabProgress").classList.toggle("active", page==="progress");
 byId("tabAudit").classList.toggle("active", page==="audit");
 if(page==="progress") renderProgress();
 if(page==="audit") renderAudit();
 scrollTo({top:0,behavior:"smooth"});
}
byId("repeatToggle").onclick=()=>{haptic(); avoidRepeats=!avoidRepeats; buildSetup();};
byId("start").onclick=makeQuiz;
byId("next").onclick=()=>{ if(answers[idx]===null)return; if(idx<quiz.length-1){idx++;renderQ();scrollTo({top:0,behavior:"smooth"})} else finish(); };
byId("quit").onclick=()=>show("setup");
byId("tabPractice").onclick=()=>show("setup");
byId("tabProgress").onclick=()=>show("progress");
byId("tabAudit").onclick=()=>show("audit");
buildSetup();
</script>
</body>
