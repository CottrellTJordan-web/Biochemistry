<script>
(function(){
"use strict";
var BANK = JSON.parse(document.getElementById("question-data").textContent);
var LECTURE = BANK.filter(function(q){return q.bank==="lecture";});
var REVIEW = BANK.filter(function(q){return q.bank==="review";});
var ALL = BANK.slice();
var LETTERS = ["A","B","C","D","E"];
var selectedLecture = "All";
var selectedCount = 20;
var avoidRepeats = getStore("bc_avoid_v3", true);
var hideExamAnswers = getStore("bc_hide_exam_v3", true);
var currentMode = "practice";
var focusedSubtopic = null;
var quiz = [], idx = 0, answers = [], confidence = [];
var timerHandle = null, startTime = 0, silentExam = false;

function el(id){return document.getElementById(id);}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function fmt(sec){var m=Math.floor(sec/60),s=sec%60;return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");}
function esc(s){return String(s).replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m];});}
function getStore(k,f){try{var v=localStorage.getItem(k);return v?JSON.parse(v):f;}catch(e){return f;}}
function setStore(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function haptic(ms){try{if(navigator.vibrate)navigator.vibrate(ms||10);}catch(e){}}
function lecturePool(){return selectedLecture==="All"?LECTURE:LECTURE.filter(function(q){return q.lecture===selectedLecture;});}
function filterFlagged(pool){var f=getStore("bc_flagged_v3",{});return pool.filter(function(q){return !f[q.id];});}
function seenKey(mode){return mode==="review"?"review100":mode==="focused"?focusedSubtopic.lecture+"|"+focusedSubtopic.subtopic:selectedLecture;}
function filterSeen(pool,mode){if(!avoidRepeats||mode==="weak"||mode==="missed")return pool;var seen=getStore("bc_seen_v3",{}),key=seenKey(mode),list=seen[key]||[];var unseen=pool.filter(function(q){return list.indexOf(q.id)<0;});return unseen.length?unseen:pool;}
function makeQuestion(q){var opts=shuffle([q.answer].concat(q.distractors)).slice(0,5);if(opts.indexOf(q.answer)<0)opts[0]=q.answer;opts=shuffle(opts);var c={};for(var k in q)c[k]=q[k];c.options=opts;c.correct=opts.indexOf(q.answer);return c;}

function stats(){
  var p=Object.values(getStore("bc_prog_v3",{}));
  var total=p.reduce(function(a,b){return a+b.total;},0), right=p.reduce(function(a,b){return a+b.right;},0);
  var acc=total?Math.round(right/total*100):0;
  var eligible=p.filter(function(x){return x.total>=2;});
  var weakest=eligible.slice().sort(function(a,b){return (a.right/a.total)-(b.right/b.total);})[0];
  var strongest=eligible.slice().sort(function(a,b){return (b.right/b.total)-(a.right/a.total);})[0];
  var miss=Object.keys(getStore("bc_miss_v3",{})).length;
  var noClue=Object.keys(getStore("bc_noclue_v3",{})).length;
  var penalty=Math.min(15,Math.round((miss+noClue)/5));
  var readiness=total?Math.max(0,Math.min(100,acc-penalty)):0;
  return {p:p,total:total,right:right,acc:acc,weakest:weakest,strongest:strongest,miss:miss,noClue:noClue,readiness:readiness};
}
function updateHero(){
  var s=stats();
  el("readiness").textContent=s.total?s.readiness+"%":"—";
  el("weakestHero").textContent=s.weakest?s.weakest.subtopic:"—";
  el("strongestHero").textContent=s.strongest?s.strongest.subtopic:"—";
}

function buildHome(){
  updateHero();
  var lectures=["All"]; LECTURE.forEach(function(q){if(lectures.indexOf(q.lecture)<0)lectures.push(q.lecture);});
  var lg=el("lectureGrid");lg.innerHTML="";
  lectures.forEach(function(name){var count=name==="All"?LECTURE.length:LECTURE.filter(function(q){return q.lecture===name;}).length;var b=document.createElement("button");b.className="tile"+(name===selectedLecture?" selected":"");b.innerHTML="<strong>"+esc(name)+"</strong><br><span class='small'>"+count+" questions</span>";b.onclick=function(){selectedLecture=name;haptic();buildHome();};lg.appendChild(b);});
  var cg=el("countGrid");cg.innerHTML="";[10,20,30,50,75,100].forEach(function(n){if(n<=lecturePool().length){var b=document.createElement("button");b.className="chip"+(n===selectedCount?" selected":"");b.textContent=n;b.onclick=function(){selectedCount=n;haptic();buildHome();};cg.appendChild(b);}});
  el("repeatSwitch").classList.toggle("on",avoidRepeats);
  renderTargetBoard();
}

function weakPool(){
  var prog=getStore("bc_prog_v3",{}), miss=getStore("bc_miss_v3",{}), no=getStore("bc_noclue_v3",{});
  var weakTopics=Object.keys(prog).filter(function(k){var p=prog[k];return p.total>=2&&(p.right/p.total)<0.80;});
  var arr=[], seen={};
  ALL.forEach(function(q){if(miss[q.id]||no[q.id]||weakTopics.indexOf(q.lecture+"|"+q.subtopic)>=0){if(!seen[q.id]){seen[q.id]=true;arr.push(q);}}});
  return filterFlagged(arr.length?arr:lecturePool());
}
function focusedPool(){if(!focusedSubtopic)return lecturePool();return ALL.filter(function(q){return q.lecture===focusedSubtopic.lecture&&q.subtopic===focusedSubtopic.subtopic;});}
function startFocused(lec,sub){focusedSubtopic={lecture:lec,subtopic:sub};start("focused");}

function start(mode,countOverride){
  currentMode=mode; silentExam=(mode==="review"&&hideExamAnswers);
  var pool=mode==="review"?REVIEW:mode==="weak"?weakPool():mode==="focused"?focusedPool():lecturePool();
  pool=filterFlagged(pool); pool=filterSeen(pool,mode);
  if(!pool.length){alert("No questions available here yet.");return;}
  var count=countOverride||(mode==="review"?Math.min(100,pool.length):Math.min(selectedCount,pool.length));
  quiz=shuffle(pool).slice(0,count).map(makeQuestion); idx=0; answers=new Array(quiz.length).fill(null); confidence=new Array(quiz.length).fill("unset");
  startTime=Date.now();clearInterval(timerHandle);timerHandle=setInterval(function(){el("timer").textContent=fmt(Math.floor((Date.now()-startTime)/1000));},500);
  show("quiz"); renderQuestion();
}

function renderQuestion(){
  var q=quiz[idx], chosen=answers[idx], answered=chosen!==null, reveal=answered&&!silentExam;
  el("fill").style.width=((idx+1)/quiz.length*100)+"%"; el("qnum").textContent="Question "+(idx+1)+" / "+quiz.length; el("score").textContent="Score: "+answers.filter(function(a,i){return a!==null&&a===quiz[i].correct;}).length;
  var h="<div class='tag'>"+esc(q.lecture)+" · "+esc(q.subtopic)+" · "+esc(q.difficulty||"Core")+"</div><div class='qtext'>"+esc(q.q)+"</div>";
  q.options.forEach(function(op,i){var cls="option";if(reveal)cls+=i===q.correct?" correct":i===chosen?" wrong":" dim";h+="<button class='"+cls+"' "+(answered?"disabled":"")+" data-i='"+i+"'><span class='letter'>"+LETTERS[i]+"</span><span>"+esc(op)+"</span></button>";});
  if(answered&&silentExam)h+="<div class='explain'><strong>Answer locked.</strong><br>Review 100 is hiding answers until the end. You can change this in Settings.</div>";
  if(reveal)h+="<div class='explain'><strong>"+(chosen===q.correct?"Correct.":"Correct answer: "+LETTERS[q.correct]+" — "+esc(q.answer))+"</strong><br><br><strong>Why this is correct:</strong><br>"+esc(q.rationale)+"<br><br><strong>Memory anchor:</strong><br>"+esc(q.q.replace("?",""))+" → "+esc(q.answer)+".<div class='confrow'><button type='button' class='confbtn' data-conf='got'>I got this</button><button type='button' class='confbtn' data-conf='unsure'>I’m not positive</button><button type='button' class='confbtn' data-conf='clueless'>I have no fucking clue</button></div><button type='button' class='flagbtn' data-flag='1'>Flag bad question / remove</button></div>";
  el("slot").innerHTML=h;
  Array.prototype.forEach.call(document.querySelectorAll(".option"),function(b){b.onclick=function(){answers[idx]=Number(b.getAttribute("data-i"));haptic();renderQuestion();};});
  Array.prototype.forEach.call(document.querySelectorAll("[data-conf]"),function(b){b.onclick=function(){confidence[idx]=b.getAttribute("data-conf");Array.prototype.forEach.call(document.querySelectorAll("[data-conf]"),function(x){x.classList.remove("selected");});b.classList.add("selected");if(confidence[idx]==="clueless"){var no=getStore("bc_noclue_v3",{});no[q.id]=true;setStore("bc_noclue_v3",no);}haptic();};});
  Array.prototype.forEach.call(document.querySelectorAll("[data-flag]"),function(b){b.onclick=function(){if(confirm("Flag this question as bad and remove it from future sessions?")){var f=getStore("bc_flagged_v3",{});f[q.id]=true;setStore("bc_flagged_v3",f);b.textContent="Flagged and removed";b.disabled=true;haptic(20);}};});
  el("next").disabled=!answered; el("next").textContent=idx===quiz.length-1?"Finish":"Next";
}

function saveSession(){
  var prog=getStore("bc_prog_v3",{}), miss=getStore("bc_miss_v3",{}), no=getStore("bc_noclue_v3",{}), seen=getStore("bc_seen_v3",{}), hist=getStore("bc_history_v3",[]);
  var key=seenKey(currentMode); if(!seen[key])seen[key]=[]; var right=0, conf={got:{right:0,total:0},unsure:{right:0,total:0},clueless:{right:0,total:0}};
  quiz.forEach(function(q,i){if(seen[key].indexOf(q.id)<0)seen[key].push(q.id);var k=q.lecture+"|"+q.subtopic;if(!prog[k])prog[k]={lecture:q.lecture,subtopic:q.subtopic,right:0,total:0};prog[k].total++;var ok=answers[i]===q.correct;if(ok){right++;prog[k].right++;delete miss[q.id];}else miss[q.id]=true;if(confidence[i]==="clueless")no[q.id]=true;if(confidence[i]==="got"&&no[q.id])delete no[q.id];if(conf[confidence[i]]){conf[confidence[i]].total++;if(ok)conf[confidence[i]].right++;}});
  hist.push({date:Date.now(),mode:currentMode,total:quiz.length,right:right,time:Math.floor((Date.now()-startTime)/1000),conf:conf});hist=hist.slice(-80);
  setStore("bc_prog_v3",prog);setStore("bc_miss_v3",miss);setStore("bc_noclue_v3",no);setStore("bc_seen_v3",seen);setStore("bc_history_v3",hist);
}

function finish(){
  clearInterval(timerHandle);var right=answers.filter(function(a,i){return a===quiz[i].correct;}).length,pct=Math.round(right/quiz.length*100),elapsed=Math.floor((Date.now()-startTime)/1000);saveSession();
  var misses=quiz.map(function(q,i){if(answers[i]===q.correct)return "";return "<div class='card'><strong>"+esc(q.q)+"</strong><div class='small'>Your answer: <strong>"+esc(q.options[answers[i]])+"</strong><br>Correct: <strong>"+esc(q.answer)+"</strong><br>"+esc(q.rationale)+"</div></div>";}).join("")||"<div class='small'>No misses. Perfect run.</div>";
  el("results").innerHTML="<section class='card'><div class='label'>Results</div><div class='result'>"+pct+"%</div><div class='small'>"+right+" / "+quiz.length+" correct · Time "+fmt(elapsed)+" · Avg "+fmt(Math.round(elapsed/quiz.length))+" per question</div><div class='nav'><button class='secondary' id='resWeak'>Weak Areas</button><button class='primary' id='resPractice'>Practice</button></div></section><section><div class='label'>Missed this session</div>"+misses+"</section>";
  show("results"); el("resWeak").onclick=function(){show("weak");}; el("resPractice").onclick=function(){show("home");};
}

function renderTargetBoard(){
  var box=el("targetBoardContent"); if(!box)return; var p=Object.values(getStore("bc_prog_v3",{})); if(!p.length){box.innerHTML="Complete a few questions and your weakest and strongest subtopics will appear here.";return;}
  var eligible=p.filter(function(x){return x.total>=2;}); if(!eligible.length)eligible=p;
  var low=eligible.slice().sort(function(a,b){return (a.right/a.total)-(b.right/b.total);}).slice(0,5), high=eligible.slice().sort(function(a,b){return (b.right/b.total)-(a.right/a.total);}).slice(0,5);
  function rows(arr,label){return arr.map(function(x,i){var pct=Math.round(x.right/x.total*100);return "<tr><td><strong>#"+(i+1)+" "+esc(x.subtopic)+"</strong><br><span class='small'>"+esc(x.lecture)+" · "+label+"</span><br><button class='secondary subquiz' data-lec='"+esc(x.lecture)+"' data-sub='"+esc(x.subtopic)+"' style='margin-top:8px;padding:8px 10px;border-radius:12px'>Quiz this subtopic</button></td><td>"+pct+"%<br><span class='small'>"+x.right+"/"+x.total+"</span></td></tr>";}).join("");}
  box.innerHTML="<div class='grid'><div><div class='label'>Lowest % Subtopics</div><table><tr><th>Target</th><th>Score</th></tr>"+rows(low,"target this next")+"</table></div><div><div class='label'>Learned Leaderboard</div><table><tr><th>Strongest</th><th>Score</th></tr>"+rows(high,"learned")+"</table></div></div>";
  Array.prototype.forEach.call(document.querySelectorAll(".subquiz"),function(b){b.onclick=function(){startFocused(b.getAttribute("data-lec"),b.getAttribute("data-sub"));};});
}

function renderWeak(){
  var miss=getStore("bc_miss_v3",{}), no=getStore("bc_noclue_v3",{}), prog=getStore("bc_prog_v3",{});
  var weakTopics=Object.values(prog).filter(function(p){return p.total>=2&&(p.right/p.total)<0.80;}).sort(function(a,b){return (a.right/a.total)-(b.right/b.total);});
  function qList(obj,label){var arr=ALL.filter(function(q){return obj[q.id];}).slice(0,12);return arr.map(function(q){return "<tr><td><strong>"+esc(q.subtopic)+"</strong><br><span class='small'>"+esc(q.q)+"</span></td><td><button class='secondary subquiz' data-lec='"+esc(q.lecture)+"' data-sub='"+esc(q.subtopic)+"'>Quiz</button></td></tr>";}).join("")||"<tr><td class='small'>Nothing here yet.</td><td></td></tr>";}
  var topicRows=weakTopics.map(function(x){var pct=Math.round(x.right/x.total*100), risk=pct<60?"Critical":pct<80?"Concerning":"Improving";return "<tr><td><strong>"+esc(x.subtopic)+"</strong><br><span class='small'>"+esc(x.lecture)+" · "+risk+"</span></td><td>"+pct+"%<br><button class='secondary subquiz' data-lec='"+esc(x.lecture)+"' data-sub='"+esc(x.subtopic)+"'>Quiz</button></td></tr>";}).join("")||"<tr><td class='small'>No weak topics yet.</td><td></td></tr>";
  el("weak").innerHTML="<section class='card'><div class='label'>Target Weaknesses</div><div class='kpi'><div class='box'><span class='small'>No fucking clue</span><strong>"+Object.keys(no).length+"</strong></div><div class='box'><span class='small'>Missed</span><strong>"+Object.keys(miss).length+"</strong></div><div class='box'><span class='small'>Weak topics</span><strong>"+weakTopics.length+"</strong></div></div><button class='primary' id='startWeak'>Start Weak Repair</button></section><section class='card'><div class='label'>No fucking clue</div><table>"+qList(no,"no")+"</table></section><section class='card'><div class='label'>Missed Questions</div><table>"+qList(miss,"miss")+"</table></section><section class='card'><div class='label'>Weak Topics Below 80%</div><table><tr><th>Topic</th><th>Score</th></tr>"+topicRows+"</table></section>";
  el("startWeak").onclick=function(){start("weak");};Array.prototype.forEach.call(document.querySelectorAll(".subquiz"),function(b){b.onclick=function(){startFocused(b.getAttribute("data-lec"),b.getAttribute("data-sub"));};});
}

function renderAnalytics(){
  var s=stats(), h=getStore("bc_history_v3",[]), flagged=Object.keys(getStore("bc_flagged_v3",{})).length;
  if(!s.total){el("analytics").innerHTML="<section class='card'><div class='label'>Analytics</div><div class='small'>No data yet.</div></section>";return;}
  var byLecture={};s.p.forEach(function(x){if(!byLecture[x.lecture])byLecture[x.lecture]={right:0,total:0};byLecture[x.lecture].right+=x.right;byLecture[x.lecture].total+=x.total;});
  var lectureRows=Object.keys(byLecture).map(function(k){var x=byLecture[k],pct=Math.round(x.right/x.total*100);return "<tr><td><strong>"+esc(k)+"</strong></td><td>"+pct+"%<br><span class='small'>"+x.right+"/"+x.total+"</span></td></tr>";}).join("");
  var topics=s.p.slice().sort(function(a,b){return (a.right/a.total)-(b.right/b.total);}).slice(0,10).map(function(x){var pct=Math.round(x.right/x.total*100);return "<tr><td><strong>"+esc(x.subtopic)+"</strong><br><span class='small'>"+esc(x.lecture)+"</span></td><td>"+pct+"%<br><span class='small'>"+x.right+"/"+x.total+"</span></td></tr>";}).join("");
  var conf={got:{r:0,t:0},unsure:{r:0,t:0},clueless:{r:0,t:0}};h.forEach(function(run){if(run.conf)Object.keys(conf).forEach(function(k){conf[k].r+=run.conf[k]?run.conf[k].right:0;conf[k].t+=run.conf[k]?run.conf[k].total:0;});});
  function cRow(k,label){var x=conf[k],pct=x.t?Math.round(x.r/x.t*100):0;return "<tr><td><strong>"+label+"</strong></td><td>"+(x.t?pct+"%":"—")+"<br><span class='small'>"+x.r+"/"+x.t+"</span></td></tr>";}
  var recommendation=s.readiness>=85?"Use Review 100 and targeted weak drills only.":s.readiness>=75?"Prioritize Weak Areas, then rerun Review 100.":"Rebuild lowest subtopics before doing full review exams.";
  el("analytics").innerHTML="<section class='card'><div class='label'>Command Center</div><div class='kpi'><div class='box'><span class='small'>Readiness</span><strong>"+s.readiness+"%</strong></div><div class='box'><span class='small'>Accuracy</span><strong>"+s.acc+"%</strong></div><div class='box'><span class='small'>Answered</span><strong>"+s.total+"</strong></div></div><div class='explain'><strong>Study recommendation:</strong><br>"+recommendation+"</div></section><section class='card'><div class='label'>Confidence Calibration</div><table>"+cRow("got","I got this")+cRow("unsure","I’m not positive")+cRow("clueless","I have no fucking clue")+"</table></section><section class='card'><div class='label'>Performance by Lecture</div><table><tr><th>Lecture</th><th>Score</th></tr>"+lectureRows+"</table></section><section class='card'><div class='label'>Lowest Percentage Subtopics</div><table><tr><th>Topic</th><th>Score</th></tr>"+topics+"</table></section><section class='card'><div class='label'>Question Quality</div><div class='small'>Flagged and removed: "+flagged+"</div></section>";
}

function renderSettings(){
  var flagged=Object.keys(getStore("bc_flagged_v3",{})).length;
  el("settings").innerHTML="<section class='card'><div class='label'>Settings</div><div class='toggle' id='hideToggle'><div><strong>Review 100 feedback</strong><div class='small'>Hide answers until the end.</div></div><div class='switch "+(hideExamAnswers?"on":"")+"' id='hideSwitch'><div class='knob'></div></div></div><div class='toggle' id='repeatSet'><div><strong>Avoid repeats</strong><div class='small'>Use unseen questions first.</div></div><div class='switch "+(avoidRepeats?"on":"")+"' id='repeatSetSwitch'><div class='knob'></div></div></div><button class='secondary' id='restoreFlagged' style='width:100%;margin-top:12px'>Restore flagged questions ("+flagged+")</button><button class='danger' id='resetAll' style='width:100%;margin-top:12px'>Reset all progress</button></section>";
  el("hideToggle").onclick=function(){hideExamAnswers=!hideExamAnswers;setStore("bc_hide_exam_v3",hideExamAnswers);renderSettings();};
  el("repeatSet").onclick=function(){avoidRepeats=!avoidRepeats;setStore("bc_avoid_v3",avoidRepeats);renderSettings();};
  el("restoreFlagged").onclick=function(){if(confirm("Restore all flagged questions?")){localStorage.removeItem("bc_flagged_v3");renderSettings();}};
  el("resetAll").onclick=function(){if(confirm("Reset all saved progress?")){["bc_prog_v3","bc_miss_v3","bc_noclue_v3","bc_seen_v3","bc_history_v3","bc_flagged_v3"].forEach(function(k){localStorage.removeItem(k);});renderSettings();updateHero();}};
}

function show(page){
  ["home","quiz","results","weak","analytics","settings"].forEach(function(id){el(id).classList.toggle("hidden",id!==page);});
  ["tabPractice","tabReview","tabWeak","tabAnalytics","tabSettings"].forEach(function(id){el(id).classList.remove("active");});
  if(page==="weak"){el("tabWeak").classList.add("active");renderWeak();}
  else if(page==="analytics"){el("tabAnalytics").classList.add("active");renderAnalytics();}
  else if(page==="settings"){el("tabSettings").classList.add("active");renderSettings();}
  else if(currentMode==="review"&&(page==="quiz"||page==="results"))el("tabReview").classList.add("active");
  else el("tabPractice").classList.add("active");
  if(page==="home"){buildHome();}
  window.scrollTo(0,0);
}

el("homePractice").onclick=function(){show("home");};
el("homeReview").onclick=function(){start("review",100);};
el("homeWeak").onclick=function(){show("weak");};
el("homeAnalytics").onclick=function(){show("analytics");};
el("startPractice").onclick=function(){start("practice");};
el("repeatToggle").onclick=function(){avoidRepeats=!avoidRepeats;setStore("bc_avoid_v3",avoidRepeats);buildHome();};
el("next").onclick=function(){if(answers[idx]===null)return;if(idx<quiz.length-1){idx++;renderQuestion();window.scrollTo(0,0);}else finish();};
el("quit").onclick=function(){show("home");};
el("tabPractice").onclick=function(){currentMode="practice";show("home");};
el("tabReview").onclick=function(){start("review",100);};
el("tabWeak").onclick=function(){show("weak");};
el("tabAnalytics").onclick=function(){show("analytics");};
el("tabSettings").onclick=function(){show("settings");};
buildHome();
})();
</script>
